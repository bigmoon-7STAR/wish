        function removeTrackFromPlaylist(sid) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            pl.songIds = pl.songIds.filter(id => id !== sid);
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div');
            div.id = "bulk-modal";
            div.className = "modal";
            div.style.display = "flex";
            
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <h2>Select Songs</h2>
                        <button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">Done</button>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions"></div>
                </div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${(t.artist||'').toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px; object-fit:cover;">
                        <div style="flex:1;">
                            <b style="font-size:14px;">${t.name}</b><br>
                            <span style="font-size:11px; color:var(--icon-color);">${t.artist||''}</span>
                        </div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => {
                el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none';
            });
            
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const meta = artistMeta[a];
                    const firstSong = tracks.find(t => (t.mainArtists && t.mainArtists.includes(a)) || (t.subArtists && t.subArtists.includes(a)));
                    const iconHtml = (meta && meta.icon) ? `<img src="${meta.icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${iconHtml}<span>${a}</span></div>`;
                }).join('');
            } else {
                suggest.style.display = 'none';
            }
        }

        function saveBulkAdd() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
            pl.songIds = newIds;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                loadAll();
                document.getElementById('bulk-modal').remove();
            };
        }

        /* Artist Edit Logic */
        function selectArtistIcon(name) {
            editingArtistName = name;
            document.getElementById('artist-icon-upload').click();
        }

        function saveArtistIcon(e) {
            const f = e.target.files[0];
            if(f && editingArtistName) {
                const r = new FileReader();
                r.onload = (ev) => {
                    let meta = artistMeta[editingArtistName];
                    if(!meta) meta = { name: editingArtistName, favorite: false, members: [], children: [], syncColor: '' };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll;
                };
                r.readAsDataURL(f);
            }
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [], children: [], syncColor: '' };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }

        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:20px; font-weight:900; color:var(--text-main);">${editingArtistSetupName}</div>
                </div>
                
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">+ Add Member</button>
                    <button onclick="sortMembersByColor()" style="padding:10px 20px; background:var(--card-bg); color:var(--icon-color); border:2px solid var(--border-color); border-radius:15px; font-weight:800;">Sort By Color</button>
                </div>
                
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px; cursor:pointer;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="updateMemberColor(${i}, this.value)" style="width:40px; height:40px; border:none; border-radius:10px; padding:0; cursor:pointer;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addArtistMember() {
            currentMembersEdit.push({name: '', color: '#a6cbe3', linked: null});
            renderArtistSetup();
        }

        function removeArtistMember(i) {
            currentMembersEdit.splice(i, 1);
            renderArtistSetup();
        }

        function updateMemberColor(idx, col) {
            currentMembersEdit[idx].color = col;
        }

        function sortMembersByColor() {
            currentMembersEdit.sort((a,b) => (a.color || '').localeCompare(b.color || ''));
            renderArtistSetup();
        }

        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedMemIndex = -1;
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            
            body.innerHTML = artists.map(a => {
                let meta = artistMeta[a];
                let imgHtml = (meta && meta.icon) ? `<img src="${meta.icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if(a && !currentMembersEdit[currentSyncIndex].name) {
                    currentMembersEdit[currentSyncIndex].name = a;
                }
                if(a && artistMeta[a] && artistMeta[a].syncColor) {
                    currentMembersEdit[currentSyncIndex].color = artistMeta[a].syncColor;
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [], children: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let changed = false;
                    if(t.mainArtists) {
                        for(let i=0; i<t.mainArtists.length; i++) {
                            if(t.mainArtists[i] === oldName) { t.mainArtists[i] = newName; changed = true; }
                        }
                    }
                    if(t.subArtists) {
                        for(let i=0; i<t.subArtists.length; i++) {
                            if(t.subArtists[i] === oldName) { t.subArtists[i] = newName; changed = true; }
                        }
                    }
                    if(changed) {
                        updateArtistString(t);
                        store.put(t);
                        tracksChanged = true;
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                
                if(tracksChanged) {
                    tx.oncomplete = loadAll;
                } else {
                    loadAll();
                }

            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, children: [] };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        /* Lyric Paint Logic */
        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let allMembers = [];
            
            // Gather members from Main Artists
            if(t.mainArtists) {
                t.mainArtists.forEach(a => {
                    if(artistMeta[a] && artistMeta[a].members) {
                        allMembers = allMembers.concat(artistMeta[a].members);
                    }
                });
            }
            
            // Deduplicate members by name
            const uniqueMembers = [];
            const seen = new Set();
            for (const item of allMembers) {
                if (!seen.has(item.name)) {
                    seen.add(item.name);
                    uniqueMembers.push(item);
                }
            }
            
            uniqueMembers.push({name: 'Reset', color: ''});

            currentPaintColor = uniqueMembers[0] ? uniqueMembers[0].color : '';
            currentLyricData = t.lyricData ? JSON.parse(JSON.stringify(t.lyricData)) : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = uniqueMembers.map(m => `
                <div onclick="selectPaintColor('${m.color}')" class="palette-item" data-color="${m.color}" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px; opacity: ${currentPaintColor === m.color ? 1 : 0.4}; transition:0.3s;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center; font-weight:800; color:var(--text-main);">${m.name}</span>
                </div>
            `).join('');

            activePaintLineIndex = 0;
            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function selectPaintColor(c) {
            currentPaintColor = c;
            let items = document.querySelectorAll('.palette-item');
            items.forEach(el => {
                if(el.getAttribute('data-color') === c) {
                    el.style.opacity = 1;
                    el.style.transform = "scale(1.1)";
                } else {
                    el.style.opacity = 0.4;
                    el.style.transform = "scale(1)";
                }
            });
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            
            container.innerHTML = currentLyricData.map((line, i) => {
                let gradientStr = "";
                let membersDisplay = "";
                
                if(line.members && line.members.length > 0) {
                    if(line.members.length === 1) {
                        gradientStr = `border-left: 6px solid ${line.members[0]}; color: ${line.members[0]};`;
                    } else {
                        let stops = line.members.map((m, idx) => `${m} ${Math.floor((idx/(line.members.length-1))*100)}%`).join(', ');
                        gradientStr = `border-left: 6px solid #ccc; background: linear-gradient(90deg, ${stops}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                    }
                    
                    membersDisplay = `<div style="display:flex; gap:4px; justify-content:center; margin-bottom:5px;">` + 
                        line.members.map(m => `<div style="width:12px; height:12px; border-radius:50%; background:${m};"></div>`).join('') + 
                    `</div>`;
                } else {
                    gradientStr = `border-left: 6px solid transparent; color: var(--text-main);`;
                }
                
                let timeStr = formatTime(line.time || 0);
                let isActive = i === activePaintLineIndex;
                let bgStyle = isActive ? "var(--list-hover)" : "var(--input-bg)";
                
                return `
                <div onclick="selectPaintLine(${i})" style="padding:15px; border-radius:12px; background:${bgStyle}; ${gradientStr} cursor:pointer; font-weight:800; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); position:relative;">
                    ${membersDisplay}
                    <div style="font-size:16px;">${line.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}</div>
                    <div style="position:absolute; right:15px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--icon-color); font-weight:900;">${timeStr}</div>
                </div>
                `;
            }).join('');
        }

        function selectPaintLine(i) {
            activePaintLineIndex = i;
            // Also apply color immediately
            toggleLyricColor(i);
            renderPaintLyrics();
        }

        function toggleLyricColor(i) {
            let line = currentLyricData[i];
            if(!line.members) line.members = [];
            
            if(currentPaintColor === '') {
                line.members = []; // Reset
            } else {
                let idx = line.members.indexOf(currentPaintColor);
                if(idx !== -1) {
                    line.members.splice(idx, 1); // remove if exists
                } else {
                    line.members.push(currentPaintColor); // add if not
                }
            }
        }

        function setSyncTimeToActiveLine() {
            if(currentLyricData[activePaintLineIndex]) {
                currentLyricData[activePaintLineIndex].time = audio.currentTime;
                renderPaintLyrics();
                
                // auto advance
                if(activePaintLineIndex < currentLyricData.length - 1) {
                    activePaintLineIndex++;
                    renderPaintLyrics();
                }
            }
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                
                // Refresh lyrics view if open
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    renderLyricsView();
                }
            };
        }

        /* =========================================
           FILE UPLOAD & SWIPE LOGIC
           ========================================= */
        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null;
                        if(tag.tags.picture) {
                            let d = tag.tags.picture.data;
                            let s = "";
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        
                        const tx = db.transaction("songs", "readwrite");
                        let mainArtistsArr = tag.tags.artist ? tag.tags.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x) : ["Unknown"];
                        let tObj = {
                            name: tag.tags.title || f.name,
                            mainArtists: mainArtistsArr,
                            subArtists: [],
                            year: tag.tags.year || "",
                            cover: c,
                            data: f,
                            lyrics: "",
                            lyricData: [],
                            favorite: false
                        };
                        updateArtistString(tObj);
                        
                        tx.objectStore("songs").add(tObj);
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        let tObj = {
                            name: f.name,
                            mainArtists: ["Unknown"],
                            subArtists: [],
                            year: "",
                            cover: null,
                            data: f,
                            lyrics: "",
                            lyricData: [],
                            favorite: false
                        };
                        updateArtistString(tObj);
                        tx.objectStore("songs").add(tObj);
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) {
            if(isEditing) return;
            touchStartX = e.touches[0].clientX;
        }

        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`;
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }

        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }

        function toggleQueue() {
            document.getElementById('queue-panel').classList.toggle('open');
            renderQueue();
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx]); toggleQueue();">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${t.artist}</div>
                    </div>
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }

        function startTimer() {
            if(sleepTimerId) {
                clearTimeout(sleepTimerId);
                clearInterval(sleepTimerInterval);
                sleepTimerId = null;
                sleepTimerInterval = null;
                document.getElementById('timer-display').innerText = "";
                document.getElementById('timer-btn').innerText = "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                return;
            }
            const min = parseInt(document.getElementById('timer-input').value);
            if(isNaN(min) || min <= 0) return;
            
            sleepEndTime = Date.now() + min * 60000;
            document.getElementById('timer-btn').innerText = "Stop";
            document.getElementById('timer-btn').style.background = "var(--del-color)";
            
            sleepTimerInterval = setInterval(() => {
                let remain = sleepEndTime - Date.now();
                if(remain <= 0) {
                    clearInterval(sleepTimerInterval);
                } else {
                    let m = Math.floor(remain / 60000);
                    let s = Math.floor((remain % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `Remaining: ${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);

            sleepTimerId = setTimeout(() => {
                audio.pause();
                document.getElementById('timer-display').innerText = "Timer finished.";
                document.getElementById('timer-btn').innerText = "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                sleepTimerId = null;
                clearInterval(sleepTimerInterval);
            }, min * 60000);
        }
    </script>
</body>
</html>
