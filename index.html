        function togglePlay() { 
            if(audio.paused) {
                audio.play(); 
            } else {
                audio.pause(); 
            }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { 
                audio.currentTime = 0;
                audio.play();
                return; 
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); 
                audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() { 
            if (playingTracks.length === 0) return;
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                if(audio.paused) audio.play();
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }

        function seekAudio(val) {
            if(!isNaN(val) && isFinite(val)) {
                audio.currentTime = val;
            }
        }

        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                if(pl) {
                    original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                }
            } else if(mode === 'art') {
                original = tracks.filter(tx => parseArtistString(tx.artist).some(x => x.name === currentArtist));
            } else {
                original = [...tracks];
            }
            
            if(original.length === 0) return;

            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            
            if(currentTrackIdx !== -1) {
                loadTrack(playingTracks[currentTrackIdx]);
            }
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            } else {
                document.documentElement.style.setProperty('--blur-bg', 'none');
            }
        }
        
        function loadTrack(tObj) {
            if(!tObj) return;
            
            try {
                if(audio.src && audio.src.startsWith('blob:')) {
                    URL.revokeObjectURL(audio.src);
                }
                audio.src = URL.createObjectURL(tObj.data);
                
                document.getElementById('m-img').src = tObj.cover || ''; 
                checkMarquee('m-title', tObj.name);
                
                document.getElementById('f-img').src = tObj.cover || ''; 
                checkMarquee('f-title', tObj.name); 
                document.getElementById('f-artist').innerText = formatDisplayArtist(tObj.artist);
                
                document.getElementById('mini').style.display = 'flex';
                document.getElementById('f-lyrics-view').classList.remove('active');
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                
                updateFavBtn(tObj.favorite);
                updatePlayerBlurBg();
                setupMediaSession();
                
                // Audio retry bug fix -> explicitly call load and handle promise
                audio.load();
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Play failed, retrying...", error);
                        // Optional fallback logic if auto-play blocked
                    });
                }
            } catch(e) {
                console.error("Error loading track:", e);
            }
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if(el) {
                if (text.length > 20) {
                    el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
                } else {
                    el.innerText = text;
                }
            }
        }

        function formatTime(s) { 
            if(isNaN(s) || !isFinite(s)) return "0:00";
            let m=Math.floor(s/60);
            let sec=Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }

        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration) && isFinite(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                updateLyricsHighlight();
            } 
        };

        audio.onplay = () => { 
            const mpp = document.getElementById('m-pp');
            if(mpp) mpp.className = 'fa-solid fa-pause'; 
            const fpp = document.getElementById('f-pp');
            if(fpp) fpp.className = 'fa-solid fa-pause'; 
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
            }
        };

        audio.onpause = () => { 
            const mpp = document.getElementById('m-pp');
            if(mpp) mpp.className = 'fa-solid fa-play'; 
            const fpp = document.getElementById('f-pp');
            if(fpp) fpp.className = 'fa-solid fa-play'; 
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
            }
        };

        audio.onended = () => { 
            next(); 
        };

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                const tObj = playingTracks[currentTrackIdx];
                if(tObj) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: tObj.name,
                        artist: formatDisplayArtist(tObj.artist),
                        album: "Pure Wish",
                        artwork: tObj.cover ? [
                            { src: tObj.cover, sizes: '512x512', type: 'image/jpeg' },
                            { src: tObj.cover, sizes: '256x256', type: 'image/jpeg' }
                        ] : []
                    });
                }
                
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('seekbackward', (d) => { audio.currentTime = Math.max(audio.currentTime - (d.seekOffset || 10), 0); });
                navigator.mediaSession.setActionHandler('seekforward', (d) => { audio.currentTime = Math.min(audio.currentTime + (d.seekOffset || 10), audio.duration); });
                navigator.mediaSession.setActionHandler('seekto', (d) => { if(d.fastSeek && 'fastSeek' in audio) audio.fastSeek(d.seekTime); else audio.currentTime = d.seekTime; });
                navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                navigator.mediaSession.setActionHandler('nexttrack', () => next());
            }
        }

        function renderTrackArtists() {
            const container = document.getElementById('track-active-artists');
            if(container) {
                container.innerHTML = currentTrackArtists.map((a, i) => `
                    <div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">
                        <span class="main-sub-toggle ${a.type==='main'?'main':''}" onclick="toggleTrackArtistType(${i})">${a.type==='main'?t('main'):t('sub')}</span>
                        ${a.name} 
                        <i class="fa-solid fa-xmark" onclick="removeTrackArtist(${i})" style="cursor:pointer; font-size:12px; opacity:0.7;"></i>
                    </div>
                `).join('');
            }
        }

        function toggleTrackArtistType(index) {
            if(currentTrackArtists[index]) {
                currentTrackArtists[index].type = currentTrackArtists[index].type === 'main' ? 'sub' : 'main';
                renderTrackArtists();
            }
        }

        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if(val && !currentTrackArtists.some(x => x.name === val)) {
                currentTrackArtists.push({name: val, type: 'main'});
                el.value = '';
                renderTrackArtists();
            }
        }

        function removeTrackArtist(index) {
            currentTrackArtists.splice(index, 1);
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; 
            const tObj = tracks.find(x => x.id === id); 
            if(!tObj) return;
            
            const en = document.getElementById('edit-name');
            if(en) en.value = tObj.name; 
            
            currentTrackArtists = parseArtistString(tObj.artist);
            
            const ea = document.getElementById('edit-artist-input');
            if(ea) ea.value = "";
            renderTrackArtists();
            
            const ey = document.getElementById('edit-year');
            if(ey) ey.value = tObj.year || ""; 
            
            const el = document.getElementById('edit-lyrics');
            if(el) el.value = tObj.lyrics || ""; 
            
            updateArtistSuggest(""); 
            setupLyricSyncEditor();
            
            const modal = document.getElementById('edit-modal');
            if(modal) modal.style.display = 'flex'; 
        }

        function closeEdit() { 
            const modal = document.getElementById('edit-modal');
            if(modal) modal.style.display = 'none'; 
            document.getElementById('lyric-sync-editor').style.display = 'none';
        }

        function saveEdit() { 
            const tObj = tracks.find(x => x.id === editingId); 
            if(!tObj) return;
            
            tObj.name = document.getElementById('edit-name').value; 
            tObj.artist = buildArtistString(currentTrackArtists);
            tObj.year = document.getElementById('edit-year').value; 
            tObj.lyrics = document.getElementById('edit-lyrics').value; 
            
            db.transaction("songs","readwrite").objectStore("songs").put(tObj).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
                
                if(currentTrackIdx !== -1 && playingTracks[currentTrackIdx].id === tObj.id) {
                    playingTracks[currentTrackIdx] = tObj;
                    checkMarquee('m-title', tObj.name);
                    checkMarquee('f-title', tObj.name); 
                    document.getElementById('f-artist').innerText = formatDisplayArtist(tObj.artist);
                }
            }; 
        }

        function formatPastedLyrics() {
            const el = document.getElementById('edit-lyrics');
            if(!el) return;
            let val = el.value;
            if(!val) return;
            
            let lines = val.split('\n');
            let formatted = lines.map(l => {
                let txt = l.trim();
                if(txt && !txt.match(/^\[\d{2}:\d{2}\.\d{2,3}\]/)) {
                    return `[00:00.00] ${txt}`;
                }
                return txt;
            });
            el.value = formatted.join('\n');
            setupLyricSyncEditor();
        }

        function setupLyricSyncEditor() {
            const el = document.getElementById('edit-lyrics');
            const editor = document.getElementById('lyric-sync-editor');
            const linesContainer = document.getElementById('lyric-sync-lines');
            if(!el || !editor || !linesContainer) return;
            
            let val = el.value;
            if(val && val.includes('[00:00.00]')) {
                editor.style.display = 'flex';
                let lines = val.split('\n');
                linesContainer.innerHTML = lines.map((l, i) => {
                    let match = l.match(/^\[(.*?)\]\s*(.*)/);
                    if(match) {
                        return `<div class="lyric-edit-line">
                            <span class="lyric-timestamp" id="ts-${i}">${match[1]}</span>
                            <span style="flex:1; cursor:pointer;" onclick="stampLyricTime(${i})">${match[2] || '&nbsp;'}</span>
                        </div>`;
                    }
                    return '';
                }).join('');
            } else {
                editor.style.display = 'none';
            }
        }

        function stampLyricTime(idx) {
            let ct = audio.currentTime;
            let m = Math.floor(ct / 60).toString().padStart(2, '0');
            let s = Math.floor(ct % 60).toString().padStart(2, '0');
            let ms = Math.floor((ct % 1) * 100).toString().padStart(2, '0');
            let tsStr = `${m}:${s}.${ms}`;
            
            let tsEl = document.getElementById(`ts-${idx}`);
            if(tsEl) {
                tsEl.innerText = tsStr;
                tsEl.style.color = "var(--icon-active)";
                tsEl.style.opacity = "1";
            }
            
            const el = document.getElementById('edit-lyrics');
            if(el) {
                let lines = el.value.split('\n');
                let match = lines[idx].match(/^\[(.*?)\]\s*(.*)/);
                if(match) {
                    lines[idx] = `[${tsStr}] ${match[2]}`;
                    el.value = lines.join('\n');
                }
            }
        }

        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            const btn = document.getElementById('btn-shuffle');
            if(btn) btn.style.opacity = isShuffle ? "1" : "0.4"; 
        }

        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            const btn = document.getElementById('btn-repeat');
            const badge = document.getElementById('repeat-badge');
            if(btn) btn.style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            if(badge) badge.style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function deleteSong(id) { 
            if(confirm(t("delete") + "?")) {
                db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess = () => {
                    loadAll();
                };
            }
        }

        function deletePlaylist(id) { 
            if(confirm(t("delete") + "?")) {
                db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess = () => {
                    loadAll();
                };
            }
        }

        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl) {
                pl.songIds = pl.songIds.filter(id => id !== sid); 
                db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
            }
        }

        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl) {
                const checked = document.querySelectorAll('#bulk-list input:checked');
                const newIds = Array.from(checked).map(i => parseInt(i.value)); 
                pl.songIds = newIds; 
                db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                    loadAll(); 
                    const modal = document.getElementById('bulk-modal');
                    if(modal) modal.remove(); 
                }; 
            }
        }
        
        function renderPlTags() {
            const container = document.getElementById('pl-active-tags');
            if(container) {
                container.innerHTML = currentPlTags.map(tg => `
                    <div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">
                        ${tg} 
                        <i class="fa-solid fa-xmark" onclick="removePlTag('${tg}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i>
                    </div>
                `).join('');
            }
        }

        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }

        function removePlTag(tg) {
            currentPlTags = currentPlTags.filter(x => x !== tg);
            renderPlTags();
        }

        function togglePlFav() {
            tempPlFav = !tempPlFav;
            const btn = document.getElementById('pl-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(icon) {
                    if(tempPlFav) {
                        icon.className = 'fa-solid fa-star star-icon active';
                    } else {
                        icon.className = 'fa-regular fa-star star-icon';
                    }
                }
            }
        }

        function openPlEdit(id) { 
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            if(!pl) return;
            
            const nEl = document.getElementById('pl-edit-name');
            if(nEl) nEl.value = pl.name; 
            
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            tempPlFav = pl.favorite || false;
            
            const btn = document.getElementById('pl-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(icon) {
                    icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
                }
            }
            
            const tEl = document.getElementById('pl-edit-tag');
            if(tEl) tEl.value = '';
            
            renderPlTags();
            
            tempPlImg = pl.cover; 
            const imgEl = document.getElementById('pl-edit-img');
            if(imgEl) imgEl.src = tempPlImg || ""; 
            
            updateTagSuggest(""); 
            
            const modal = document.getElementById('pl-edit-modal');
            if(modal) modal.style.display = 'flex'; 
        }

        function closePlEdit() { 
            const modal = document.getElementById('pl-edit-modal');
            if(modal) modal.style.display = 'none'; 
        }

        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            if(!pl) return;
            
            const nEl = document.getElementById('pl-edit-name');
            if(nEl) pl.name = nEl.value; 
            
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            pl.favorite = tempPlFav;
            
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    const imgEl = document.getElementById('pl-edit-img');
                    if(imgEl) imgEl.src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            if(!container) return;
            
            const artists = getAllArtists(); 
            let html = "";
            artists.forEach(a => {
                html += `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`;
            });
            container.innerHTML = html; 
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            if(!container) return;
            
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) {
                    p.tag.split(/[,、]/).forEach(tg => {
                        const tr = tg.trim(); 
                        if(tr && !allTags.includes(tr)) allTags.push(tr);
                    });
                }
            });
            
            let html = "";
            allTags.forEach(t => {
                html += `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`;
            });
            container.innerHTML = html; 
        }

        function selectArtistIcon(name) { 
            editingArtistName = name; 
            const uploadBtn = document.getElementById('artist-icon-upload');
            if(uploadBtn) uploadBtn.click(); 
        }

        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { 
                        name: editingArtistName, 
                        favorite: false, 
                        isParent: false, 
                        children: [], 
                        color: '' 
                    };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            if(!a) return;
            let meta = artistMeta[a];
            if(!meta) {
                meta = { name: a, favorite: false, isParent: false, children: [], color: '' };
            }
            editingArtistSetupName = a;
            
            const body = document.getElementById('artist-setup-body');
            if(!body) return;
            
            let isPar = meta.isParent ? "checked" : "";
            let childsStr = meta.children ? meta.children.join(', ') : "";
            let col = meta.color || "#000000";
            
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                
                <span class="field-label">Theme Color</span>
                <input type="color" id="setup-artist-color" value="${col}" style="width:50px; height:50px; border:none; border-radius:10px; margin-bottom:20px;">
                
                <span class="field-label">Hierarchy</span>
                <label class="check-item" style="padding-left:0; border:none;">
                    <input type="checkbox" id="setup-is-parent" ${isPar} onchange="toggleSetupChildren(this.checked)">
                    <span>Is Parent Group / Idol Group</span>
                </label>
                
                <div id="setup-children-container" style="display:${meta.isParent ? 'block' : 'none'};">
                    <span class="field-label">Children / Members (Comma separated)</span>
                    <input type="text" id="setup-children" class="edit-input" value="${childsStr}" placeholder="e.g. Member1, Member2">
                </div>
            `;
            
            const modal = document.getElementById('artist-setup-modal');
            if(modal) modal.style.display = 'flex';
        }

        function toggleSetupChildren(isChecked) {
            const container = document.getElementById('setup-children-container');
            if(container) {
                container.style.display = isChecked ? 'block' : 'none';
            }
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            let isPar = document.getElementById('setup-is-parent').checked;
            let col = document.getElementById('setup-artist-color').value;
            let childrenRaw = document.getElementById('setup-children').value;
            let children = isPar ? childrenRaw.split(/[,、]/).map(x=>x.trim()).filter(x=>x) : [];
            
            let meta = artistMeta[oldName] || { name: oldName, favorite: false };
            
            if(newName && newName !== oldName) {
                meta.name = newName;
                meta.isParent = isPar;
                meta.children = children;
                meta.color = col;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let parsed = parseArtistString(t.artist);
                    let changed = false;
                    parsed.forEach(p => {
                        if(p.name === oldName) {
                            p.name = newName;
                            changed = true;
                        }
                    });
                    if(changed) {
                        t.artist = buildArtistString(parsed);
                        store.put(t);
                        tracksChanged = true;
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                
                const modal = document.getElementById('artist-setup-modal');
                if(modal) modal.style.display = 'none';
                
                if(tracksChanged) {
                    tx.oncomplete = loadAll; 
                } else {
                    loadAll();
                }

            } else {
                meta.isParent = isPar;
                meta.children = children;
                meta.color = col;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    const modal = document.getElementById('artist-setup-modal');
                    if(modal) modal.style.display = 'none';
                    loadAll();
                };
            }
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let i = 0; i < files.length; i++) {
                let f = files[i];
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let j=0; j<d.length; j++) {
                                s += String.fromCharCode(d[j]);
                            }
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: tag.tags.artist || "Unknown", 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: "Unknown", 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        function toggleQueue() { 
            const q = document.getElementById('queue-panel');
            if(q) {
                q.classList.toggle('open'); 
                renderQueue(); 
            }
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            if(!list) return;
            
            if (currentTrackIdx === -1 || playingTracks.length === 0) {
                list.innerHTML = `<div style="padding:50px; text-align:center; color:#ccc;">${t('queueEmpty')}</div>`;
                return;
            }
            
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if(nextTracks.length === 0) {
                list.innerHTML = `<div style="padding:50px; text-align:center; color:#ccc;">${t('queueEmpty')}</div>`;
            } else {
                let html = "";
                nextTracks.forEach((tObj, i) => {
                    html += `
                    <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx]); toggleQueue();">
                        <img src="${tObj.cover||''}" style="width:40px; height:40px; object-fit:cover; border-radius:8px;">
                        <div>
                            <div style="font-weight:800;">${tObj.name}</div>
                            <div style="font-size:11px; color:var(--icon-color);">${formatDisplayArtist(tObj.artist)}</div>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            }
        }
    </script>
</body>
</html>
