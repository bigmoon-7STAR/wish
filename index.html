                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px; background:transparent;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px; border:none; background:transparent;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); 
            let grp = document.getElementById('setup-is-group').checked;
            renderArtistSetup(grp); 
        }
        
        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            let grp = document.getElementById('setup-is-group').checked;
            renderArtistSetup(grp); 
        }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        
        function handleDragOver(e, i) { 
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move'; 
        }
        
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                let grp = document.getElementById('setup-is-group').checked;
                renderArtistSetup(grp);
            }
        }
        
        function handleDragEnd(e) { 
            e.target.classList.remove('dragging'); 
            draggedMemIndex = -1; 
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let m = artistMeta[a];
                let imgHtml = m && m.icon ? `<img src="${m.icon}" style="width:30px;height:30px;border-radius:50%;margin-right:10px;object-fit:cover;">` : `<div style="display:inline-block;width:30px;height:30px;border-radius:50%;margin-right:10px;background:var(--icon-color);"></div>`;
                return `<div class="check-item" onclick="linkArtistMember('${a}')">${imgHtml}<span style="font-weight:bold;">${a}</span></div>`;
            }).join('') + `<div class="check-item" onclick="linkArtistMember('')" style="color:var(--del-color); font-weight:bold;"><i class="fa-solid fa-unlink" style="margin-right:10px;"></i>Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        
        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if (a) {
                    currentMembersEdit[currentSyncIndex].name = a;
                }
                let grp = document.getElementById('setup-is-group').checked;
                renderArtistSetup(grp);
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            let isGrp = document.getElementById('setup-is-group').checked;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [], isGroup: false, parentId: null };
                meta.name = newName;
                meta.members = currentMembersEdit;
                meta.isGroup = isGrp;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let changed = false;
                    if(t.mainArtists) {
                        for(let i=0; i<t.mainArtists.length; i++) { 
                            if(t.mainArtists[i] === oldName) { t.mainArtists[i] = newName; changed = true; } 
                        }
                    }
                    if(t.subArtists) {
                        for(let i=0; i<t.subArtists.length; i++) { 
                            if(t.subArtists[i] === oldName) { t.subArtists[i] = newName; changed = true; } 
                        }
                    }
                    if(changed) { store.put(t); tracksChanged = true; }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                
                updateParentIds(newName, currentMembersEdit);
                
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, members: [], isGroup: false, parentId: null };
                meta.members = currentMembersEdit;
                meta.isGroup = isGrp;
                artistMeta[oldName] = meta;
                
                updateParentIds(oldName, currentMembersEdit);
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }
        
        function updateParentIds(parentName, members) {
            let tx = db.transaction("artistMeta", "readwrite");
            let store = tx.objectStore("artistMeta");
            members.forEach(m => {
                if(m.linked) {
                    let childMeta = artistMeta[m.linked] || { name: m.linked, members: [], isGroup: false };
                    childMeta.parentId = parentName;
                    artistMeta[m.linked] = childMeta;
                    store.put(childMeta);
                }
            });
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let mainArtists = t.mainArtists || [];
            let allMembers = [];
            
            mainArtists.forEach(a => {
                let trimA = a.trim();
                if(artistMeta[trimA] && artistMeta[trimA].members) {
                    allMembers = allMembers.concat(artistMeta[trimA].members);
                }
            });
            
            currentPaintColor = '';
            currentPaintMembers = [];
            
            editingLyricsData = t.lyricsData ? JSON.parse(JSON.stringify(t.lyricsData)) : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map((m, idx) => `
                <div onclick="togglePaintMember(${idx})" class="paint-member-btn" id="pmem-${idx}" data-color="${m.color}" data-name="${m.name}" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px; opacity:0.5; transition:0.3s;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('') + `
                <div onclick="clearPaintMembers()" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:transparent; border:2px dashed var(--icon-color); display:flex; justify-content:center; align-items:center; color:var(--icon-color);"><i class="fa-solid fa-eraser"></i></div>
                    <span style="font-size:10px; margin-top:4px;">Clear</span>
                </div>
            `;

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }
        
        function togglePaintMember(idx) {
            let el = document.getElementById(`pmem-${idx}`);
            let c = el.getAttribute('data-color');
            let n = el.getAttribute('data-name');
            
            let existingIdx = currentPaintMembers.findIndex(x => x.name === n);
            if (existingIdx !== -1) {
                currentPaintMembers.splice(existingIdx, 1);
                el.style.opacity = "0.5";
                el.style.transform = "scale(1)";
            } else {
                currentPaintMembers.push({name: n, color: c});
                el.style.opacity = "1";
                el.style.transform = "scale(1.1)";
            }
        }
        
        function clearPaintMembers() {
            currentPaintMembers = [];
            document.querySelectorAll('.paint-member-btn').forEach(el => {
                el.style.opacity = "0.5";
                el.style.transform = "scale(1)";
            });
        }

        function addLyricLine() {
            editingLyricsData.push({ time: 0, text: "", members: [] });
            renderPaintLyrics();
        }
        
        function batchInsertLyrics() {
            document.getElementById('batch-lyric-text').value = '';
            document.getElementById('batch-lyric-modal').style.display = 'flex';
        }
        
        function applyBatchLyrics() {
            let text = document.getElementById('batch-lyric-text').value;
            let lines = text.split('\n').map(l => l.trim()).filter(l => l);
            
            lines.forEach(l => {
                editingLyricsData.push({ time: 0, text: l, members: [] });
            });
            
            document.getElementById('batch-lyric-modal').style.display = 'none';
            renderPaintLyrics();
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            
            container.innerHTML = editingLyricsData.map((l, i) => {
                let gradient = "transparent";
                let membersText = "";
                
                if (l.members && l.members.length > 0) {
                    membersText = l.members.map(m => m.name).join(', ');
                    let colors = l.members.map(m => m.color || '#fff');
                    if (colors.length === 1) {
                        gradient = colors[0];
                    } else {
                        gradient = `linear-gradient(90deg, ${colors.join(', ')})`;
                    }
                }
                
                let borderStyle = gradient.includes('gradient') ? `border-image: ${gradient} 1; border-left-width: 6px; border-left-style: solid;` : `border-left: 6px solid ${gradient};`;
                if(gradient === "transparent") borderStyle = `border-left: 6px solid transparent;`;
                
                return `
                <div class="lyric-edit-row" style="${borderStyle}">
                    <div style="display:flex; flex-direction:column; align-items:center; width:60px; margin-right:10px;">
                        <button class="lyric-time-btn" onclick="captureTime(${i})">${l.time.toFixed(1)}s</button>
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <input type="text" class="lyric-text-input" value="${l.text}" oninput="updateLyricText(${i}, this.value)" placeholder="Lyric text...">
                        <div style="font-size:9px; color:var(--icon-color); min-height:12px; margin-top:4px;" onclick="applyMembersToLine(${i})">
                            ${membersText ? membersText : 'Tap here to apply selected members'}
                        </div>
                    </div>
                    <button onclick="removeLyricLine(${i})" style="background:none; border:none; color:var(--del-color); padding:10px;"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
            }).join('');
        }
        
        function captureTime(i) {
            editingLyricsData[i].time = audio.currentTime;
            renderPaintLyrics();
        }
        
        function updateLyricText(i, val) {
            editingLyricsData[i].text = val;
        }
        
        function applyMembersToLine(i) {
            editingLyricsData[i].members = [...currentPaintMembers];
            renderPaintLyrics();
        }
        
        function removeLyricLine(i) {
            editingLyricsData.splice(i, 1);
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            
            editingLyricsData.sort((a,b) => a.time - b.time);
            t.lyricsData = editingLyricsData;
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        let mArts = tag.tags.artist ? tag.tags.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x) : ["Unknown"];
                        
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            mainArtists: mArts,
                            subArtists: [],
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricsData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            mainArtists: ["Unknown"], 
                            subArtists: [],
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricsData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { 
            if(isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }
        
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${formatArtistName(t.mainArtists, t.subArtists)}</div>
                    </div>
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
    </body>
</html>
