<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio ✧ Wishcore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --key-color: #ff2d55;
            --text-main: #5e5e7e;
            --sub-text: rgba(94, 94, 126, 0.6);
            --glass: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #e8ecf9 50%, #fdf2f8 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        /* --- Header & Search --- */
        .header { padding: calc(45px + env(safe-area-inset-top)) 20px 10px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.05); z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { font-size: 17px; font-weight: 600; color: #000; opacity: 0.8; margin: 0; }

        .search-container { padding: 10px 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; gap: 10px; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
        #search-input { flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.4); font-size: 14px; outline: none; }
        .sort-select { background: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 5px; font-size: 11px; color: var(--sub-text); padding: 4px; }

        /* --- Content Area --- */
        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px; padding: 15px; width: 100%; max-width: 100vw; }
        
        .card { position: relative; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .card:active { transform: scale(0.98); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; object-fit: cover; box-shadow: 0 8px 20px rgba(167, 139, 250, 0.1); border: 1px solid rgba(255,255,255,0.8); display: block; }
        .card-title { margin-top:8px; font-size:13px; font-weight:600; color:#000; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .card-sub { font-size:11px; color: var(--sub-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .small-year { font-size: 9px; opacity: 0.6; margin-left: 4px; }
        .card-tag { display: inline-block; font-size: 9px; background: rgba(255,45,85,0.05); color: var(--key-color); padding: 1px 5px; border-radius: 4px; margin-top: 4px; font-weight: bold; }

        .list-item { position: relative; display: flex; align-items: center; padding: 12px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.03); cursor: pointer; background: white; z-index: 2; transition: transform 0.3s ease-out; }
        .list-item img:not(.artist-icon) { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .artist-icon-container { width: 55px; height: 55px; margin-right: 15px; flex-shrink: 0; }
        .artist-icon { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: rgba(255,45,85,0.1); display: flex; align-items: center; justify-content: center; color: var(--key-color); position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }

        .swipe-container { position: relative; overflow: hidden; background: #FF3B30; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: #FF3B30; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; z-index: 1; }

        /* --- Full Player --- */
        .full-player { position: fixed; inset: 0; z-index: 5000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); visibility: hidden; background: linear-gradient(150deg, #fef2f2, #e0e7ff, #fae8ff); background-size: 300% 300%; animation: moveBG 15s ease infinite; }
        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .full-player.active { transform: translateY(0); visibility: visible; }
        #bg-blur-overlay { position: absolute; inset: 0; z-index: -1; backdrop-filter: blur(60px) saturate(1.5); -webkit-backdrop-filter: blur(60px) saturate(1.5); background: rgba(255, 255, 255, 0.1); }

        #f-artwork-container { width: 85vw; max-width: 340px; aspect-ratio: 1/1; position: relative; cursor: pointer; }
        #f-img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.8); transition: opacity 0.3s; }
        #f-lyrics-view { position: absolute; inset: 0; background: rgba(255,255,255,0.5); backdrop-filter: blur(25px); border-radius: 20px; padding: 30px 20px; overflow-y: auto; display: none; flex-direction: column; align-items: center; text-align: center; font-size: 17px; line-height: 2; color: #000; font-weight: 600; white-space: pre-wrap; }
        #f-lyrics-view.active { display: flex; }

        .seeker { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(0, 0, 0, 0.05); border-radius: 10px; outline: none; margin: 25px 0 10px; }
        .seeker::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .queue-panel { position: absolute; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(30px); z-index: 6000; transform: translateY(100%); transition: transform 0.4s ease; display: flex; flex-direction: column; }
        .queue-panel.open { transform: translateY(0); }
        .queue-header { padding: 20px; border-bottom: 0.5px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }

        .mini-player { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom)); left: 12px; right: 12px; height: 60px; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border-radius: 14px; display: none; align-items: center; padding: 0 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 2000; border: 1px solid rgba(255,255,255,0.5); overflow: hidden; }
        #m-img { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; object-fit: cover; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: calc(65px + env(safe-area-inset-bottom)); background: rgba(255,255,255,0.6); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.05); z-index: 1000; }
        .tab-item { border:none; background:none; color: var(--sub-text); font-weight: 600; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 33%; }
        .tab-item.active { color: var(--key-color); }
        .tab-item i { font-size: 22px; }

        .modal { position: fixed; inset: 0; background: linear-gradient(135deg, #fff 0%, #f0f4ff 100%); z-index: 7000; display: none; flex-direction: column; overflow-y: auto; }
        .modal.active { display: flex; }
        .edit-input { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 16px; background: rgba(255,255,255,0.7); }

        .artist-chip { display: inline-block; padding: 6px 12px; background: white; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; font-size: 11px; margin: 0 5px 10px 0; cursor: pointer; }
        .del-badge { position: absolute; top: -8px; left: -8px; width: 24px; height: 24px; background: #FF3B30; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid white; z-index: 10; font-size: 12px; }
        .editing .del-badge { display: flex; }

        /* 追加：一括選択用スタイル */
        .check-item { display: flex; align-items: center; padding: 10px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.03); }
        .check-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--key-color); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" onclick="handleHeaderLeft()">編集</button>
            <h2 id="view-title">ライブラリ</h2>
            <button id="right-btn" onclick="handleHeaderRight()"><i class="fa-solid fa-circle-plus"></i></button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="曲名やアーティストを検索..." oninput="render()">
        <select id="sort-type" class="sort-select" onchange="render()">
            <option value="added">登録順</option>
            <option value="name_asc">名前順</option>
            <option value="name_desc">名前順(逆)</option>
            <option value="year">発行日順</option>
        </select>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src="">
        <div id="m-title" style="flex:1; font-weight:600; font-size:14px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:24px; color:#1d1d1f; padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div class="full-player" id="full">
        <div id="bg-blur-overlay"></div>
        <div onclick="closeFull()" style="padding:20px; text-align:center; cursor:pointer;"><div style="width:36px; height:5px; border-radius:3px; background:rgba(0,0,0,0.1); margin:0 auto;"></div></div>
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 30px;">
            <div id="f-artwork-container" onclick="toggleLyrics()">
                <img id="f-img">
                <div id="f-lyrics-view"></div>
            </div>
            
            <div style="width:100%; margin-top:40px; display:flex; justify-content:space-between; align-items:flex-end;">
                <div style="flex:1; overflow:hidden;">
                    <div id="f-title" style="font-size:22px; font-weight:800; color:#000; opacity:0.9; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
                    <div id="f-artist" style="font-size:18px; color:var(--key-color); margin-top:5px; font-weight:500;"></div>
                </div>
                <button onclick="toggleQueue()" style="background:none; border:none; color:rgba(0,0,0,0.4); font-size:20px; padding:10px;"><i class="fa-solid fa-list-ul"></i></button>
            </div>
            
            <input type="range" class="seeker" id="seeker" value="0" step="0.1" oninput="audio.currentTime=this.value">
            <div style="width:100%; display:flex; justify-content:space-between; color:rgba(0,0,0,0.4); font-size:12px; font-weight:600;">
                <span id="cur-time">0:00</span><span id="dur-time">0:00</span>
            </div>

            <div style="display:flex; width:100%; justify-content:space-between; align-items:center; margin-top:30px;">
                <button onclick="toggleShuffle()" id="btn-shuffle" style="background:none; border:none; font-size:20px; color:rgba(0,0,0,0.2);"><i class="fa-solid fa-shuffle"></i></button>
                <div style="display:flex; align-items:center; gap:35px;">
                    <i class="fa-solid fa-backward-step" style="font-size:30px;" onclick="prev()"></i>
                    <i id="f-pp" class="fa-solid fa-play" style="font-size:55px;" onclick="togglePlay()"></i>
                    <i class="fa-solid fa-forward-step" style="font-size:30px;" onclick="next()"></i>
                </div>
                <button onclick="toggleRepeat()" id="btn-repeat" style="background:none; border:none; font-size:20px; color:rgba(0,0,0,0.2); position:relative;"><i class="fa-solid fa-repeat"></i><span id="repeat-badge" style="display:none; position:absolute; top:-5px; right:-8px; background:var(--key-color); color:white; border-radius:50%; width:14px; height:14px; font-size:9px; text-align:center; line-height:14px;">1</span></button>
            </div>
        </div>

        <div class="queue-panel" id="queue-panel">
            <div class="queue-header">
                <h3 style="margin:0; font-size:18px;">再生待ち</h3>
                <button onclick="toggleQueue()" style="background:none; border:none; font-size:18px; color:var(--key-color); font-weight:bold;">完了</button>
            </div>
            <div id="queue-list" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="header">
            <div class="header-top"><button onclick="closeEdit()">閉じる</button><h2>編集</h2><button onclick="saveEdit()" style="color:var(--key-color); font-weight:bold;">保存</button></div>
        </div>
        <div class="modal-body" style="padding:25px;">
            <label style="font-size:12px; color:var(--sub-text);">曲名</label>
            <input type="text" id="edit-name" class="edit-input">
            <label style="font-size:12px; color:var(--sub-text);">アーティスト検索/入力</label>
            <input type="text" id="edit-artist" class="edit-input" placeholder="名前を入力..." oninput="updateArtistSuggest(this.value)">
            <div id="artist-quick-select" style="margin-bottom: 15px; max-height: 100px; overflow-y: auto;"></div>
            <label style="font-size:12px; color:var(--sub-text);">発行日 (Year)</label>
            <input type="text" id="edit-year" class="edit-input" placeholder="2026">
            <label style="font-size:12px; color:var(--sub-text);">歌詞</label>
            <textarea id="edit-lyrics" class="edit-input" style="height:200px; font-family: inherit; font-size: 14px;"></textarea>
        </div>
    </div>

    <div id="pl-edit-modal" class="modal"><div class="header"><div class="header-top"><button onclick="closePlEdit()">閉じる</button><h2>リスト設定</h2><button onclick="savePlEdit()" style="color:var(--key-color); font-weight:bold;">保存</button></div></div><div class="modal-body" style="padding:25px; text-align:center;"><img id="pl-edit-img" style="width:150px; height:150px; border-radius:15px; object-fit:cover; background:#eee; margin-bottom:20px; border:1px solid #fff; cursor:pointer;" onclick="document.getElementById('pl-img-input').click()"><input type="file" id="pl-img-input" style="display:none" onchange="previewPlImg(event)"><input type="text" id="pl-edit-name" class="edit-input" placeholder="リスト名"><input type="text" id="pl-edit-tag" class="edit-input" placeholder="タグ (例: #Favorite)"></div></div>

    <div class="tab-bar">
        <button class="tab-item active" id="tab-artist" onclick="switchTab('artists')"><i class="fa-solid fa-user-tag"></i><span>アーティスト</span></button>
        <button class="tab-item" id="tab-lib" onclick="switchTab('library')"><i class="fa-solid fa-square-poll-vertical"></i><span>ライブラリ</span></button>
        <button class="tab-item" id="tab-play" onclick="switchTab('playlist')"><i class="fa-solid fa-music"></i><span>リスト</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <input type="file" id="artist-icon-upload" style="display:none" accept="image/*" onchange="saveArtistIcon(event)">
    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], artistMeta = {}, isEditing = false, currentView = 'artists', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0;
        let historyTracks = []; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        let pressTimer;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudioWishcore_V4", 3);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => artistMeta[m.name] = m.icon);
                render();
            };
        }

        function sortList(list, type) {
            if (type === 'name_asc') return list.sort((a,b) => (a.name||'').localeCompare(b.name||'','ja'));
            if (type === 'name_desc') return list.sort((a,b) => (b.name||'').localeCompare(a.name||'','ja'));
            if (type === 'year') return list.sort((a,b) => (b.year||0).toString().localeCompare((a.year||0).toString()));
            return list; // added
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-type').value;

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            document.getElementById(activeTabId).classList.add('active');

            if (currentView === 'library') {
                title.innerText = "Library"; display.className = "grid";
                let list = tracks.filter(t => t.name.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search));
                list = sortList(list, sort);
                display.innerHTML = list.map(t => `
                    <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                        <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-minus"></i></div>
                        <img src="${t.cover||''}" class="card-img">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${t.artist}<span class="small-year">${t.year||''}</span></div>
                    </div>`).join('');
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = "Artists"; display.className = isEditing ? "editing" : "";
                    let artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(search));
                    if(sort === 'name_desc') artists.sort((a,b) => b.localeCompare(a,'ja'));
                    else artists.sort((a,b) => a.localeCompare(b,'ja'));

                    display.innerHTML = artists.map(a => {
                        const icon = artistMeta[a] ? `<img src="${artistMeta[a]}" class="artist-icon">` : `<div class="artist-icon"><i class="fa-solid fa-user"></i></div>`;
                        return `<div class="list-item" 
                                onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')"
                                oncontextmenu="event.preventDefault(); createAutoPlaylist('${a}')"
                                ontouchstart="startPressTimer('${a}')" ontouchend="clearPressTimer()">
                                <div class="artist-icon-container">${icon}</div>
                                <div style="font-weight:700;">${a}</div>
                            </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => t.artist === currentArtist);
                    list = sortList(list, sort);
                    display.innerHTML = list.map(t => `
                        <div class="card" onclick="playSong(${t.id},'art')">
                            <img src="${t.cover||''}" class="card-img">
                            <div class="card-title">${t.name}</div>
                            <div class="card-sub">${t.artist}<span class="small-year">${t.year||''}</span></div>
                        </div>`).join('');
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = "Playlists"; display.className = "grid";
                    let list = playlists.filter(p => p.name.toLowerCase().includes(search) || (p.tag && p.tag.toLowerCase().includes(search)));
                    list = sortList(list, sort);
                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-minus"></i></div>
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img" style="background:#fff;">
                            <div class="card-title">${p.name}</div>
                            <div class="card-sub">${p.songIds.length} tracks</div>
                            ${p.tag?`<div class="card-tag">${p.tag}</div>`:''}
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    display.innerHTML = plSongs.map(t => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">削除</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')"
                                 ontouchstart="handleTouchStart(event, ${t.id})" ontouchmove="handleTouchMove(event, ${t.id})" ontouchend="handleTouchEnd(event, ${t.id})">
                                <img src="${t.cover||''}">
                                <div>
                                    <div style="font-weight:700;">${t.name}</div>
                                    <div style="font-size:12px; color:var(--key-color);">${t.artist}<span class="small-year">${t.year||''}</span></div>
                                </div>
                            </div>
                        </div>`).join('') + 
                        `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--key-color); color:white; border:none; padding:12px 24px; border-radius:24px; font-weight:bold; font-size:14px; box-shadow: 0 4px 10px rgba(255,45,85,0.2);">曲を一括追加</button></div>`;
                }
            }
            document.getElementById('left-btn').innerText = (currentArtist || currentPlaylistId) ? "戻る" : (isEditing ? "完了" : "編集");
        }

        // --- 自動プレイリスト作成 ---
        function startPressTimer(artist) { pressTimer = setTimeout(() => createAutoPlaylist(artist), 800); }
        function clearPressTimer() { clearTimeout(pressTimer); }
        function createAutoPlaylist(artistName) {
            if(!confirm(`${artistName}のプレイリストを作成しますか？`)) return;
            const artistTracks = tracks.filter(t => t.artist === artistName).map(t => t.id);
            const newPl = { name: artistName + " Best", songIds: artistTracks, tag: "#Auto", cover: artistMeta[artistName] || null };
            db.transaction("playlists", "readwrite").objectStore("playlists").add(newPl).onsuccess = loadAll;
        }

        // --- 歌詞表示 ---
        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const img = document.getElementById('f-img');
            const isActive = view.classList.toggle('active');
            img.style.opacity = isActive ? "0.1" : "1";
            if(isActive) {
                const track = playingTracks[currentTrackIdx];
                view.innerText = track?.lyrics || "歌詞が登録されていません";
            }
        }

        // --- 一括追加モーダル ---
        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); div.id="bulk-modal"; div.className="modal active";
            let html = `<div class="header"><div class="header-top"><button onclick="this.closest('.modal').remove()">キャンセル</button><h2>曲を一括追加</h2><button onclick="saveBulkAdd()" style="color:var(--key-color); font-weight:bold;">追加</button></div></div>`;
            html += `<div class="search-container"><input type="text" placeholder="アーティストや曲名で絞り込み..." oninput="filterBulk(this.value)"></div>`;
            html += `<div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:40px;">`;
            html += tracks.map(t => `
                <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist.toLowerCase()}">
                    <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                    <img src="${t.cover||''}" style="width:40px; height:40px; border-radius:5px; margin-right:10px;">
                    <div style="font-size:14px;"><b>${t.name}</b><br><span style="font-size:11px; color:var(--key-color);">${t.artist}</span></div>
                </label>`).join('');
            html += `</div>`;
            div.innerHTML = html;
            document.body.appendChild(div);
        }
        function filterBulk(val) {
            const v = val.toLowerCase();
            document.querySelectorAll('#bulk-list .check-item').forEach(el => {
                el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none';
            });
        }
        function saveBulkAdd() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const checked = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
            pl.songIds = checked;
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                document.getElementById('bulk-modal').remove();
                loadAll();
            };
        }

        // --- 曲の再生系 ---
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            }
            else if(mode === 'art') original = tracks.filter(tx => tx.artist === currentArtist);
            else original = [...tracks];
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function loadTrack(t) {
            if(!t) return;
            if(currentTrackIdx !== -1 && !historyTracks.some(h => h.id === t.id)) {
                historyTracks.unshift(t); if(historyTracks.length > 20) historyTracks.pop();
            }
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || ''; document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || ''; document.getElementById('f-title').innerText = t.name; document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-lyrics-view').classList.remove('active');
            document.getElementById('f-img').style.opacity = "1";
            audio.play();
            renderQueue();
        }

        // --- 編集系 ---
        function openEdit(id) { 
            editingId = id; const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            document.getElementById('edit-artist').value = t.artist; 
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(t.artist);
            document.getElementById('edit-modal').classList.add('active'); 
        }
        function updateArtistSuggest(val) {
            const container = document.getElementById('artist-quick-select');
            const artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(val.toLowerCase())).sort();
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist').value='${a}'">${a}</div>`).join('');
        }
        function closeEdit() { document.getElementById('edit-modal').classList.remove('active'); }
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = document.getElementById('edit-artist').value; 
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }

        // --- 既存UI機能の維持 ---
        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            if (moveX < 0) { el.style.transform = `translateX(${Math.max(moveX, -80)}px)`; el.style.transition = "none"; }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.3s ease-out";
            el.style.transform = moveX < -50 ? `translateX(-80px)` : `translateX(0)`;
        }

        function handleHeaderRight() { 
            if(currentPlaylistId) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') {
                const n = prompt("新しいプレイリスト名");
                if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null }).onsuccess = loadAll;
            } 
        }
        function handleHeaderLeft() { if(currentArtist) currentArtist=null; else if(currentPlaylistId) { if(isEditing) isEditing=false; else currentPlaylistId=null; } else isEditing=!isEditing; render(); }
        function switchTab(v) { currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; render(); }
        function openArtist(n) { currentArtist=n; render(); }
        function openPlaylist(id) { currentPlaylistId=id; render(); }
        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function openPlEdit(id) { editingPlId = id; const pl = playlists.find(p => p.id === id); document.getElementById('pl-edit-name').value = pl.name; document.getElementById('pl-edit-tag').value = pl.tag || ""; tempPlImg = pl.cover; document.getElementById('pl-edit-img').src = tempPlImg || ""; document.getElementById('pl-edit-modal').classList.add('active'); }
        function closePlEdit() { document.getElementById('pl-edit-modal').classList.remove('active'); }
        function previewPlImg(e) { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { tempPlImg = ev.target.result; document.getElementById('pl-edit-img').src = tempPlImg; }; r.readAsDataURL(f); } }
        function savePlEdit() { const pl = playlists.find(p => p.id === editingPlId); pl.name = document.getElementById('pl-edit-name').value; pl.tag = document.getElementById('pl-edit-tag').value; pl.cover = tempPlImg; db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; }
        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) {
            const f = e.target.files[0];
            if(f && editingArtistName) {
                const r = new FileReader();
                r.onload = (ev) => { db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({name: editingArtistName, icon: ev.target.result}).onsuccess = loadAll; };
                r.readAsDataURL(f);
            }
        }
        function deleteSong(id) { if(confirm("消去しますか？")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; }
        function deletePlaylist(id) { if(confirm("消去しますか？")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; }
        function removeTrackFromPlaylist(sid) { const pl = playlists.find(p => p.id === currentPlaylistId); pl.songIds = pl.songIds.filter(id => id !== sid); db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function next() { currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        function prev() { audio.currentTime > 3 ? audio.currentTime = 0 : (currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length, loadTrack(playingTracks[currentTrackIdx])); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.color = isShuffle ? "var(--key-color)" : "rgba(0,0,0,0.2)"; }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('btn-repeat').style.color = repeatMode ? "var(--key-color)" : "rgba(0,0,0,0.2)"; document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; }
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            let html = "";
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if (nextTracks.length > 0) {
                html += `<div style="padding:15px 20px; font-size:12px; font-weight:bold; color:var(--sub-text);">次に再生</div>`;
                html += nextTracks.map((t, i) => `<div class="list-item" onclick="jumpToQueue(${currentTrackIdx + 1 + i})"><img src="${t.cover||''}" style="width:40px; height:40px;"><div><div style="font-weight:600; font-size:14px;">${t.name}</div><div style="font-size:11px; color:var(--key-color);">${t.artist}</div></div></div>`).join('');
            }
            if (historyTracks.length > 0) {
                html += `<div style="padding:15px 20px; font-size:12px; font-weight:bold; color:var(--sub-text);">履歴</div>`;
                html += historyTracks.map(t => `<div class="list-item" onclick="loadTrackById(${t.id})"><img src="${t.cover||''}" style="width:40px; height:40px; filter: grayscale(0.5);"><div><div style="font-weight:600; font-size:14px; opacity:0.7;">${t.name}</div><div style="font-size:11px; color:var(--sub-text);">${t.artist}</div></div></div>`).join('');
            }
            list.innerHTML = html || `<div style="padding:40px; text-align:center; color:var(--sub-text);">キューは空です</div>`;
        }
        function jumpToQueue(idx) { currentTrackIdx = idx; loadTrack(playingTracks[idx]); }
        function loadTrackById(id) { const t = tracks.find(x => x.id === id); if(t) loadTrack(t); }

        audio.onended = () => repeatMode === 2 ? loadTrack(playingTracks[currentTrackIdx]) : next();
        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        audio.ontimeupdate = () => { if(!isNaN(audio.duration)){ const s = document.getElementById('seeker'); s.max = audio.duration; s.value = audio.currentTime; document.getElementById('cur-time').innerText = formatTime(audio.currentTime); document.getElementById('dur-time').innerText = formatTime(audio.duration); } };
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        document.getElementById('audio-upload').onchange = (e) => {
            for (let f of e.target.files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    db.transaction("songs","readwrite").objectStore("songs").add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "不明", year: tag.tags.year || "", cover: c, data: f, lyrics: "" }).oncomplete = loadAll;
                }});
            }
        };
    </script>
</body>
</html>
