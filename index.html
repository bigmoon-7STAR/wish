                activeLyricMembers.push(col);
                el.classList.add('active');
            }
        }

        function renderLyricSetupLines() {
            const container = document.getElementById('lyric-lines-container');
            container.innerHTML = currentLyricData.map((l, i) => {
                let colorStyle = '';
                if (l.colors && l.colors.length > 0) {
                    if (l.colors.length === 1) { colorStyle = `border-left: 5px solid ${l.colors[0]};`; } 
                    else { colorStyle = `border-left: 5px solid transparent; border-image: linear-gradient(to bottom, ${l.colors.join(', ')}) 1;`; }
                }

                return `
                <div class="lyric-edit-row" style="${colorStyle}">
                    <button onclick="setLyricTime(${i})" style="background:var(--accent-blue); color:var(--icon-active); border:none; padding:8px; border-radius:10px; font-weight:900;"><i class="fa-solid fa-clock"></i></button>
                    <input type="number" id="ly-t-${i}" class="lyric-time-input" value="${l.time}" step="0.1" onchange="updateLyricVal(${i}, 'time', this.value)" onkeydown="lyricInputNext(event, ${i})">
                    <input type="text" class="lyric-text-input" value="${l.text}" oninput="updateLyricVal(${i}, 'text', this.value)" placeholder="Lyric text...">
                    <button onclick="applyColorsToLyric(${i})" style="background:var(--accent-green); border:none; padding:8px; border-radius:10px; color:#5a9;"><i class="fa-solid fa-palette"></i></button>
                    <button onclick="removeLyricLine(${i})" style="background:var(--del-bg); color:var(--del-color); border:none; padding:8px; border-radius:10px;"><i class="fa-solid fa-trash"></i></button>
                </div>
            `}).join('');
        }

        function lyricInputNext(e, i) {
            if(e.key === 'Enter') {
                e.preventDefault();
                let next = document.getElementById(`ly-t-${i+1}`);
                if (next) next.focus();
            }
        }

        function setLyricTime(i) {
            currentLyricData[i].time = parseFloat(audio.currentTime.toFixed(1));
            document.getElementById(`ly-t-${i}`).value = currentLyricData[i].time;
        }

        function updateLyricVal(i, key, val) {
            if (key === 'time') currentLyricData[i][key] = parseFloat(val) || 0;
            else currentLyricData[i][key] = val;
        }

        function addLyricLine() {
            currentLyricData.push({ time: parseFloat(audio.currentTime.toFixed(1)), text: '', colors: [] });
            renderLyricSetupLines();
        }

        function removeLyricLine(i) {
            currentLyricData.splice(i, 1);
            renderLyricSetupLines();
        }

        function applyColorsToLyric(i) {
            currentLyricData[i].colors = [...activeLyricMembers];
            renderLyricSetupLines();
        }

        function saveLyricSetup() {
            const t = playingTracks[currentTrackIdx];
            currentLyricData.sort((a,b) => a.time - b.time);
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-setup-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "Unknown", year: tag.tags.year || "", cover: c, data: f, lyricData: [], favorite: false });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ name: f.name, artist: "Unknown", year: "", cover: null, data: f, lyricData: [], favorite: false });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) { el.style.transform = `translateX(-85px)`; if(btn) btn.style.opacity = 1; } 
            else { el.style.transform = `translateX(0)`; if(btn) btn.style.opacity = 0; }
        }
        
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `<div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])"><img src="${t.cover||''}" style="width:40px; height:40px;"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--icon-color);">${t.artist}</div></div></div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Empty</div>';
        }
    </script>
</body>
</html>
