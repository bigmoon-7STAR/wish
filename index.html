<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Melody ✧ Wishcore Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --key-color: #ff85a1; /* 魔法少女ピンク */
            --accent-purple: #b794f4; /* ウィッシュコア紫 */
            --text-main: #4a4a6a;
            --sub-text: #a0aec0;
            --glass: rgba(255, 255, 255, 0.7);
            --magic-gradient: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: "SF Pro Display", "Pretendard", "Hiragino Kaku Gothic ProN", sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #e6e9ff 50%, #f3e8ff 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
            letter-spacing: 0.03em;
        }

        /* --- Decoration --- */
        body::before {
            content: "✧ ﾟ*"; position: fixed; top: 10%; left: 5%; font-size: 20px; color: var(--key-color); opacity: 0.4; pointer-events: none;
        }

        /* --- Header & Search --- */
        .header { 
            padding: calc(45px + env(safe-area-inset-top)) 20px 15px; 
            background: var(--glass); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.5); 
            z-index: 100;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.1);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { font-size: 19px; font-weight: 800; color: var(--key-color); margin: 0; text-transform: uppercase; letter-spacing: 0.1em; }
        
        .nav-btn {
            background: rgba(255, 255, 255, 0.8); border: 1px solid var(--key-color);
            color: var(--key-color); border-radius: 20px; padding: 5px 15px;
            font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .nav-btn:active { transform: scale(0.9); background: var(--key-color); color: #fff; }

        .search-container { padding: 12px 20px; display: flex; gap: 10px; align-items: center; }
        #search-input { 
            flex: 1; padding: 10px 16px; border-radius: 20px; border: 2px solid #fff; 
            background: rgba(255,255,255,0.6); font-size: 13px; outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .sort-select { 
            background: #fff; border: 1px solid var(--accent-purple); border-radius: 12px; 
            font-size: 11px; color: var(--accent-purple); padding: 5px; font-weight: bold;
        }

        /* --- Content Area --- */
        #content { flex: 1; overflow-y: auto; padding-bottom: 200px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 18px; }
        
        .card { position: relative; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:active { transform: scale(0.95) rotate(-1deg); }
        .card-img { 
            width: 100%; aspect-ratio: 1/1; border-radius: 24px; object-fit: cover; 
            box-shadow: 0 10px 25px rgba(183, 148, 244, 0.2); 
            border: 3px solid #fff; 
        }
        .card-title { margin-top:10px; font-size:14px; font-weight:700; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .card-sub { font-size:11px; color: var(--sub-text); margin-top: 2px; }
        .card-tag { display: inline-block; font-size: 10px; background: var(--key-color); color: #fff; padding: 2px 8px; border-radius: 8px; margin-top: 5px; }

        .list-item { 
            display: flex; align-items: center; padding: 14px 20px; 
            margin: 8px 15px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.5); border: 1px solid #fff;
            transition: 0.3s;
        }
        .artist-icon { 
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--key-color);
            box-shadow: 0 4px 10px rgba(255, 133, 161, 0.3);
        }

        /* --- Full Player ✧ Magical Mode --- */
        .full-player { 
            position: fixed; inset: 0; z-index: 5000; display: flex; flex-direction: column; 
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            background: linear-gradient(180deg, #fff0f3 0%, #f3e8ff 100%);
            visibility: hidden;
        }
        .full-player.active { transform: translateY(0); visibility: visible; }
        
        #f-artwork-container { 
            width: 80vw; max-width: 320px; aspect-ratio: 1/1; position: relative; 
            margin: 0 auto; transition: 0.5s ease;
        }
        #f-img { 
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover; 
            box-shadow: 0 30px 60px rgba(255, 133, 161, 0.4); 
            border: 6px solid #fff;
        }

        .seeker { 
            -webkit-appearance: none; width: 100%; height: 8px; 
            background: rgba(255, 133, 161, 0.2); border-radius: 10px; 
            margin: 30px 0 10px; outline: none;
        }
        .seeker::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 22px; height: 22px; 
            background: #fff; border: 3px solid var(--key-color); 
            border-radius: 50%; box-shadow: 0 4px 10px rgba(255, 133, 161, 0.3);
        }

        /* --- Mini Player --- */
        .mini-player { 
            position: fixed; bottom: calc(95px + env(safe-area-inset-bottom)); left: 15px; right: 15px; 
            height: 70px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); 
            border-radius: 22px; display: none; align-items: center; padding: 0 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 2000; border: 2px solid #fff;
        }
        
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; height: calc(75px + env(safe-area-inset-bottom)); 
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; padding-top: 12px; 
            border-top: 1px solid rgba(255,255,255,0.5); z-index: 1000; 
        }
        .tab-item { 
            border:none; background:none; color: var(--sub-text); 
            font-weight: 800; font-size: 10px; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; text-transform: uppercase;
        }
        .tab-item.active { color: var(--key-color); filter: drop-shadow(0 0 5px rgba(255,133,161,0.5)); }
        .tab-item i { font-size: 24px; }

        /* --- Modal Custom --- */
        .modal { 
            position: fixed; inset: 0; background: var(--magic-gradient); 
            z-index: 7000; display: none; flex-direction: column; 
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        
        .edit-input { 
            width: 100%; padding: 15px; border: 2px solid #fff; border-radius: 18px; 
            margin-bottom: 20px; background: rgba(255,255,255,0.5); font-size: 16px;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" class="nav-btn" onclick="handleHeaderLeft()">EDIT / 편집</button>
            <h2 id="view-title">COLLECTION</h2>
            <button id="right-btn" class="nav-btn" onclick="handleHeaderRight()"><i class="fa-solid fa-wand-sparkles"></i></button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search Magic Melodies... / 검색" oninput="render()">
        <select id="sort-type" class="sort-select" onchange="render()">
            <option value="added">NEW / 최신순</option>
            <option value="name_asc">A-Z / 이름순</option>
            <option value="year">YEAR / 연도순</option>
        </select>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src="" style="width:50px; height:50px; border-radius:12px; margin-right:15px; object-fit:cover; border:2px solid #fff;">
        <div id="m-title" style="flex:1; font-weight:800; font-size:14px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; color:var(--key-color);"></div>
        <i id="m-pp" class="fa-solid fa-play" style="font-size:26px; color:var(--key-color); padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div class="full-player" id="full">
        <div onclick="closeFull()" style="padding:25px; text-align:center; cursor:pointer;"><div style="width:45px; height:6px; border-radius:3px; background:var(--key-color); opacity:0.3; margin:0 auto;"></div></div>
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 35px;">
            <div id="f-artwork-container" onclick="toggleLyrics()">
                <img id="f-img">
                <div id="f-lyrics-view" style="position: absolute; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); border-radius: 40px; padding: 30px; overflow-y: auto; display: none; text-align: center; font-weight: bold; color: var(--key-color); line-height: 1.8;"></div>
            </div>
            
            <div style="width:100%; margin-top:45px; text-align:center;">
                <div id="f-title" style="font-size:24px; font-weight:900; color:#333; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
                <div id="f-artist" style="font-size:18px; color:var(--accent-purple); margin-top:8px; font-weight:700;"></div>
            </div>
            
            <input type="range" class="seeker" id="seeker" value="0" step="0.1" oninput="audio.currentTime=this.value">
            <div style="width:100%; display:flex; justify-content:space-between; color:var(--sub-text); font-size:12px; font-weight:bold;">
                <span id="cur-time">0:00</span><span id="dur-time">0:00</span>
            </div>

            <div style="display:flex; width:100%; justify-content:space-between; align-items:center; margin-top:40px;">
                <button onclick="toggleShuffle()" id="btn-shuffle" style="background:none; border:none; font-size:22px; color:var(--sub-text);"><i class="fa-solid fa-shuffle"></i></button>
                <div style="display:flex; align-items:center; gap:40px;">
                    <i class="fa-solid fa-backward-step" style="font-size:32px; color:var(--accent-purple);" onclick="prev()"></i>
                    <i id="f-pp" class="fa-solid fa-circle-play" style="font-size:70px; color:var(--key-color);" onclick="togglePlay()"></i>
                    <i class="fa-solid fa-forward-step" style="font-size:32px; color:var(--accent-purple);" onclick="next()"></i>
                </div>
                <button onclick="toggleRepeat()" id="btn-repeat" style="background:none; border:none; font-size:22px; color:var(--sub-text); position:relative;"><i class="fa-solid fa-repeat"></i><span id="repeat-badge" style="display:none; position:absolute; top:-8px; right:-10px; background:var(--key-color); color:white; border-radius:50%; width:16px; height:16px; font-size:10px; text-align:center; line-height:16px;">1</span></button>
            </div>
        </div>

        <div class="queue-panel" id="queue-panel" style="position: absolute; inset: 0; background: #fff; z-index: 6000; transform: translateY(100%); transition: 0.4s; display: flex; flex-direction: column;">
            <div style="padding:25px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0f0f0;">
                <h3 style="margin:0; font-size:20px; color:var(--key-color);">QUEUE / 대기열</h3>
                <button onclick="toggleQueue()" class="nav-btn">CLOSE</button>
            </div>
            <div id="queue-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="header">
            <div class="header-top"><button onclick="closeEdit()" class="nav-btn">CLOSE / 닫기</button><h2>SONG EDIT</h2><button onclick="saveEdit()" class="nav-btn" style="background:var(--key-color); color:#fff;">SAVE / 저장</button></div>
        </div>
        <div style="padding:30px;">
            <input type="text" id="edit-name" class="edit-input" placeholder="Title">
            <input type="text" id="edit-artist" class="edit-input" placeholder="Artist">
            <textarea id="edit-lyrics" class="edit-input" style="height:150px;" placeholder="Lyrics"></textarea>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" id="tab-artist" onclick="switchTab('artists')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>IDOLS</span></button>
        <button class="tab-item" id="tab-lib" onclick="switchTab('library')"><i class="fa-solid fa-heart"></i><span>COLLECTION</span></button>
        <button class="tab-item" id="tab-play" onclick="switchTab('playlist')"><i class="fa-solid fa-book-sparkles"></i><span>GRIMOIRE</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], artistMeta = {}, isEditing = false, currentView = 'artists', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        const audio = document.getElementById('audio-element');

        // DB & Initialization
        const req = indexedDB.open("WishcoreStudio_V5", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; e.target.result.forEach(m => artistMeta[m.name] = m.icon);
                render();
            };
        }

        // --- Core Logic: Rendering ---
        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            if(currentView === 'artists') {
                document.getElementById('tab-artist').classList.add('active');
                title.innerText = currentArtist || "IDOLS / 아이돌";
                if(!currentArtist) {
                    let artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(search));
                    display.className = "";
                    display.innerHTML = artists.map(a => `
                        <div class="list-item" onclick="openArtist('${a}')">
                            <img src="${artistMeta[a] || ''}" class="artist-icon" onerror="this.src='https://via.placeholder.com/100/ffdce5/ff85a1?text=✧'">
                            <div style="margin-left:20px; font-weight:900; font-size:16px; color:var(--text-main);">${a}</div>
                        </div>`).join('');
                } else {
                    display.className = "grid";
                    let list = tracks.filter(t => t.artist === currentArtist);
                    display.innerHTML = list.map(t => `<div class="card" onclick="playSong(${t.id},'art')"><img src="${t.cover||''}" class="card-img"><div class="card-title">${t.name}</div></div>`).join('');
                }
            } else if(currentView === 'library') {
                document.getElementById('tab-lib').classList.add('active');
                title.innerText = "COLLECTION / 컬렉션";
                display.className = "grid";
                let list = tracks.filter(t => t.name.toLowerCase().includes(search));
                display.innerHTML = list.map(t => `
                    <div class="card" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                        <img src="${t.cover||''}" class="card-img">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${t.artist}</div>
                    </div>`).join('');
            } else {
                document.getElementById('tab-play').classList.add('active');
                title.innerText = "GRIMOIRE / 마법서";
                display.className = "grid";
                display.innerHTML = playlists.map(p => `
                    <div class="card" onclick="openPlaylist(${p.id})">
                        <div class="card-img" style="background:var(--key-color); display:flex; align-items:center; justify-content:center; color:#fff; font-size:40px;"><i class="fa-solid fa-star"></i></div>
                        <div class="card-title">${p.name}</div>
                    </div>`).join('');
            }
            document.getElementById('left-btn').innerText = (currentArtist || currentPlaylistId) ? "BACK / 뒤로" : (isEditing ? "DONE / 완료" : "EDIT / 편집");
        }

        // --- Core Logic: Player (Fixed Repeat) ---
        function playSong(id, mode) {
            let base = (mode === 'art') ? tracks.filter(t => t.artist === currentArtist) : tracks;
            playingTracks = isShuffle ? [...base].sort(() => Math.random() - 0.5) : [...base];
            currentTrackIdx = playingTracks.findIndex(t => t.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function loadTrack(t) {
            if(!t) return;
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('f-title').innerText = t.name;
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex';
            audio.play();
        }

        function next() {
            if (playingTracks.length === 0) return;
            
            // リピートモードの判定
            if (repeatMode === 2) { 
                // 1曲リピート
                audio.currentTime = 0;
                audio.play();
            } else {
                // 通常または全曲リピート
                let nextIdx = currentTrackIdx + 1;
                if (nextIdx >= playingTracks.length) {
                    // 最後の曲を超えたら最初に戻る
                    currentTrackIdx = 0;
                } else {
                    currentTrackIdx = nextIdx;
                }
                loadTrack(playingTracks[currentTrackIdx]);
            }
        }

        function prev() {
            if(audio.currentTime > 3) { audio.currentTime = 0; return; }
            currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        // Events
        audio.onended = () => {
            if(repeatMode === 0 && currentTrackIdx === playingTracks.length - 1) {
                // リピートオフで最後なら止める
                audio.pause();
            } else {
                next();
            }
        };

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            const btn = document.getElementById('btn-repeat');
            btn.style.color = repeatMode > 0 ? "var(--key-color)" : "var(--sub-text)";
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none";
        }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.color = isShuffle ? "var(--key-color)" : "var(--sub-text)"; }

        // UI Handlers
        function switchTab(v) { currentView=v; currentArtist=null; currentPlaylistId=null; render(); }
        function openArtist(n) { currentArtist=n; render(); }
        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function handleHeaderLeft() { if(currentArtist) currentArtist=null; else if(currentPlaylistId) currentPlaylistId=null; else isEditing=!isEditing; render(); }
        function handleHeaderRight() { if(currentView==='library') document.getElementById('audio-upload').click(); }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files;
            const tx = db.transaction("songs", "readwrite");
            for(let f of files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    tx.objectStore("songs").add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "Unknown", cover: c, data: f });
                }});
            }
            tx.oncomplete = () => loadAll();
        };

        // Time Updates
        audio.ontimeupdate = () => {
            const s = document.getElementById('seeker');
            if(!isNaN(audio.duration)) {
                s.max = audio.duration; s.value = audio.currentTime;
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
                document.getElementById('dur-time').innerText = formatTime(audio.duration);
            }
        };
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
    </script>
</body>
</html>
