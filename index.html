        /*
           ========================================
           Sleep Timer
           ========================================
        */
        function startTimer() {
            if (sleepTimerId) {
                clearTimeout(sleepTimerId);
                clearInterval(sleepTimerInterval);
                sleepTimerId = null;
                sleepTimerInterval = null;
                document.getElementById('timer-display').innerText = "";
                document.getElementById('timer-btn').innerText = t('start');
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                return;
            }
            const min = parseInt(document.getElementById('timer-input').value);
            if (isNaN(min) || min <= 0) return;
            
            sleepEndTime = Date.now() + min * 60000;
            document.getElementById('timer-btn').innerText = t('stop');
            document.getElementById('timer-btn').style.background = "var(--del-color)";
            
            sleepTimerInterval = setInterval(() => {
                let remain = sleepEndTime - Date.now();
                if (remain <= 0) {
                    clearInterval(sleepTimerInterval);
                } else {
                    let m = Math.floor(remain / 60000);
                    let s = Math.floor((remain % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `Remaining: ${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);

            sleepTimerId = setTimeout(() => {
                audio.pause();
                document.getElementById('timer-display').innerText = "Timer finished.";
                document.getElementById('timer-btn').innerText = t('start');
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                sleepTimerId = null;
                clearInterval(sleepTimerInterval);
            }, min * 60000);
        }

        /*
           ========================================
           Database Initialization
           ========================================
        */
        const req = indexedDB.open("MusicStudioWishcore_V7", 2);
        
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("songs")) {
                d.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            }
            if (!d.objectStoreNames.contains("playlists")) {
                d.createObjectStore("playlists", { keyPath: "id", autoIncrement: true });
            }
            if (!d.objectStoreNames.contains("artistMeta")) {
                d.createObjectStore("artistMeta", { keyPath: "name" });
            }
        };
        
        req.onsuccess = (e) => {
            db = e.target.result;
            loadAll();
            setupMediaSession();
        };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            let p1 = new Promise(res => {
                tx.objectStore("songs").getAll().onsuccess = (e) => {
                    tracks = e.target.result || [];
                    res();
                };
            });
            let p2 = new Promise(res => {
                tx.objectStore("playlists").getAll().onsuccess = (e) => {
                    playlists = e.target.result || [];
                    res();
                };
            });
            let p3 = new Promise(res => {
                tx.objectStore("artistMeta").getAll().onsuccess = (e) => {
                    artistMeta = {};
                    (e.target.result || []).forEach(m => artistMeta[m.name] = m);
                    res();
                };
            });
            
            Promise.all([p1, p2, p3]).then(() => {
                render();
            });
        }

        /*
           ========================================
           Search & Sort Logic
           ========================================
        */
        function handleSearchInput() {
            const val = document.getElementById('search-input').value;
            if (currentView === 'playlist' && currentPlaylistId !== null) {
                searchQueries.playlistDetail = val;
            } else {
                searchQueries[currentView] = val;
            }
            render();
        }

        function handleSortChange() {
            const val = document.getElementById('sort-type').value;
            const key = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            sortStates[key] = val;
            
            if (currentPlaylistId !== null) {
                syncPlaylistSort();
            }
            render();
        }

        function toggleSortDirection() {
            const key = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            sortDirections[key] = sortDirections[key] * -1;
            
            const btn = document.getElementById('sort-dir-btn');
            btn.innerHTML = sortDirections[key] === 1 ? '<i class="fa-solid fa-arrow-up"></i>' : '<i class="fa-solid fa-arrow-down"></i>';
            
            if (currentPlaylistId !== null) {
                syncPlaylistSort();
            }
            render();
        }

        function syncPlaylistSort() {
            if (currentPlaylistId === null) return;
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            
            let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
            const sort = sortStates.playlistDetail;
            const dir = sortDirections.playlistDetail;
            
            if (sort !== 'custom') {
                plSongs.sort((a, b) => {
                    let res = 0;
                    if (sort === 'name_asc' || sort === 'name_desc') {
                        res = a.name.localeCompare(b.name, 'ja');
                    } else if (sort === 'year') {
                        res = (b.year || '').toString().localeCompare((a.year || '').toString());
                    } else if (sort === 'artist') {
                        res = (a.artist || '').localeCompare(b.artist || '', 'ja');
                    } else {
                        res = a.id - b.id;
                    }
                    return res * dir;
                });
                pl.songIds = plSongs.map(s => s.id);
                db.transaction("playlists", "readwrite").objectStore("playlists").put(pl);
            }
        }

        /*
           ========================================
           Artist Extraction & Management
           ========================================
        */
        function extractArtists(artistString) {
            if (!artistString) return [];
            return artistString.split(/[,/]/).map(a => a.trim()).filter(a => a);
        }

        function getAllArtistsStructured() {
            let allArtsSet = new Set();
            Object.keys(artistMeta).forEach(k => allArtsSet.add(k));
            tracks.forEach(t => {
                extractArtists(t.artist).forEach(a => {
                    allArtsSet.add(a);
                });
            });
            
            let allArts = [...allArtsSet].sort((a, b) => a.localeCompare(b, 'ja'));
            let structured = [];
            
            allArts.forEach(a => {
                let meta = artistMeta[a] || {};
                let isChild = false;
                
                Object.keys(artistMeta).forEach(parentName => {
                    let pMeta = artistMeta[parentName];
                    if (pMeta.members && pMeta.members.some(m => m.linked === a)) {
                        isChild = true;
                    }
                });
                
                if (!isChild) {
                    let groupObj = { name: a, isParent: true, children: [] };
                    if (meta.members) {
                        meta.members.forEach(m => {
                            if (m.linked) {
                                groupObj.children.push(m.linked);
                            }
                        });
                    }
                    structured.push(groupObj);
                }
            });
            
            return structured;
        }

        /*
           ========================================
           Render Logic
           ========================================
        */
        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortSelectEl = document.getElementById('sort-type');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            
            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            
            if (artistSetupBtn) {
                artistSetupBtn.style.display = currentArtist ? 'inline-block' : 'none';
            }
            if (settingsBtn) {
                settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'inline-block' : 'none';
            }
            
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            let currentSearch = searchQueries[viewKey] || '';
            if (searchInputEl && searchInputEl.value !== currentSearch) {
                searchInputEl.value = currentSearch;
            }
            
            let currentSort = sortStates[viewKey] || 'added';
            if (sortSelectEl) {
                sortSelectEl.value = currentSort;
                const customOpt = sortSelectEl.querySelector('option[value="custom"]');
                if (currentView === 'library' || (currentView === 'artists' && !currentArtist)) {
                    customOpt.style.display = 'none';
                    if (currentSort === 'custom') {
                        currentSort = 'added';
                        sortStates[viewKey] = 'added';
                        sortSelectEl.value = 'added';
                    }
                } else {
                    customOpt.style.display = 'block';
                }
            }
            
            const sortDirBtn = document.getElementById('sort-dir-btn');
            if (sortDirBtn) {
                sortDirBtn.innerHTML = sortDirections[viewKey] === 1 ? '<i class="fa-solid fa-arrow-up"></i>' : '<i class="fa-solid fa-arrow-down"></i>';
            }

            const search = currentSearch.toLowerCase();
            let searchTerms = search.split(/[\s,、]+/).filter(x => x);
            let isFavSearch = (search === "お気に入り" || search === "★" || search === "favorites");

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if (tabEl) {
                tabEl.classList.add('active');
            }

            /* Library View Rendering */
            if (currentView === 'library') {
                title.innerText = t('library');
                display.className = "grid";
                let list = tracks;
                
                if (isFavSearch) {
                    list = list.filter(t => t.favorite);
                } else if (searchTerms.length > 0) {
                    list = list.filter(t => searchTerms.every(term => 
                        t.name.toLowerCase().includes(term) || 
                        (t.artist && t.artist.toLowerCase().includes(term))
                    ));
                }
                renderCards(list, display, currentSort, sortDirections[viewKey]);
            
            /* Artists View Rendering */
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = t('artist');
                    display.className = "";
                    
                    let structuredArtists = getAllArtistsStructured();
                    let flatRenderList = [];
                    
                    structuredArtists.forEach(parent => {
                        let pMatch = isFavSearch ? false : parent.name.toLowerCase().includes(search);
                        let cMatches = parent.children.filter(c => c.toLowerCase().includes(search));
                        
                        if (searchTerms.length === 0 || pMatch || cMatches.length > 0) {
                            flatRenderList.push({ name: parent.name, type: 'parent' });
                            parent.children.forEach(c => {
                                if (searchTerms.length === 0 || pMatch || c.toLowerCase().includes(search)) {
                                    flatRenderList.push({ name: c, type: 'child', parent: parent.name });
                                }
                            });
                        }
                    });

                    if (searchTerms.length > 0 && flatRenderList.length > 0 && !isFavSearch) {
                        artistFilter.style.display = 'flex';
                        artistFilter.innerHTML = flatRenderList.map(item => {
                            let a = item.name;
                            const firstSong = tracks.find(t => extractArtists(t.artist).includes(a));
                            const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:5px;"></i></div>`);
                            return `<div class="bulk-artist-icon-chip" onclick="openArtist('${a}')">${icon}<span>${a}</span></div>`;
                        }).join('');
                    }

                    display.innerHTML = flatRenderList.map(item => {
                        let a = item.name;
                        const firstSong = tracks.find(t => extractArtists(t.artist).includes(a));
                        const meta = artistMeta[a] || {};
                        let iconHtml = '';
                        
                        let parentColor = '';
                        if (item.type === 'child' && item.parent) {
                            let parentMeta = artistMeta[item.parent] || {};
                            if (parentMeta.members) {
                                let m = parentMeta.members.find(mx => mx.linked === a);
                                if (m && m.color) parentColor = m.color;
                            }
                        }
                        
                        if (item.type === 'parent') {
                            let src = meta.icon || (firstSong && firstSong.cover) || '';
                            if (src) {
                                iconHtml = `<img src="${src}" class="artist-icon-parent">`;
                            } else {
                                iconHtml = `<div class="artist-icon-parent"><i class="fa-solid fa-star" style="font-size:24px;"></i></div>`;
                            }
                        } else {
                            let src = meta.icon || (firstSong && firstSong.cover) || '';
                            let borderColor = parentColor || 'var(--icon-color)';
                            if (src) {
                                iconHtml = `<img src="${src}" class="artist-icon-child" style="border-color:${borderColor};">`;
                            } else {
                                iconHtml = `<div class="artist-icon-child" style="border-color:${borderColor};"><i class="fa-solid fa-user" style="font-size:18px;"></i></div>`;
                            }
                        }
                        
                        let indentClass = item.type === 'child' ? 'child-indent' : '';
                        
                        return `
                        <div class="swipe-container" id="swipe-art-${CSS.escape(a)}">
                            <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">Delete</div>
                            <div class="artist-list-item ${indentClass}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')" ontouchstart="handleTouchStart(event, 'art-${a}')" ontouchmove="handleTouchMove(event, 'art-${a}')" ontouchend="handleTouchEnd(event, 'art-${a}')">
                                <div class="artist-icon-container" style="${item.type==='child'?'width:36px;height:36px;':''}">${iconHtml}</div>
                                <div style="font-weight:800; font-size:${item.type==='child'?'14px':'16px'}; flex:1;">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist;
                    display.className = "grid";
                    let list = tracks.filter(t => extractArtists(t.artist).includes(currentArtist));
                    
                    if (isFavSearch) {
                        list = list.filter(t => t.favorite);
                    } else if (searchTerms.length > 0) {
                        list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    }
                    renderCards(list, display, currentSort, sortDirections[viewKey]);
                }

            /* Playlist View Rendering */
            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = t('playlist');
                    display.className = "grid";
                    
                    let favPlaylist = { id: 'fav', name: t('favorites'), songIds: tracks.filter(t => t.favorite).map(t => t.id), tag: '', favorite: true, isVirtual: true };
                    let combinedPlaylists = [favPlaylist, ...playlists];

                    if (searchTerms.length > 0 && !isFavSearch) {
                        let list = combinedPlaylists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));
                        renderPlaylists(list, display);
                    } else if (isFavSearch) {
                        let list = combinedPlaylists.filter(p => p.favorite);
                        renderPlaylists(list, display);
                    } else {
                        renderPlaylists(combinedPlaylists, display);
                    }
                    
                } else {
                    const pl = currentPlaylistId === 'fav' ? { id: 'fav', name: t('favorites'), songIds: tracks.filter(t => t.favorite).map(t => t.id) } : playlists.find(p => p.id === currentPlaylistId);
                    
                    if (!pl) { switchTab('playlist'); return; }
                    
                    title.innerText = pl.name;
                    display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => {
                        artistsInPlRaw.push(...extractArtists(s.artist));
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && searchTerms.length > 0 && !isFavSearch) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => extractArtists(t.artist).includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    if (isFavSearch) {
                        filtered = filtered.filter(t => t.favorite);
                    } else if (searchTerms.length > 0) {
                        filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || (t.artist && t.artist.toLowerCase().includes(term))));
                    }
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => extractArtists(t.artist).includes(activeArtistFilter));
                    }

                    let dir = sortDirections.playlistDetail;
                    if (currentSort === 'name_asc') {
                        filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja') * dir);
                    } else if (currentSort === 'name_desc') {
                        filtered.sort((a, b) => b.name.localeCompare(a.name, 'ja') * dir);
                    } else if (currentSort === 'year') {
                        filtered.sort((a, b) => (b.year || '').toString().localeCompare((a.year || '').toString()) * dir);
                    } else if (currentSort === 'artist') {
                        filtered.sort((a, b) => (a.artist || '').localeCompare(b.artist || '', 'ja') * dir);
                    }

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            ${currentPlaylistId !== 'fav' ? `<div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>` : ''}
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover||''}" style="margin-right:0;">
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div>
                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${renderCompactArtists(t.artist)}</div>
                                </div>
                                ${(currentSort === 'custom' && currentPlaylistId !== 'fav') ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + (currentPlaylistId !== 'fav' ? `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>` : '');
                }
            }

            /* Navigation UI Updates */
            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else if (currentPlaylistId === 'fav') {
                rightBtn.style.display = 'none';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
                rightBtn.style.display = 'flex';
            }
            
            restoreScrollPosition();
        }

        function renderCompactArtists(artistString) {
            let arts = extractArtists(artistString);
            if (arts.length <= 1) return artistString || '';
            let main = arts[0];
            let subs = arts.slice(1).join(', ');
            return `<span style="color:var(--text-main); font-weight:800;">${main}</span> <span style="font-size:9px;">/ ${subs}</span>`;
        }

        function renderPlaylists(list, container) {
            container.innerHTML = list.map(p => {
                const firstSong = tracks.find(t => p.songIds.includes(t.id));
                const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                const clickHandler = (isEditing && !p.isVirtual) ? `openPlEdit(${p.id})` : (p.isVirtual && isEditing ? '' : `openPlaylist('${p.id}')`);
                
                return `
                <div class="card ${isEditing?'editing':''}" onclick="${clickHandler}">
                    ${(!p.isVirtual) ? `<div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>` : ''}
                    <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img" style="${p.isVirtual?'filter: brightness(0.9) sepia(0.5) hue-rotate(-30deg);':''}">
                    ${p.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${p.name}</div>
                        <div class="card-sub">${p.songIds.length} tracks</div>
                        <div style="margin-top:5px;">${tagsHtml}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderCards(list, container, sort, dir) {
            if (sort === 'name_asc') list.sort((a,b) => a.name.localeCompare(b.name,'ja') * dir);
            else if (sort === 'name_desc') list.sort((a,b) => b.name.localeCompare(a.name,'ja') * dir);
            else if (sort === 'year') list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()) * dir);
            else if (sort === 'artist') list.sort((a,b) => (a.artist||'').localeCompare(b.artist||'','ja') * dir);
            else if (sort === 'added') list.sort((a,b) => (a.id - b.id) * dir);
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${renderCompactArtists(t.artist)} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        /*
           ========================================
           Track & Playlist Operations
           ========================================
        */
        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function deleteCustomArtist(a) {
            if (confirm(t('delete_confirm'))) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if (btn) {
                const icon = btn.querySelector('i');
                if (isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        /*
           ========================================
           Lyrics Engine
           ========================================
        */
        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if (isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let text = track?.lyrics || "";
                let colors = track?.lyricColors || [];
                let times = track?.lyricTimestamps || [];
                let lines = text.split('\n');
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                const syncBtn = `<button onclick="event.stopPropagation(); toggleLyricSyncMode()" id="lyric-sync-btn" style="position:absolute; top:25px; right:25px; background:rgba(0,0,0,0.1); border:none; color:${isLyricSyncMode?'var(--del-color)':'var(--icon-color)'}; padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-stopwatch"></i></button>`;
                
                view.innerHTML = paintBtn + syncBtn + `<div id="lyrics-content-scroll" style="width:100%; height:100%; overflow-y:auto; padding-top:60px; padding-bottom:100px;">` + lines.map((l, i) => {
                    let c = colors[i] || 'inherit';
                    let tAttr = times[i] ? `data-time="${times[i]}"` : '';
                    return `<div id="lyric-line-${i}" ${tAttr} style="color:${c}; width:100%; word-wrap:break-word;" onclick="handleLyricClick(${i})">${l || '<br>'}</div>`;
                }).join('') + `</div>`;
                
                startLyricAnimation();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
                stopLyricAnimation();
                isLyricSyncMode = false;
            }
        }

        function toggleLyricSyncMode() {
            isLyricSyncMode = !isLyricSyncMode;
            const btn = document.getElementById('lyric-sync-btn');
            if (btn) {
                btn.style.color = isLyricSyncMode ? 'var(--del-color)' : 'var(--icon-color)';
            }
        }

        function handleLyricClick(index) {
            if (isLyricSyncMode) {
                const track = playingTracks[currentTrackIdx];
                if (!track) return;
                if (!track.lyricTimestamps) track.lyricTimestamps = [];
                track.lyricTimestamps[index] = audio.currentTime;
                
                db.transaction("songs", "readwrite").objectStore("songs").put(track).onsuccess = () => {
                    let el = document.getElementById(`lyric-line-${index}`);
                    if (el) {
                        el.setAttribute('data-time', audio.currentTime);
                        el.style.transform = 'scale(1.2)';
                        setTimeout(() => el.style.transform = 'scale(1)', 300);
                    }
                };
            } else {
                const el = document.getElementById(`lyric-line-${index}`);
                if (el && el.hasAttribute('data-time')) {
                    let t = parseFloat(el.getAttribute('data-time'));
                    if (!isNaN(t)) {
                        seekAudio(t);
                    }
                }
            }
        }

        let lyricAnimFrame;
        function startLyricAnimation() {
            if (!document.getElementById('f-lyrics-view').classList.contains('active')) return;
            
            const lines = document.querySelectorAll('#lyrics-content-scroll div[id^="lyric-line-"]');
            let currentTime = audio.currentTime;
            
            lines.forEach((line, i) => {
                if (line.hasAttribute('data-time')) {
                    let time = parseFloat(line.getAttribute('data-time'));
                    let nextTime = Infinity;
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j].hasAttribute('data-time')) {
                            nextTime = parseFloat(lines[j].getAttribute('data-time'));
                            break;
                        }
                    }
                    if (currentTime >= time && currentTime < nextTime) {
                        line.classList.add('lyric-line-active');
                        if (line.offsetTop) {
                            const scrollCont = document.getElementById('lyrics-content-scroll');
                            if (scrollCont) {
                                scrollCont.scrollTo({
                                    top: line.offsetTop - scrollCont.clientHeight / 2 + 40,
                                    behavior: 'smooth'
                                });
                            }
                        }
                    } else {
                        line.classList.remove('lyric-line-active');
                    }
                }
            });
            
            lyricAnimFrame = requestAnimationFrame(startLyricAnimation);
        }

        function stopLyricAnimation() {
            if (lyricAnimFrame) {
                cancelAnimationFrame(lyricAnimFrame);
            }
        }

        function handleLyricsPaste(e) {
            setTimeout(() => {
                const textarea = e.target;
                let val = textarea.value;
                val = val.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                textarea.value = val;
            }, 100);
        }

        /*
           ========================================
           Bulk Add
           ========================================
        */
        function openBulkAddModal() {
            const pl = currentPlaylistId === 'fav' ? { songIds: tracks.filter(t=>t.favorite).map(t=>t.id) } : playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div');
            div.id = "bulk-modal";
            div.className = "modal";
            div.style.display = "flex";
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <h2>Select Songs</h2>
                        <button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">Done</button>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="${t('search_placeholder')}" oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions"></div>
                </div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist?t.artist.toLowerCase():''}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px; object-fit:cover;">
                        <div style="flex:1;">
                            <b style="font-size:14px;">${t.name}</b><br>
                            <span style="font-size:11px; color:var(--icon-color);">${t.artist}</span>
                        </div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => {
                el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none';
            });
            const suggest = document.getElementById('bulk-artist-suggestions');
            let structured = getAllArtistsStructured();
            let matched = [];
            structured.forEach(p => {
                if (p.name.toLowerCase().includes(v)) matched.push(p.name);
                p.children.forEach(c => { if(c.toLowerCase().includes(v)) matched.push(c); });
            });
            
            if (v.length > 0 && matched.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matched.map(a => {
                    const firstSong = tracks.find(t => extractArtists(t.artist).includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:5px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else {
                suggest.style.display = 'none';
            }
        }

        function saveBulkAdd() {
            if (currentPlaylistId === 'fav') return; // Read-only bulk via star
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
            pl.songIds = newIds;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                loadAll();
                document.getElementById('bulk-modal').remove();
            };
        }

        /*
           ========================================
           Navigation & UI Actions
           ========================================
        */
        function switchTab(v) { 
            saveScrollPosition();
            currentView = v;
            currentArtist = null;
            currentPlaylistId = null;
            isEditing = false;
            activeArtistFilter = null;
            render(); 
        }

        function openPlaylist(id) {
            saveScrollPosition();
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            render(); 
        }

        function openArtist(n) {
            saveScrollPosition();
            currentArtist = n;
            render();
        }

        function openFull() {
            const fPlayer = document.getElementById('full');
            fPlayer.classList.add('active');
        }

        function closeFull() {
            const fPlayer = document.getElementById('full');
            fPlayer.classList.remove('active');
            if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                toggleLyrics();
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            if (e.target.closest('input[type="range"]')) return;
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            if (e.target.closest('input[type="range"]')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            if (e.target.closest('input[type="range"]')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) {
                closeFull();
            } else {
                fPlayer.style.transform = 'translateY(0)';
            }
            startY = 0; currentY = 0;
        });

        function handleHeaderLeft() { 
            if (currentArtist) {
                currentArtist = null; 
            } else if (currentPlaylistId) {
                currentPlaylistId = null; 
            } else {
                isEditing = !isEditing; 
            }
            render(); 
        }

        function handleHeaderRight() { 
            if (currentArtist) {
                const artTracks = tracks.filter(t => extractArtists(t.artist).includes(currentArtist));
                if (artTracks.length > 0) playSong(artTracks[0].id, 'art');
            } else if (currentPlaylistId && currentPlaylistId !== 'fav') {
                openBulkAddModal();
            } else if (currentView === 'library') {
                document.getElementById('audio-upload').click(); 
            } else if (currentView === 'playlist') {
                let n = prompt(t('playlist_name'));
                if (n) {
                    db.transaction("playlists", "readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null, favorite: false }).onsuccess = loadAll;
                }
            } else if (currentView === 'artists') {
                let n = prompt("Artist Name:");
                if (n) {
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({ name: n, icon: null, favorite: false, members: [], syncColor: '' }).onsuccess = loadAll;
                }
            }
        }

        /*
           ========================================
           Playback Engine
           ========================================
        */
        function togglePlay() {
            initAudioContext();
            if (audio.paused) {
                audio.play().catch(e => console.log("Playback error:", e));
            } else {
                smoothVolumeChange(0.01);
                setTimeout(() => { audio.pause(); gainNode.gain.value = 1; }, 500);
            }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) {
                loadTrack(playingTracks[currentTrackIdx]);
                return;
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) {
                audio.pause();
                audio.currentTime = 0;
                return;
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() { 
            if (audio.currentTime > 3) {
                seekAudio(0);
            } else {
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length;
                loadTrack(playingTracks[currentTrackIdx]);
            }
        }

        function seekAudio(val) {
            if (audio.fastSeek) {
                audio.fastSeek(val);
            } else {
                audio.currentTime = val;
            }
        }

        function playSong(id, mode) {
            initAudioContext();
            let original = [];
            if (mode === 'pl') {
                const pl = currentPlaylistId === 'fav' ? { songIds: tracks.filter(t=>t.favorite).map(t=>t.id) } : playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x => x);
            } else if (mode === 'art') {
                original = tracks.filter(tx => extractArtists(tx.artist).includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if (document.documentElement.hasAttribute('data-theme')) {
                const t = playingTracks[currentTrackIdx];
                if (t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(tObj) {
            if (!tObj) return;
            
            if (audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(tObj.data);
            
            document.getElementById('m-img').src = tObj.cover || '';
            checkMarquee('m-title', tObj.name);
            document.getElementById('f-img').src = tObj.cover || '';
            checkMarquee('f-title', tObj.name);
            document.getElementById('f-artist').innerText = tObj.artist || '';
            document.getElementById('mini').style.display = 'flex';
            
            if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                toggleLyrics();
            }
            
            updateFavBtn(tObj.favorite);
            updatePlayerBlurBg();
            updateMediaSession();
            
            audio.play().catch(e => {
                console.log("Auto-play prevented. User interaction required.");
                document.getElementById('m-pp').className = 'fa-solid fa-play';
                document.getElementById('f-pp').className = 'fa-solid fa-play';
            });
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (!text) text = '';
            if (text.length > 20) {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            } else {
                el.innerText = text;
            }
        }

        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.ontimeupdate = () => { 
            if (!isNaN(audio.duration)) { 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
            } 
        };

        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };

        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };

        audio.onended = () => { 
            next(); 
        };

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const arts = extractArtists(playingTracks[currentTrackIdx].artist);
                if (arts.length > 0) {
                    openArtist(arts[0]);
                }
            }, 500); 
        }

        /*
           ========================================
           Track Editing
           ========================================
        */
        function renderTrackArtists() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists.map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if (val && !currentTrackArtists.includes(val)) {
                currentTrackArtists.push(val);
                el.value = '';
                renderTrackArtists();
            }
        }

        function removeTrackArtist(a) {
            currentTrackArtists = currentTrackArtists.filter(x => x !== a);
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = extractArtists(t.artist);
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }

        function closeEdit() { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }

        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = currentTrackArtists.join(', ');
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
            }; 
        }

        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
        }

        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function deleteSong(id) { 
            if (confirm(t('delete_confirm'))) {
                db.transaction("songs", "readwrite").objectStore("songs").delete(id).onsuccess = loadAll; 
            }
        }

        function deletePlaylist(id) { 
            if (id === 'fav') return;
            if (confirm(t('delete_confirm'))) {
                db.transaction("playlists", "readwrite").objectStore("playlists").delete(id).onsuccess = loadAll; 
            }
        }

        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }

        /*
           ========================================
           Playlist Editing
           ========================================
        */
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(tag => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${tag} <i class="fa-solid fa-xmark" onclick="removePlTag('${tag}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if (val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }

        function removePlTag(tag) {
            currentPlTags = currentPlTags.filter(x => x !== tag);
            renderPlTags();
        }

        function togglePlFav() {
            tempPlFav = !tempPlFav;
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            if (tempPlFav) {
                icon.className = 'fa-solid fa-star star-icon active';
            } else {
                icon.className = 'fa-regular fa-star star-icon';
            }
        }

        function openPlEdit(id) { 
            if (id === 'fav') return;
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(tg => tg.trim()).filter(tg => tg) : [];
            tempPlFav = pl.favorite || false;
            
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }

        function closePlEdit() { 
            document.getElementById('pl-edit-modal').style.display = 'none'; 
        }

        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            pl.favorite = tempPlFav;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if (f) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = [...new Set(getAllArtistsStructured().flatMap(p => [p.name, ...p.children]))].sort();
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) {
                    p.tag.split(/[,、]/).forEach(tg => {
                        const tr = tg.trim(); 
                        if (tr && !allTags.includes(tr)) allTags.push(tr);
                    });
                }
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }

        /*
           ========================================
           Artist Setup & Icon
           ========================================
        */
        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }

        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if (f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, favorite: false, members: [], syncColor: '' };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [], syncColor: '' };
            if (!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup(meta.syncColor);
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }

        function renderArtistSetup(syncCol = '') {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label" data-i18n="artist">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;" data-i18n="add_member">+ Add Member</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="${t('member_name')}">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addArtistMember() { 
            currentMembersEdit.push({ name: '', color: 'var(--icon-color)', linked: null }); 
            renderArtistSetup(''); 
        }

        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(''); 
        }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { 
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move'; 
        }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup('');
            }
        }
        function handleDragEnd(e) { 
            e.target.classList.remove('dragging'); 
            draggedMemIndex = -1; 
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = [...new Set(getAllArtistsStructured().flatMap(p => [p.name, ...p.children]))].sort();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);" data-i18n="unlink">${t('unlink')}</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if (currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                renderArtistSetup('');
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if (newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let arts = extractArtists(t.artist);
                    let changed = false;
                    for (let i = 0; i < arts.length; i++) { 
                        if (arts[i] === oldName) { 
                            arts[i] = newName; 
                            changed = true; 
                        } 
                    }
                    if (changed) { 
                        t.artist = arts.join(', '); 
                        store.put(t); 
                        tracksChanged = true; 
                    }
                });
                
                if (currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if (tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        /*
           ========================================
           Lyric Color Paint Setup
           ========================================
        */
        function openLyricPaint() {
            const track = playingTracks[currentTrackIdx];
            if (!track) return;
            
            let allMembers = [];
            let arts = extractArtists(track.artist);
            
            arts.forEach(a => {
                if (artistMeta[a] && artistMeta[a].members) {
                    allMembers = allMembers.concat(artistMeta[a].members);
                }
            });
            allMembers.push({ name: 'Reset', color: '' });

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            currentLyricColors = track.lyricColors ? [...track.lyricColors] : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="currentPaintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color ? m.color : 'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function renderPaintLyrics() {
            const track = playingTracks[currentTrackIdx];
            const lines = (track.lyrics || '').split('\n');
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = lines.map((l, i) => `
                <div onclick="applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:var(--input-bg); color:${currentLyricColors[i] || 'var(--text-main)'}; border-left:6px solid ${currentLyricColors[i] || 'transparent'}; cursor:pointer; font-weight:800; text-align:center;">
                    ${l || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                </div>
            `).join('');
        }

        function applyLyricColor(i) {
            currentLyricColors[i] = currentPaintColor;
            renderPaintLyrics();
        }

        function saveLyricFadeTime(val) {
            document.documentElement.style.setProperty('--lyric-fade-time', val + 's');
            localStorage.setItem('lyricFadeTime', val);
        }

        function saveLyricPaint() {
            const track = playingTracks[currentTrackIdx];
            track.lyricColors = currentLyricColors;
            db.transaction("songs", "readwrite").objectStore("songs").put(track).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        let savedFade = localStorage.getItem('lyricFadeTime') || '0.5';
        document.documentElement.style.setProperty('--lyric-fade-time', savedFade + 's');
        const lyricTimeInput = document.getElementById('lyric-time-input');
        if (lyricTimeInput) lyricTimeInput.value = savedFade;

        /*
           ========================================
           File Upload
           ========================================
        */
        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if (tag.tags.picture) {
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for (let i = 0; i < d.length; i++) {
                                s += String.fromCharCode(d[i]);
                            }
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: tag.tags.artist || "Unknown", 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            favorite: false,
                            lyricTimestamps: [],
                            lyricColors: []
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: "Unknown", 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            favorite: false,
                            lyricTimestamps: [],
                            lyricColors: []
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        /*
           ========================================
           Touch Actions
           ========================================
        */
        let touchStartX = 0;
        function handleTouchStart(e, id) { 
            if (isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }

        function handleTouchMove(e, id) {
            if (isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if (btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }

        function handleTouchEnd(e, id) {
            if (isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (!el) return;
            
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            
            if (moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if (btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if (btn) btn.style.opacity = 0;
            }
        }

        /*
           ========================================
           Queue
           ========================================
        */
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx + 1 + i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${renderCompactArtists(t.artist)}</div>
                    </div>
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
