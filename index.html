<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wish Player ✧</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-heavy: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --sub-text: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: var(--text);
            /* 動くオーロラ背景（ウィッシュコアの儚い色調） */
            background: linear-gradient(45deg, #0f172a, #334155, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 画面全体のぼかしレイヤー（これがApple Musicの肝） */
        .blur-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(167, 139, 250, 0.3), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 45, 85, 0.2), transparent 50%);
            z-index: -1;
        }

        .player-card {
            width: 90%;
            max-width: 380px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* アートワーク：影と角丸をApple Musicに忠実に */
        .artwork-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 再生中の心拍のようなアニメーション */
        .artwork-box.playing { transform: scale(1.02); }

        .info { margin-bottom: 30px; }
        .info h1 { font-size: 1.6rem; margin: 0; font-weight: 700; letter-spacing: -0.02em; }
        .info p { font-size: 1.2rem; margin: 5px 0; color: var(--sub-text); }

        /* プログレスバー（Apple Music特有の細さ） */
        .slider-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 40px;
            position: relative;
            cursor: pointer;
        }
        #fill {
            height: 100%;
            background: #fff;
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* コントロール */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
        }
        .btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            padding: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.9); opacity: 0.6; }
        .play-pause { font-size: 4rem; }

        /* リスト：半透明のフロストガラス */
        .queue {
            flex-grow: 1;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .song {
            display: flex;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1rem;
            cursor: pointer;
        }
        .active { color: #ff2d55; text-shadow: 0 0 10px rgba(255,45,85,0.5); }

        .add-label {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 0.8rem;
            color: var(--sub-text);
            cursor: pointer;
            border: 1px solid var(--sub-text);
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="blur-overlay"></div>

<label for="fileInput" class="add-label">Library +</label>
<input type="file" id="fileInput" accept=".mp3,.m4a" multiple style="display:none">

<div class="player-card">
    <div class="artwork-box" id="art">✧</div>

    <div class="info">
        <h1 id="title">Waiting...</h1>
        <p id="artist">Wishcore Library</p>
    </div>

    <div class="slider-container" id="trackBox">
        <div id="fill"></div>
    </div>

    <div class="controls">
        <button class="btn" id="prev">⏮</button>
        <button class="btn play-pause" id="play">▶︎</button>
        <button class="btn" id="next">⏭</button>
    </div>

    <div class="queue" id="queue"></div>
</div>

<audio id="audio"></audio>

<script>
    let db, playlist = [], cur = -1;
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');

    const req = indexedDB.open("ProWishDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "name" });
    req.onsuccess = e => { db = e.target.result; load(); };

    document.getElementById('fileInput').onchange = e => {
        const tx = db.transaction("songs", "readwrite");
        for(let f of e.target.files) tx.objectStore("songs").put({name: f.name, data: f});
        tx.oncomplete = load;
    };

    function load() {
        db.transaction("songs").objectStore("songs").getAll().onsuccess = e => {
            playlist = e.target.result;
            render();
        };
    }

    function render() {
        const q = document.getElementById('queue');
        q.innerHTML = "";
        playlist.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = `song ${i === cur ? 'active' : ''}`;
            d.innerHTML = `<span>${s.name}</span>`;
            d.onclick = () => playAt(i);
            q.appendChild(d);
        });
    }

    function playAt(i) {
        if(i < 0 || i >= playlist.length) return;
        cur = i;
        const s = playlist[cur];
        audio.src = URL.createObjectURL(s.data);
        document.getElementById('title').textContent = s.name;
        document.getElementById('art').classList.add('playing');
        audio.play();
        playBtn.textContent = "⏸";
        render();
    }

    playBtn.onclick = () => {
        if(audio.paused) { audio.play(); playBtn.textContent = "⏸"; }
        else { audio.pause(); playBtn.textContent = "▶︎"; }
    };

    document.getElementById('next').onclick = () => playAt((cur + 1) % playlist.length);
    document.getElementById('prev').onclick = () => playAt((cur - 1 + playlist.length) % playlist.length);
    
    audio.ontimeupdate = () => {
        document.getElementById('fill').style.width = (audio.currentTime / audio.duration * 100) + "%";
    };

    audio.onended = () => document.getElementById('next').click();

    document.getElementById('trackBox').onclick = e => {
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    };
</script>
</body>
</html>
