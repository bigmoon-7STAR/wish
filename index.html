<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Player</title>
    <style>
        :root { --bg-color: #121212; --accent-color: #1e90ff; }
        body {
            margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color); color: white;
            transition: background 0.8s ease; /* 背景色変化の演出 */
            height: 100vh; overflow: hidden;
        }
        /* 動的なグラデーション背景 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(30,144,255,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }
        .container { padding: 20px; height: calc(100vh - 100px); overflow-y: auto; }
        h1 { font-size: 24px; margin-bottom: 20px; }

        /* 曲リスト */
        .track-item {
            display: flex; align-items: center; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .track-item:hover { background: rgba(255,255,255,0.05); }

        /* ミニプレイヤー（常時表示） */
        .mini-player {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 20px;
            box-sizing: border-box; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .album-art {
            width: 60px; height: 60px; border-radius: 4px;
            background: #333; margin-right: 15px; object-fit: cover;
        }
        .info { flex: 1; }
        .title { font-weight: bold; font-size: 16px; display: block; }
        .artist { color: #aaa; font-size: 13px; }
        .controls { display: flex; gap: 20px; font-size: 24px; cursor: pointer; }

        /* ドロップエリア */
        #drop-zone {
            border: 2px dashed #444; padding: 20px; text-align: center;
            border-radius: 10px; margin-bottom: 20px; color: #888;
        }
    </style>
</head>
<body>
    <div class="overlay" id="bg-overlay"></div>

    <div class="container">
        <h1>ライブラリ</h1>
        <div id="drop-zone">ここにM4aファイルをドラッグ＆ドロップ</div>
        <div id="track-list">
            <div class="track-item">
                <div style="flex: 1;">曲を選択するか、ファイルを読み込んでください</div>
            </div>
        </div>
    </div>

    <div class="mini-player">
        <canvas id="color-canvas" style="display:none;"></canvas>
        <img src="https://via.placeholder.com/60" class="album-art" id="player-art">
        <div class="info">
            <span class="title" id="player-title">未選択</span>
            <span class="artist" id="player-artist">-</span>
        </div>
        <div class="controls">
            <span>⏮</span> <span id="play-btn">▶️</span> <span>⏭</span>
        </div>
    </div>

    <script>
        // ここにJavaScriptを書いていきます（色抽出や再生ロジック）
        const dropZone = document.getElementById('drop-zone');
        
        // ドラッグ＆ドロップの基本処理
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#1e90ff';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#444';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            alert(`${files.length}個のファイルを読み込みました（実装中）`);
        });
    </script>
</body>
</html>
