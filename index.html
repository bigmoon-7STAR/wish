                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));

                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {

                                return `<div class="artist-icon-chip" onclick="toggleArtistFilter('${a}')">${iconHtml}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    filtered = filtered.filter(t => {
                        const str = `${t.name} ${(t.mainArtists||[]).join(' ')} ${(t.subArtists||[]).join(' ')}`.toLowerCase();
                        return searchTerms.every(term => str.includes(term));
                    });
                    
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => (t.mainArtists && t.mainArtists.includes(activeArtistFilter)) || (t.subArtists && t.subArtists.includes(activeArtistFilter)));
                    }

                    if (currentSort === 'name') filtered.sort((a,b) => sortDirs[viewKey] ? a.name.localeCompare(b.name,'ja') : b.name.localeCompare(a.name,'ja'));
                    else if (currentSort === 'year') filtered.sort((a,b) => sortDirs[viewKey] ? (a.year||'').toString().localeCompare((b.year||'').toString()) : (b.year||'').toString().localeCompare((a.year||'').toString()));
                    else if (currentSort === 'artist') filtered.sort((a,b) => sortDirs[viewKey] ? getArtistString(a).localeCompare(getArtistString(b),'ja') : getArtistString(b).localeCompare(getArtistString(a),'ja'));

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">${t('remove')}</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <img src="${t.cover||''}">

                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${getArtistString(t)}</div>
                                </div>
                                ${currentSort==='custom'? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;"><i class="fa-solid fa-plus"></i> Add Tracks</button></div>`;
                }
            }

                leftBtn.className = 'fa-solid fa-chevron-left';

                leftBtn.className = isEditing ? 'fa-solid fa-check' : 'fa-solid fa-sliders';

                rightIcon.className = 'fa-solid fa-plus';

            // Restore scroll
            setTimeout(() => {

        function renderCards(list, container, sort, asc) {
            if (sort === 'name') list.sort((a,b) => asc ? a.name.localeCompare(b.name,'ja') : b.name.localeCompare(a.name,'ja'));
            else if (sort === 'year') list.sort((a,b) => asc ? (a.year||'').toString().localeCompare((b.year||'').toString()) : (b.year||'').toString().localeCompare((a.year||'').toString()));
            else if (sort === 'artist') list.sort((a,b) => asc ? getArtistString(a).localeCompare(getArtistString(b),'ja') : getArtistString(b).localeCompare(getArtistString(a),'ja'));
            else list.sort((a,b) => asc ? a.id - b.id : b.id - a.id);
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img">
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">

                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        }

        // PLAYER CONTROLS
        // ==========================================
        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.classList.add('animating');
            fPlayer.style.transform = '';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
            setTimeout(() => fPlayer.classList.remove('animating'), 600);
        });

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.05";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let lyricData = track?.lyricData || [];
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricTiming()" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.2); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-pen"></i></button>`;
                
                let linesHtml = lyricData.map((line, i) => {
                    let grad = "inherit";
                    if (line.members && line.members.length > 0) {
                        let colors = line.members.map(mName => {
                            // Find color
                            let c = 'var(--text-dark)';
                            Object.values(artistMeta).forEach(meta => {
                                if(meta.members) meta.members.forEach(mm => {
                                    if(mm.name === mName && mm.color) c = mm.color;
                                });
                            });
                            return c;
                        });
                        
                        if(colors.length === 1) {
                            grad = colors[0];
                            return `<div class="lyric-line" id="lyric-line-${i}" onclick="event.stopPropagation(); seekAudio(${line.time})" style="color:${grad}">${line.text}</div>`;
                        } else {
                            let gradStr = `linear-gradient(90deg, ${colors.join(', ')})`;
                            return `<div class="lyric-line" id="lyric-line-${i}" onclick="event.stopPropagation(); seekAudio(${line.time})"><span class="gradient-text" style="background:${gradStr}">${line.text}</span></div>`;
                        }
                    }
                    return `<div class="lyric-line" id="lyric-line-${i}" onclick="event.stopPropagation(); seekAudio(${line.time})">${line.text}</div>`;
                }).join('');
                
                if (lyricData.length === 0) {
                    linesHtml = `<div class="lyric-line active" style="text-align:center; padding-top:50px; font-size:16px;">No lyrics available.</div>`;
                }
                
                view.innerHTML = paintBtn + `<div id="lyrics-scroll-container" class="lyrics-scroll-container">${linesHtml}</div>`;
                updateActiveLyric(audio.currentTime);
                
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
            }
        }

            else if(currentPlaylistId) currentPlaylistId=null;

            render();

        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => (t.mainArtists && t.mainArtists.includes(currentArtist)) || (t.subArtists && t.subArtists.includes(currentArtist)));

            else if(currentPlaylistId) openBulkAddModal();

                });

        function togglePlay() { 
            if (audio.src) audio.paused ? audio.play() : audio.pause(); 
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { audio.pause(); audio.currentTime = 0; return; }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }

        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => (tx.mainArtists && tx.mainArtists.includes(currentArtist)) || (tx.subArtists && tx.subArtists.includes(currentArtist)));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            
            // Fix abrupt volume bug
            audio.volume = 1.0;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            if(audio.src) {
                // Remove previous
            }
            try {
                audio.src = URL.createObjectURL(t.data);
                audio.load();
            } catch(e) { console.error(e); }
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            document.getElementById('m-artist').innerText = getArtistString(t);
            
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = getArtistString(t);
            
            document.getElementById('mini').style.display = 'flex';
            
            const view = document.getElementById('f-lyrics-view');
            if (view.classList.contains('active')) {
                toggleLyrics(); // Refresh lyrics
                toggleLyrics();
            }
            
            updatePlayerBlurBg();
            
            // Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.name,
                    artist: getArtistString(t),
                    artwork: t.cover ? [{ src: t.cover, sizes: '512x512', type: 'image/jpeg' }] : []
                });
                navigator.mediaSession.setActionHandler('play', function() { audio.play(); });
                navigator.mediaSession.setActionHandler('pause', function() { audio.pause(); });
                navigator.mediaSession.setActionHandler('previoustrack', function() { prev(); });
                navigator.mediaSession.setActionHandler('nexttrack', function() { next(); });
            }

            audio.play().catch(e=>console.log(e));
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            else el.innerText = text;
        }

        function formatTime(s) { 
            let m=Math.floor(s/60), sec=Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }

        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                // Lyrics update
                if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                    updateActiveLyric(audio.currentTime);
                }
            } 
        };

        function seekAudio(val) {
            audio.currentTime = val;
        }

        let currentActiveLineIdx = -1;
        function updateActiveLyric(time) {
            let track = playingTracks[currentTrackIdx];
            if (!track || !track.lyricData || track.lyricData.length === 0) return;
            
            let data = track.lyricData;
            let activeIdx = -1;
            
            for (let i = 0; i < data.length; i++) {
                if (time >= data[i].time) {
                    activeIdx = i;
                } else {
                    break;
                }
            }
            
            if (activeIdx !== currentActiveLineIdx) {
                currentActiveLineIdx = activeIdx;
                
                // Clear old active
                document.querySelectorAll('.lyric-line').forEach((el, i) => {
                    if(i === activeIdx) el.classList.add('active');
                    else el.classList.remove('active');
                });
                
                // Scroll to active line
                if (activeIdx >= 0) {
                    const activeEl = document.getElementById(`lyric-line-${activeIdx}`);
                    const container = document.getElementById('lyrics-scroll-container');
                    if (activeEl && container) {
                        const offset = activeEl.offsetTop - (container.clientHeight / 2) + (activeEl.clientHeight / 2);
                        container.scrollTo({ top: offset, behavior: 'smooth' });
                    }
                }
            }
        }

        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };

        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };

        audio.onended = () => { next(); };

            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => {
                const icon = getArtistIcon(a) ? `<img src="${getArtistIcon(a)}" style="width:16px;height:16px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : '';
                return `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtistBtn();">${icon}${a}</div>`;
            }).join(''); 
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(tg => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${tg}'; addPlTagBtn();">${tg}</div>`).join(''); 
        }

        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }

        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [] };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        // ==========================================
        // ARTIST SETUP LOGIC
        // ==========================================
        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, members: [] };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }

        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">${t('addmember')}</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">${t('delete')}</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); 
            renderArtistSetup(); 
        }

        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(); 
        }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedMemIndex = -1; }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = getArtistIcon(a) ? `<img src="${getArtistIcon(a)}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">${t('unlink')}</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if(a && !currentMembersEdit[currentSyncIndex].name) currentMembersEdit[currentSyncIndex].name = a;
                // Auto sync color if link artist has members
                if(a && artistMeta[a] && artistMeta[a].members && artistMeta[a].members.length > 0) {
                    currentMembersEdit[currentSyncIndex].color = artistMeta[a].members[0].color;
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let changed = false;
                    if(t.mainArtists) {
                        for(let i=0; i<t.mainArtists.length; i++) { if(t.mainArtists[i] === oldName) { t.mainArtists[i] = newName; changed = true; } }
                    }
                    if(t.subArtists) {
                        for(let i=0; i<t.subArtists.length; i++) { if(t.subArtists[i] === oldName) { t.subArtists[i] = newName; changed = true; } }
                    }
                    if(changed) { store.put(t); tracksChanged = true; }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        // ==========================================
        // LYRICS SETUP LOGIC
        // ==========================================
        function openLyricTiming() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            currentLyricData = t.lyricData ? JSON.parse(JSON.stringify(t.lyricData)) : [];
            if(currentLyricData.length === 0) {
                currentLyricData = [{time: 0, text: "", members: []}];
            }
            
            // Build member color palette from main artists
            let allMembers = [];
            if(t.mainArtists) {
                t.mainArtists.forEach(a => {
                    if(artistMeta[a] && artistMeta[a].members) {
                        allMembers = allMembers.concat(artistMeta[a].members);
                    }
                });
            }
            
            const pal = document.getElementById('lyric-color-palette');
            pal.innerHTML = allMembers.map(m => `
                <div class="color-palette-item ${activeLyricColorMember===m.name?'selected':''}" onclick="setLyricActiveColor('${m.name}')" id="pal-${m.name}">
                    <div class="color-palette-circle" style="background:${m.color || '#ccc'};"></div>
                    <span style="font-size:10px; margin-top:4px; max-width:50px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.name}</span>
                </div>
            `).join('');

            renderLyricTimingLines();
            document.getElementById('lyric-timing-modal').style.display = 'flex';
        }

        function setLyricActiveColor(name) {
            if (activeLyricColorMember === name) {
                activeLyricColorMember = null;
            } else {
                activeLyricColorMember = name;
            }
            document.querySelectorAll('.color-palette-item').forEach(el => el.classList.remove('selected'));
            if(activeLyricColorMember) {
                const el = document.getElementById(`pal-${name}`);
                if(el) el.classList.add('selected');
            }
        }

        function batchInsertLyrics() {
            showPrompt("Paste Lyrics Here (Line breaks divide measures)", (val) => {
                if(val) {
                    let lines = val.split('\n').map(l => l.trim()).filter(l => l);
                    currentLyricData = lines.map(l => ({time: 0, text: l, members: []}));
                    renderLyricTimingLines();
                }
            });
        }

        function addEmptyLyricLine() {
            currentLyricData.push({time: 0, text: "", members: []});
            renderLyricTimingLines();
        }

        function removeLyricLine(idx) {
            currentLyricData.splice(idx, 1);
            renderLyricTimingLines();
        }

        function applyActiveColorToLine(idx) {
            if(!activeLyricColorMember) return;
            let members = currentLyricData[idx].members || [];
            if(members.includes(activeLyricColorMember)) {
                members = members.filter(m => m !== activeLyricColorMember);
            } else {
                members.push(activeLyricColorMember);
            }
            currentLyricData[idx].members = members;
            renderLyricTimingLines();
        }

        function renderLyricTimingLines() {
            const container = document.getElementById('lyric-lines-container');
            container.innerHTML = currentLyricData.map((l, i) => {
                let chipsHtml = (l.members || []).map(mName => {
                    let c = '#ccc';
                    Object.values(artistMeta).forEach(meta => {
                        if(meta.members) meta.members.forEach(mm => {
                            if(mm.name === mName && mm.color) c = mm.color;
                        });
                    });
                    return `<span class="member-chip" style="background:${c}">${mName}</span>`;
                }).join('');
                
                return `
                <div class="lyric-edit-row">
                    <button class="lyric-btn" style="padding:10px;" onclick="currentLyricData[${i}].time=audio.currentTime; renderLyricTimingLines();"><i class="fa-solid fa-clock"></i></button>
                    <input type="number" class="lyric-time-input" value="${l.time}" step="0.1" onchange="currentLyricData[${i}].time=parseFloat(this.value) || 0" id="lyr-t-${i}" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('lyr-t-${i+1}')?.focus();}">
                    <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                        <input type="text" class="lyric-edit-input" value="${l.text}" oninput="currentLyricData[${i}].text=this.value" id="lyr-txt-${i}" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('lyr-txt-${i+1}')?.focus();}">
                        <div style="min-height:20px; cursor:pointer;" onclick="applyActiveColorToLine(${i})">
                            ${chipsHtml || '<span style="font-size:10px; color:var(--sub-text);">No colors (Tap to apply selected)</span>'}
                        </div>
                    </div>
                    <button class="lyric-btn" style="background:var(--del-color); padding:10px;" onclick="removeLyricLine(${i})"><i class="fa-solid fa-trash"></i></button>
                </div>
                `;
            }).join('');
        }

        function closeLyricTiming() {
            document.getElementById('lyric-timing-modal').style.display = 'none';
        }

        function saveLyricTiming() {
            const t = playingTracks[currentTrackIdx];
            currentLyricData.sort((a,b) => a.time - b.time);
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                closeLyricTiming();
                loadAll();
            };
        }

        // ==========================================
        // BULK ADD LOGIC
        // ==========================================
        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            document.getElementById('bulk-search-box').value = '';
            document.getElementById('bulk-artist-suggestions').style.display = 'none';
            document.getElementById('bulk-modal').style.display = "flex";
            
            const list = document.getElementById('bulk-list');
            list.innerHTML = tracks.map(t => `
                <label class="check-item" data-search="${t.name.toLowerCase()} ${(t.mainArtists||[]).join(' ').toLowerCase()}">
                    <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                    <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                    <div style="flex:1;"><b style="font-size:14px;">${t.name}</b><br><span style="font-size:11px; color:var(--icon-color);">${getArtistString(t)}</span></div>
                </label>`).join('');
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const iconUrl = getArtistIcon(a);
                    const iconHtml = iconUrl ? `<img src="${iconUrl}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`;
                    return `<div class="artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${iconHtml}<span>${a}</span></div>`;
                }).join('');
            } else { suggest.style.display = 'none'; }
        }

        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').style.display = 'none'; 
            }; 
        }

        // ==========================================
        // QUEUE LOGIC
        // ==========================================
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div style="flex:1;">
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${getArtistString(t)}</div>
                    </div>
                </div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }

        // ==========================================
        // FILE UPLOAD LOGIC
        // ==========================================
        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        let mainArt = [];
                        if(tag.tags.artist) mainArt = tag.tags.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x);
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            mainArtists: mainArt,
                            subArtists: [],
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricData: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            mainArtists: [], 
                            subArtists: [],
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricData: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        // ==========================================
        // SWIPE TO DELETE LOGIC
        // ==========================================
        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }

        // START
        initSettings();

    </script>
</body>
</html>
