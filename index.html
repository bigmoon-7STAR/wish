<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Offline Web Player</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #playlist { list-style: none; padding: 0; width: 300px; }
        li { background: #333; margin: 5px 0; padding: 10px; cursor: pointer; border-radius: 5px; }
        li:hover { background: #444; }
        audio { margin-top: 20px; width: 300px; }
    </style>
</head>
<body>

    <h2>Offline Player</h2>
    <input type="file" id="fileInput" accept="audio/*" multiple>
    
    <ul id="playlist"></ul>
    
    <audio id="audioPlayer" controls></audio>

    <script>
        // 1. IndexedDBの初期化
        let db;
        const request = indexedDB.open("MusicDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "name" });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            displayPlaylist();
        };

        // 2. ファイルを保存する
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");

            for (const file of files) {
                store.put({ name: file.name, data: file });
            }

            transaction.oncomplete = () => displayPlaylist();
        });

       // 3. リスト表示（削除ボタン付き）
function displayPlaylist() {
    const list = document.getElementById('playlist');
    list.innerHTML = "";
    const transaction = db.transaction(["songs"], "readonly");
    const store = transaction.objectStore("songs");

    store.getAll().onsuccess = (e) => {
        e.target.result.forEach(song => {
            const li = document.createElement('li');
            li.style.display = "flex";
            li.style.justifyContent = "between";
            li.style.alignItems = "center";

            // 曲名表示部分
            const nameSpan = document.createElement('span');
            nameSpan.textContent = song.name;
            nameSpan.style.flexGrow = "1";
            nameSpan.onclick = () => playSong(song.data);
            
            // 削除ボタン
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = "削除";
            deleteBtn.style.marginLeft = "10px";
            deleteBtn.style.background = "#ff4444";
            deleteBtn.style.color = "white";
            deleteBtn.style.border = "none";
            deleteBtn.style.padding = "5px 10px";
            deleteBtn.style.borderRadius = "3px";
            deleteBtn.style.cursor = "pointer";
            
            deleteBtn.onclick = (event) => {
                event.stopPropagation(); // 親要素のクリックイベント（再生）を防ぐ
                deleteSong(song.name);
            };

            li.appendChild(nameSpan);
            li.appendChild(deleteBtn);
            list.appendChild(li);
        });
    };
}

// 4. データを削除する関数
function deleteSong(name) {
    if (!confirm(`${name} を削除しますか？`)) return;

    const transaction = db.transaction(["songs"], "readwrite");
    const store = transaction.objectStore("songs");
    const request = store.delete(name);

    request.onsuccess = () => {
        console.log("削除成功");
        displayPlaylist(); // リストを再描画
    };
}


        // Service Workerの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
