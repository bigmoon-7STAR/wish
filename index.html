                            plSongs.forEach(s => {
                                artistsInPl.push(...s.mainArtists);
                                artistsInPl.push(...s.subArtists);
                            });
                            artistsInPl = [...new Set(artistsInPl)];

                            if (artistsInPl.length > 0 && search.length > 0 && !isFavSearch) {
                                const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                                if (matchedArts.length > 0) {
                                    artistFilter.style.display = 'flex';
                                    artistFilter.innerHTML = matchedArts.map(a => {
                                        const iconHtml = app.utils.getArtistIconHtml(a, true);
                                        const opacity = app.state.activeArtistFilter === a ? '1' : '0.6';
                                        return `<div class="bulk-artist-icon-chip" onclick="app.ui.handlers.toggleArtistFilter('${a}')" style="opacity:${opacity}">${iconHtml}<span>${a}</span></div>`;
                                    }).join('');
                                }
                            }

                            let filtered = plSongs;
                            if (isFavSearch) filtered = filtered.filter(t => t.favorite);
                            else filtered = filtered.filter(t => searchTerms.every(term => 
                                t.name.toLowerCase().includes(term) || 
                                t.mainArtists.join(' ').toLowerCase().includes(term) ||
                                t.subArtists.join(' ').toLowerCase().includes(term)
                            ));
                            
                            if (app.state.activeArtistFilter) {
                                filtered = filtered.filter(t => t.mainArtists.includes(app.state.activeArtistFilter) || t.subArtists.includes(app.state.activeArtistFilter));
                            }

                            if (currentSort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name,'ja') * app.state.sortDirs.playlistDetail);
                            else if (currentSort === 'year') filtered.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()) * app.state.sortDirs.playlistDetail);
                            else if (currentSort === 'artist') filtered.sort((a,b) => (a.mainArtists[0]||'').localeCompare((b.mainArtists[0]||''),'ja') * app.state.sortDirs.playlistDetail);
                            // custom remains original order

                            document.getElementById('main-display-playlists').innerHTML = filtered.map((t, idx) => {
                                const artistDisplay = app.utils.formatArtistsDisplay(t.mainArtists, t.subArtists);
                                return `
                                <div class="swipe-container" id="swipe-${t.id}">
                                    <div class="swipe-delete-btn" onclick="app.db.removeTrackFromPlaylist(${t.id})">Remove</div>
                                    <div class="list-item" onclick="app.player.playSong(${t.id},'pl')" ontouchstart="app.ui.handlers.handleTouchStart(event, '${t.id}')" ontouchmove="app.ui.handlers.handleTouchMove(event, '${t.id}')" ontouchend="app.ui.handlers.handleTouchEnd(event, '${t.id}')">
                                        <div style="position:relative; margin-right:16px;">
                                            ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                            <img src="${t.cover||''}" alt="cover" style="margin-right:0;">
                                        </div>
                                        <div style="flex:1;">
                                            <div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div>
                                            <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${artistDisplay}</div>
                                        </div>
                                        ${currentSort==='custom' ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="app.ui.handlers.moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="app.ui.handlers.moveTrack(${idx}, 1)"></i></div>` : ''}
                                    </div>
                                </div>`;
                            }).join('') + `<div style="padding:40px; text-align:center;"><button onclick="app.ui.modals.openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>`;
                        }
                    }

                    // Headers Buttons Setup
                    if (app.state.currentArtist || app.state.currentPlaylistId) {
                        leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
                    } else {
                        leftBtn.innerHTML = app.state.isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
                    }
                    if (app.state.currentArtist) {
                        rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                    } else if (app.state.currentView === 'artists' && app.state.isEditing && !app.state.currentArtist) {
                        rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
                    } else {
                        rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
                    }
                },
                renderCards: function(list, container, sort, dir) {
                    if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name,'ja') * dir);
                    else if (sort === 'year') list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()) * dir);
                    else if (sort === 'artist') list.sort((a,b) => (a.mainArtists[0]||'').localeCompare((b.mainArtists[0]||''),'ja') * dir);
                    else list.sort((a,b) => (b.added - a.added) * dir);
                    
                    container.className = "grid";
                    container.innerHTML = list.map(t => {
                        const artistDisplay = app.utils.formatArtistsDisplay(t.mainArtists, t.subArtists);
                        return `
                        <div class="card ${app.state.isEditing?'editing':''}" onclick="app.state.isEditing ? app.ui.modals.openEdit(${t.id}) : app.player.playSong(${t.id},'lib')">
                            <div class="del-badge" onclick="event.stopPropagation(); app.db.deleteTrack(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                            <img src="${t.cover||''}" class="card-img" alt="cover">
                            ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                            <div class="card-info">
                                <div class="card-title">${t.name}</div>
                                <div class="card-sub">${artistDisplay} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                            </div>
                        </div>`;
                    }).join('');
                },
                createArtistListItemHtml: function(a, isChild, childColor = '') {
                    const iconClass = isChild ? "artist-icon-circle" : "artist-icon-star";
                    const iconHtml = app.utils.getArtistIconHtml(a, false, iconClass);
                    const containerClass = isChild ? "child-artist swipe-container" : "swipe-container";
                    const childColorStyle = childColor ? `border-left: 4px solid ${childColor}; border-radius: 4px; padding-left: 10px;` : '';
                    
                    return `
                    <div class="${containerClass}" id="swipe-art-${CSS.escape(a)}">
                        <div class="swipe-delete-btn" onclick="app.db.deleteCustomArtist('${a}')">Delete</div>
                        <div class="artist-list-item" onclick="app.state.isEditing ? app.ui.modals.selectArtistIcon('${a}') : app.ui.openArtist('${a}')" ontouchstart="app.ui.handlers.handleTouchStart(event, 'art-${a}')" ontouchmove="app.ui.handlers.handleTouchMove(event, 'art-${a}')" ontouchend="app.ui.handlers.handleTouchEnd(event, 'art-${a}')" style="${childColorStyle}">
                            <div class="artist-icon-container">${iconHtml}</div>
                            <div style="font-weight:800; font-size:16px; flex:1;">${a}</div>
                            <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                        </div>
                    </div>`;
                },
                openArtist: function(n) { 
                    app.state.currentArtist = n; 
                    this.render(); 
                },
                openPlaylist: function(id) { 
                    app.state.currentPlaylistId = id; 
                    app.state.activeArtistFilter = null; 
                    app.state.sortStates.playlistDetail = 'custom'; 
                    this.render(); 
                },
                initSwipeGestures: function() {
                    // Logic mostly handled in touch handlers per element
                },
                handlers: {
                    touchStartX: 0,
                    handleTouchStart: function(e, id) { 
                        if(app.state.isEditing) return; 
                        this.touchStartX = e.touches[0].clientX; 
                    },
                    handleTouchMove: function(e, id) {
                        if(app.state.isEditing) return;
                        let moveX = e.touches[0].clientX - this.touchStartX;
                        const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
                        const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
                        if (el && moveX < 0) { 
                            el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                            el.style.transition = "none";
                            if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
                        }
                    },
                    handleTouchEnd: function(e, id) {
                        if(app.state.isEditing) return;
                        const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
                        const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
                        if(!el) return;
                        let moveX = e.changedTouches[0].clientX - this.touchStartX;
                        el.style.transition = "transform 0.4s ease";
                        if(moveX < -40) {
                            el.style.transform = `translateX(-85px)`;
                            if(btn) btn.style.opacity = 1;
                        } else {
                            el.style.transform = `translateX(0)`;
                            if(btn) btn.style.opacity = 0;
                        }
                    },
                    handleSearchInput: function() {
                        const val = document.getElementById('search-input').value;
                        const viewKey = (app.state.currentView === 'playlists' && app.state.currentPlaylistId !== null) ? 'playlistDetail' : app.state.currentView;
                        app.state.searchQueries[viewKey] = val;
                        app.ui.render();
                    },
                    handleSortChange: function() {
                        const val = document.getElementById('sort-type').value;
                        const viewKey = (app.state.currentView === 'playlists' && app.state.currentPlaylistId !== null) ? 'playlistDetail' : app.state.currentView;
                        app.state.sortStates[viewKey] = val;
                        app.ui.render();
                    },
                    toggleSortDir: function() {
                        const viewKey = (app.state.currentView === 'playlists' && app.state.currentPlaylistId !== null) ? 'playlistDetail' : app.state.currentView;
                        app.state.sortDirs[viewKey] *= -1;
                        app.ui.render();
                    },
                    applyTagFilter: function(tag) {
                        const viewKey = (app.state.currentView === 'playlists' && app.state.currentPlaylistId !== null) ? 'playlistDetail' : app.state.currentView;
                        document.getElementById('search-input').value = tag;
                        app.state.searchQueries[viewKey] = tag;
                        app.ui.render();
                    },
                    toggleArtistFilter: function(a) {
                        app.state.activeArtistFilter = (app.state.activeArtistFilter === a) ? null : a;
                        app.ui.render();
                    },
                    moveTrack: function(idx, dir) {
                        const pl = app.state.playlists.find(p => p.id === app.state.currentPlaylistId);
                        if (!pl) return;
                        const newIdx = idx + dir;
                        if (newIdx < 0 || newIdx >= pl.songIds.length) return;
                        const temp = pl.songIds[idx];
                        pl.songIds[idx] = pl.songIds[newIdx];
                        pl.songIds[newIdx] = temp;
                        app.dbInstance.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => app.db.loadAll();
                    }
                },
                modals: {
                    open: function(id) {
                        document.getElementById(id).style.display = 'flex';
                    },
                    close: function(id) {
                        document.getElementById(id).style.display = 'none';
                    },
                    // Track Edit Modal Logic
                    openEdit: function(id) {
                        app.state.edit.trackId = id; 
                        const t = app.state.tracks.find(x => x.id === id); 
                        document.getElementById('edit-name').value = t.name; 
                        app.state.edit.trackMainArtists = [...(t.mainArtists || [])];
                        app.state.edit.trackSubArtists = [...(t.subArtists || [])];
                        app.state.edit.trackLyrics = [...(t.lyricsObj || [])];
                        app.state.edit.mainSubMode = 'main';
                        
                        document.getElementById('edit-artist-input').value = "";
                        document.getElementById('edit-year').value = t.year || ""; 
                        
                        this.renderTrackArtists();
                        this.renderTrackLyricsEdit();
                        this.updateArtistSuggest(""); 
                        this.open('edit-modal');
                    },
                    toggleMainSubArtistMode: function() {
                        app.state.edit.mainSubMode = app.state.edit.mainSubMode === 'main' ? 'sub' : 'main';
                        const btn = document.getElementById('btn-toggle-main-sub');
                        btn.innerText = `Mode: ${app.state.edit.mainSubMode === 'main' ? 'Main' : 'Sub'}`;
                    },
                    addTrackArtist: function() {
                        const el = document.getElementById('edit-artist-input');
                        const val = el.value.trim();
                        if(val) {
                            if (app.state.edit.mainSubMode === 'main' && !app.state.edit.trackMainArtists.includes(val)) {
                                app.state.edit.trackMainArtists.push(val);
                            } else if (app.state.edit.mainSubMode === 'sub' && !app.state.edit.trackSubArtists.includes(val)) {
                                app.state.edit.trackSubArtists.push(val);
                            }
                            el.value = '';
                            this.renderTrackArtists();
                        }
                    },
                    removeTrackArtist: function(a, isMain) {
                        if (isMain) {
                            app.state.edit.trackMainArtists = app.state.edit.trackMainArtists.filter(x => x !== a);
                        } else {
                            app.state.edit.trackSubArtists = app.state.edit.trackSubArtists.filter(x => x !== a);
                        }
                        this.renderTrackArtists();
                    },
                    renderTrackArtists: function() {
                        const mainHtml = app.state.edit.trackMainArtists.map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px; background:var(--grad-primary); color:#fff;">[Main] ${a} <i class="fa-solid fa-xmark" onclick="app.ui.modals.removeTrackArtist('${a}', true)" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
                        const subHtml = app.state.edit.trackSubArtists.map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">[Sub] ${a} <i class="fa-solid fa-xmark" onclick="app.ui.modals.removeTrackArtist('${a}', false)" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
                        document.getElementById('track-active-artists').innerHTML = mainHtml + subHtml;
                    },
                    updateArtistSuggest: function(v) {
                        const container = document.getElementById('artist-quick-select'); 
                        const artists = app.utils.getAllArtists(); 
                        container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; app.ui.modals.addTrackArtist();">${a}</div>`).join(''); 
                    },
                    // Lyrics Editor
                    renderTrackLyricsEdit: function() {
                        const c = document.getElementById('lyrics-editor-container');
                        c.innerHTML = app.state.edit.trackLyrics.map((ly, idx) => `
                            <div class="lyric-time-row">
                                <button onclick="app.ui.modals.insertCurrentTime(${idx})" style="background:var(--seeker-bg); border:none; border-radius:10px; padding:10px;"><i class="fa-solid fa-clock"></i></button>
                                <input type="number" step="0.1" class="lyric-time-input" value="${ly.time}" placeholder="Sec">
                                <input type="text" class="lyric-text-input" value="${ly.text}" placeholder="Lyric Text" onkeydown="app.ui.modals.handleLyricEnter(event, ${idx})">
                                <i class="fa-solid fa-trash-can" onclick="app.ui.modals.removeLyricLine(${idx})" style="color:var(--del-color); cursor:pointer; padding:10px;"></i>
                            </div>
                        `).join('');
                    },
                    addLyricLine: function() {
                        app.state.edit.trackLyrics.push({time: 0, text: "", colors: []});
                        this.renderTrackLyricsEdit();
                    },
                    removeLyricLine: function(idx) {
                        app.state.edit.trackLyrics.splice(idx, 1);
                        this.renderTrackLyricsEdit();
                    },
                    insertCurrentTime: function(idx) {
                        const inputs = document.querySelectorAll('.lyric-time-input');
                        if (inputs[idx]) {
                            inputs[idx].value = app.audioEl.currentTime.toFixed(2);
                        }
                    },
                    handleLyricEnter: function(e, idx) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (idx === app.state.edit.trackLyrics.length - 1) {
                                this.addLyricLine();
                            } else {
                                const texts = document.querySelectorAll('.lyric-text-input');
                                if(texts[idx+1]) texts[idx+1].focus();
                            }
                        }
                    },
                    batchInsertLyrics: function() {
                        const raw = prompt("Paste lyrics (split by newline):");
                        if(raw) {
                            const lines = raw.split('\n');
                            let timeCounter = 0;
                            lines.forEach(l => {
                                app.state.edit.trackLyrics.push({ time: timeCounter, text: l.trim(), colors: [] });
                                timeCounter += 2; // Arbitrary 2 sec increment
                            });
                            this.renderTrackLyricsEdit();
                        }
                    },
                    // Playlist Edit Modal Logic

                        const pl = app.state.playlists.find(p => p.id === id); 
                        document.getElementById('pl-edit-name').value = pl.name;

                    removeArtistMember: function(i) {

                    dragMember: function(e, i) {

                            let temp = app.state.edit.members[this.draggedMemIndex];
                            app.state.edit.members.splice(this.draggedMemIndex, 1);
                            app.state.edit.members.splice(i, 0, temp);
                            this.renderArtistSetup();
                        }
                    },
                    openSyncModal: function(i) {
                        app.state.edit.syncIndex = i;
                        let artists = app.utils.getAllArtists();
                        const body = document.getElementById('artist-sync-body');
                        body.innerHTML = artists.map(a => {
                            let iconHtml = app.utils.getArtistIconHtml(a, true);
                            return `<div class="artist-chip" style="display:inline-flex;align-items:center;gap:5px;" onclick="app.ui.modals.linkArtistMember('${a}')">${iconHtml}${a}</div>`;
                        }).join('') + `<div class="artist-chip" onclick="app.ui.modals.linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
                        this.open('artist-sync-modal');
                    },
                    linkArtistMember: function(a) {
                        if(app.state.edit.syncIndex !== -1) {
                            app.state.edit.members[app.state.edit.syncIndex].linked = a || null;
                            if (a && !app.state.edit.members[app.state.edit.syncIndex].name) {
                                app.state.edit.members[app.state.edit.syncIndex].name = a; // Auto input name
                            }
                            this.renderArtistSetup();
                        }
                        this.close('artist-sync-modal');
                    },
                    // Lyric Paint Modal
                    openLyricPaint: function() {
                        const t = app.state.playingTracks[app.state.currentTrackIdx];
                        if(!t) return;
                        
                        let allMembers = [];
                        t.mainArtists.forEach(a => {
                            if(app.state.artistMeta[a] && app.state.artistMeta[a].members) {
                                allMembers = allMembers.concat(app.state.artistMeta[a].members);
                            }
                        });
                        allMembers.push({name: 'Reset', color: ''});

                        app.state.edit.paintColor = allMembers[0] ? allMembers[0].color : '';
                        
                        // Extract existing colors
                        app.state.edit.lyricColors = t.lyricsObj.map(l => l.colors || []);
                        
                        const pal = document.getElementById('paint-palette');
                        pal.innerHTML = allMembers.map(m => `
                            <div onclick="app.state.edit.paintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                                <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                                <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                            </div>
                        `).join('');

                        this.renderPaintLyrics();
                        this.open('lyric-paint-modal');
                    },
                    renderPaintLyrics: function() {
                        const t = app.state.playingTracks[app.state.currentTrackIdx];
                        const container = document.getElementById('paint-lyrics-container');
                        container.innerHTML = t.lyricsObj.map((l, i) => {
                            const colors = app.state.edit.lyricColors[i] || [];
                            let bgStyle = 'var(--input-bg)';
                            if (colors.length === 1) bgStyle = colors[0];
                            else if (colors.length > 1) bgStyle = `linear-gradient(90deg, ${colors.join(', ')})`;
                            
                            return `
                            <div onclick="app.ui.modals.applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:${bgStyle}; color: ${colors.length > 0 ? '#fff' : 'var(--text-main)'}; text-shadow: ${colors.length > 0 ? '0 1px 3px rgba(0,0,0,0.5)' : 'none'}; cursor:pointer; font-weight:800; text-align:center; transition:0.3s;">
                                ${l.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                            </div>`;
                        }).join('');
                    },
                    applyLyricColor: function(i) {
                        let currentColors = app.state.edit.lyricColors[i] || [];
                        if (!app.state.edit.paintColor) {
                            currentColors = []; // Reset
                        } else {
                            if (!currentColors.includes(app.state.edit.paintColor)) {
                                currentColors.push(app.state.edit.paintColor);
                            } else {
                                currentColors = currentColors.filter(c => c !== app.state.edit.paintColor);
                            }
                        }
                        app.state.edit.lyricColors[i] = currentColors;
                        this.renderPaintLyrics();
                    },
                    selectArtistIcon: function(name) {
                        app.state.edit.artistName = name;
                        document.getElementById('artist-icon-upload').click();
                    },
                    openBulkAddModal: function() {
                        const pl = app.state.playlists.find(p => p.id === app.state.currentPlaylistId);
                        const div = document.createElement('div'); 
                        div.id="bulk-modal"; 
                        div.className="modal"; 
                        div.style.display = "flex";
                        div.innerHTML = `
                            <div class="header">
                                <div class="header-top">
                                    <button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                                    <h2>Select Songs</h2>
                                    <button onclick="app.ui.modals.saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">Done</button>
                                </div>
                            </div>
                            <div class="search-container">
                                <div class="search-bar-row">
                                    <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="app.ui.modals.filterBulk(this.value)">
                                </div>
                                <div id="bulk-artist-suggestions"></div>
                            </div>
                            <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                                ${app.state.tracks.map(t => `
                                <label class="check-item" data-search="${t.name.toLowerCase()} ${t.mainArtists.join(' ').toLowerCase()} ${t.subArtists.join(' ').toLowerCase()}">
                                    <input type="checkbox" value="${t.id}" ${(pl.songIds||[]).includes(t.id)?'checked':''}>
                                    <img src="${t.cover||''}" alt="cover" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                                    <div style="flex:1;">
                                        <b style="font-size:14px;">${t.name}</b><br>
                                        <span style="font-size:11px; color:var(--icon-color);">${app.utils.formatArtistsDisplay(t.mainArtists, t.subArtists)}</span>
                                    </div>
                                </label>`).join('')}
                            </div>`;
                        document.body.appendChild(div);
                    },
                    filterBulk: function(val) {
                        const v = val.toLowerCase();
                        const items = document.querySelectorAll('#bulk-list .check-item');
                        items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
                    },
                    saveBulkAdd: function() {
                        const pl = app.state.playlists.find(p => p.id === app.state.currentPlaylistId);
                        const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
                        pl.songIds = newIds;
                        app.dbInstance.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                            app.db.loadAll();
                            document.getElementById('bulk-modal').remove();
                        };
                    }
                }
            },

            /**
             * =========================================
             * PLAYER LOGIC
             * =========================================
             */
            player: {
                lyricUpdateFrame: null,
                initAudioEvents: function() {
                    app.audioEl.addEventListener('timeupdate', () => this.onTimeUpdate());
                    app.audioEl.addEventListener('play', () => this.onPlay());
                    app.audioEl.addEventListener('pause', () => this.onPause());
                    app.audioEl.addEventListener('ended', () => this.next());
                    
                    // Handle Volume Spike Bug
                    app.audioEl.volume = 1.0; 
                },
                initMediaSession: function() {
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.setActionHandler('play', () => this.togglePlay());
                        navigator.mediaSession.setActionHandler('pause', () => this.togglePlay());
                        navigator.mediaSession.setActionHandler('previoustrack', () => this.prev());
                        navigator.mediaSession.setActionHandler('nexttrack', () => this.next());
                        navigator.mediaSession.setActionHandler('seekto', (details) => {
                            if (details.fastSeek && 'fastSeek' in app.audioEl) {
                                app.audioEl.fastSeek(details.seekTime);
                            } else {
                                app.audioEl.currentTime = details.seekTime;
                            }
                        });
                    }
                },
                updateMediaSession: function(track) {
                    if ('mediaSession' in navigator && track) {
                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: track.name,
                            artist: app.utils.formatArtistsDisplay(track.mainArtists, track.subArtists),
                            album: track.year || 'Unknown Album',
                            artwork: [
                                { src: track.cover || '', sizes: '512x512', type: 'image/png' }
                            ]
                        });
                    }
                },
                openFull: function() {
                    document.getElementById('full').classList.add('active');
                },
                closeFull: function() {
                    document.getElementById('full').classList.remove('active');
                },
                togglePlay: function() {
                    if (app.audioEl.paused) {
                        const playPromise = app.audioEl.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.error("Playback failed", error);
                                // Fallback / Fix for First play bug
                            });
                        }
                    } else {
                        app.audioEl.pause();
                    }
                },
                playSong: function(id, mode) {
                    let original = [];
                    if (mode === 'pl') {
                        const pl = app.state.playlists.find(p => p.id === app.state.currentPlaylistId);
                        original = pl.songIds.map(sid => app.state.tracks.find(tx => tx.id === sid)).filter(x=>x);
                    } else if (mode === 'art') {
                        original = app.state.tracks.filter(tx => tx.mainArtists.includes(app.state.currentArtist) || tx.subArtists.includes(app.state.currentArtist));
                    } else {
                        original = [...app.state.tracks];
                    }
                    
                    app.state.playingTracks = app.state.isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
                    app.state.currentTrackIdx = app.state.playingTracks.findIndex(x => x.id === id);
                    
                    if (app.state.currentTrackIdx === -1 && app.state.playingTracks.length > 0) {
                        app.state.currentTrackIdx = 0; // Fallback
                    }
                    
                    this.loadTrack(app.state.playingTracks[app.state.currentTrackIdx]);
                },
                loadTrack: function(t) {
                    if(!t) return;
                    if(app.audioEl.src) URL.revokeObjectURL(app.audioEl.src);
                    
                    app.audioEl.src = URL.createObjectURL(t.data);
                    document.getElementById('m-img').src = t.cover || ''; 
                    app.utils.checkMarquee('m-title', t.name);
                    
                    document.getElementById('f-img').src = t.cover || ''; 
                    app.utils.checkMarquee('f-title', t.name); 
                    document.getElementById('f-artist').innerText = app.utils.formatArtistsDisplay(t.mainArtists, t.subArtists);
                    
                    document.getElementById('mini').style.display = 'flex';
                    
                    // Reset lyrics UI
                    if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                        this.renderLyricsUI();
                    }
                    
                    this.updateFavBtn(t.favorite);
                    this.updatePlayerBlurBg();
                    this.updateMediaSession(t);
                    
                    // Fix First play interaction
                    const playPromise = app.audioEl.play();
                    if(playPromise !== undefined) {
                        playPromise.catch(e => console.warn("Autoplay prevented:", e));
                    }
                },
                next: function() {
                    if (app.state.playingTracks.length === 0) return;
                    if (app.state.repeatMode === 2) { 
                        this.loadTrack(app.state.playingTracks[app.state.currentTrackIdx]); 
                        return; 
                    }
                    if (app.state.currentTrackIdx === app.state.playingTracks.length - 1 && app.state.repeatMode === 0) { 
                        app.audioEl.pause(); 
                        app.audioEl.currentTime = 0; 
                        return; 
                    }
                    app.state.currentTrackIdx = (app.state.currentTrackIdx + 1) % app.state.playingTracks.length;
                    this.loadTrack(app.state.playingTracks[app.state.currentTrackIdx]);
                },
                prev: function() {
                    if (app.audioEl.currentTime > 3) {
                        app.audioEl.currentTime = 0;
                    } else { 
                        app.state.currentTrackIdx = (app.state.currentTrackIdx - 1 + app.state.playingTracks.length) % app.state.playingTracks.length; 
                        this.loadTrack(app.state.playingTracks[app.state.currentTrackIdx]); 
                    }
                },
                seek: function(val) {
                    app.audioEl.currentTime = val;
                },
                toggleShuffle: function() {
                    app.state.isShuffle = !app.state.isShuffle;
                    document.getElementById('btn-shuffle').style.opacity = app.state.isShuffle ? "1" : "0.4";
                },
                toggleRepeat: function() {
                    app.state.repeatMode = (app.state.repeatMode + 1) % 3;
                    document.getElementById('btn-repeat').style.opacity = app.state.repeatMode > 0 ? "1" : "0.4";
                    document.getElementById('repeat-badge').style.display = app.state.repeatMode === 2 ? "block" : "none";
                },
                toggleQueue: function() {
                    const qp = document.getElementById('queue-panel');
                    qp.classList.toggle('open');
                    
                    const list = document.getElementById('queue-list');
                    const nextTracks = app.state.playingTracks.slice(app.state.currentTrackIdx + 1);
                    list.innerHTML = nextTracks.map((t, i) => {
                        const art = app.utils.formatArtistsDisplay(t.mainArtists, t.subArtists);
                        return `
                        <div class="list-item" onclick="app.state.currentTrackIdx=${app.state.currentTrackIdx+1+i}; app.player.loadTrack(app.state.playingTracks[app.state.currentTrackIdx])">
                            <img src="${t.cover||''}" style="width:40px; height:40px;" alt="cover">
                            <div>
                                <div style="font-weight:800;">${t.name}</div>
                                <div style="font-size:11px; color:var(--icon-color);">${art}</div>
                            </div>
                        </div>`;
                    }).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
                },
                toggleFavoriteCurrentSong: function() {
                    if (app.state.currentTrackIdx === -1) return;
                    const t = app.state.playingTracks[app.state.currentTrackIdx];
                    t.favorite = !t.favorite;
                    app.dbInstance.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                        this.updateFavBtn(t.favorite);
                        app.db.loadAll();
                    };
                },
                updateFavBtn: function(isFav) {
                    const btn = document.getElementById('f-fav-btn');
                    if(btn) {
                        const icon = btn.querySelector('i');
                        icon.className = isFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
                    }
                },
                updatePlayerBlurBg: function() {
                    if(document.documentElement.getAttribute('data-theme') === 'dark') {
                        const t = app.state.playingTracks[app.state.currentTrackIdx];
                        if(t && t.cover) {
                            document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                        } else {
                            document.documentElement.style.setProperty('--blur-bg', 'none');
                        }
                    }
                },
                onTimeUpdate: function() {
                    if(isNaN(app.audioEl.duration)) return;
                    
                    const s = document.getElementById('seeker'); 
                    s.max = app.audioEl.duration; 
                    s.value = app.audioEl.currentTime; 
                    
                    document.getElementById('cur-time').innerText = app.utils.formatTime(app.audioEl.currentTime); 
                    document.getElementById('dur-time').innerText = app.utils.formatTime(app.audioEl.duration); 
                    
                    const percent = (app.audioEl.currentTime / app.audioEl.duration) * 100;
                    s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                },
                onPlay: function() {
                    document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
                    document.getElementById('f-pp').className = 'fa-solid fa-pause';
                    this.startLyricsAnimation();
                },
                onPause: function() {
                    document.getElementById('m-pp').className = 'fa-solid fa-play'; 
                    document.getElementById('f-pp').className = 'fa-solid fa-play';
                    cancelAnimationFrame(this.lyricUpdateFrame);
                },
                goToArtistFromPlayer: function() {
                    if (app.state.currentTrackIdx === -1) return;
                    this.closeFull();
                    setTimeout(() => {
                        app.ui.switchTab('artists');
                        const t = app.state.playingTracks[app.state.currentTrackIdx];
                        if (t.mainArtists.length > 0) {
                            app.ui.openArtist(t.mainArtists[0]);
                        }
                    }, 600); 
                },
                
                // Lyrics UI Logic
                toggleLyricsUI: function() {
                    const view = document.getElementById('f-lyrics-view');
                    const isActive = view.classList.toggle('active');
                    
                    if(isActive) {
                        document.getElementById('f-img').style.opacity = "0.08";
                        document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                        this.renderLyricsUI();
                        this.startLyricsAnimation();
                    } else {
                        document.getElementById('f-img').style.opacity = "1";
                        document.getElementById('f-artwork-container').style.transform = "scale(1)";
                        view.innerHTML = '';
                        cancelAnimationFrame(this.lyricUpdateFrame);
                    }
                },
                renderLyricsUI: function() {
                    const view = document.getElementById('f-lyrics-view');
                    if (!view.classList.contains('active')) return;

                    const track = app.state.playingTracks[app.state.currentTrackIdx];
                    if (!track || !track.lyricsObj || track.lyricsObj.length === 0) {
                        view.innerHTML = `<div style="padding-top:100px; color:#aaa;">No lyrics available</div>`;
                        return;
                    }

                    const paintBtn = `<button onclick="event.stopPropagation(); app.ui.modals.openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                    
                    let linesHtml = track.lyricsObj.map((l, i) => {
                        let colorStyle = 'inherit';
                        let bgClip = '';
                        if (l.colors && l.colors.length === 1) {
                            colorStyle = l.colors[0];
                        } else if (l.colors && l.colors.length > 1) {
                            colorStyle = 'transparent';
                            bgClip = `background: linear-gradient(90deg, ${l.colors.join(', ')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                        }
                        return `<div class="lyric-line" id="lyr-line-${i}" onclick="app.player.seekToLyric(${l.time}); event.stopPropagation();" style="color:${colorStyle}; ${bgClip}">${l.text || '&nbsp;'}</div>`;
                    }).join('');
                    
                    view.innerHTML = paintBtn + `<div id="lyrics-content-scroll" style="width:100%; height:100%; padding: 50% 0; display:flex; flex-direction:column; align-items:center;">` + linesHtml + `</div>`;
                },
                seekToLyric: function(time) {
                    app.audioEl.currentTime = time;
                },
                startLyricsAnimation: function() {
                    if (!document.getElementById('f-lyrics-view').classList.contains('active')) return;
                    
                    const update = () => {
                        const track = app.state.playingTracks[app.state.currentTrackIdx];
                        if (track && track.lyricsObj) {
                            const curTime = app.audioEl.currentTime;
                            let activeIdx = -1;
                            
                            for (let i = 0; i < track.lyricsObj.length; i++) {
                                if (curTime >= track.lyricsObj[i].time) {
                                    activeIdx = i;
                                } else {
                                    break;
                                }
                            }
                            
                            track.lyricsObj.forEach((_, i) => {
                                const el = document.getElementById(`lyr-line-${i}`);
                                if (el) {
                                    if (i === activeIdx) {
                                        el.classList.add('active');
                                        el.classList.remove('past');
                                    } else if (i < activeIdx) {
                                        el.classList.remove('active');
                                        el.classList.add('past');
                                    } else {
                                        el.classList.remove('active', 'past');
                                    }
                                }
                            });
                            
                            // Auto Scroll
                            if (activeIdx >= 0) {
                                const activeEl = document.getElementById(`lyr-line-${activeIdx}`);
                                const container = document.getElementById('f-lyrics-view');
                                if (activeEl && container) {
                                    // Smooth scroll to center
                                    const topPos = activeEl.offsetTop - (container.clientHeight / 2) + (activeEl.clientHeight / 2);
                                    container.scrollTo({ top: topPos, behavior: 'smooth' });
                                }
                            }
                        }
                        this.lyricUpdateFrame = requestAnimationFrame(update);
                    };
                    update();
                }
            },

            /**
             * =========================================
             * FEATURES & UTILITIES
             * =========================================
             */
            features: {
                startTimer: function() {
                    if(app.state.sleepTimerId) {
                        clearTimeout(app.state.sleepTimerId);
                        clearInterval(app.state.sleepTimerInterval);
                        app.state.sleepTimerId = null;
                        app.state.sleepTimerInterval = null;
                        document.getElementById('timer-display').innerText = "";
                        document.getElementById('timer-btn').innerText = app.i18n.dict[app.i18n.currentLang].start;
                        document.getElementById('timer-btn').style.background = "var(--icon-color)";
                        return;
                    }
                    const min = parseInt(document.getElementById('timer-input').value);
                    if(isNaN(min) || min <= 0) return;
                    
                    app.state.sleepEndTime = Date.now() + min * 60000;
                    document.getElementById('timer-btn').innerText = app.i18n.dict[app.i18n.currentLang].stop;
                    document.getElementById('timer-btn').style.background = "var(--del-color)";
                    
                    app.state.sleepTimerInterval = setInterval(() => {
                        let remain = app.state.sleepEndTime - Date.now();
                        if(remain <= 0) {
                            clearInterval(app.state.sleepTimerInterval);
                        } else {
                            let m = Math.floor(remain / 60000);
                            let s = Math.floor((remain % 60000) / 1000);
                            document.getElementById('timer-display').innerText = `Remaining: ${m}:${s<10?'0':''}${s}`;
                        }
                    }, 1000);

                    app.state.sleepTimerId = setTimeout(() => {
                        app.audioEl.pause();
                        document.getElementById('timer-display').innerText = "Timer finished.";
                        document.getElementById('timer-btn').innerText = app.i18n.dict[app.i18n.currentLang].start;
                        document.getElementById('timer-btn').style.background = "var(--icon-color)";
                        app.state.sleepTimerId = null;
                        clearInterval(app.state.sleepTimerInterval);
                    }, min * 60000);
                }
            },
            utils: {
                formatTime: function(s) { 
                    let m=Math.floor(s/60), sec=Math.floor(s%60); 
                    return `${m}:${sec<10?'0':''}${sec}`; 
                },
                checkMarquee: function(elId, text) {
                    const el = document.getElementById(elId);
                    if (text.length > 20) {
                        el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
                    } else {
                        el.innerText = text;
                    }
                },
                getAllArtists: function() {
                    let allArts = new Set();
                    Object.keys(app.state.artistMeta).forEach(k => allArts.add(k));
                    app.state.tracks.forEach(t => { 
                        t.mainArtists.forEach(a => allArts.add(a));
                        t.subArtists.forEach(a => allArts.add(a));
                    });
                    return [...allArts].sort((a,b) => a.localeCompare(b, 'ja'));
                },
                getAllTags: function() {
                    const allTags = new Set();
                    app.state.playlists.forEach(p => {
                        if (p.tags) p.tags.forEach(tg => allTags.add(tg));
                    });
                    return [...allTags];
                },
                formatArtistsDisplay: function(main, sub) {
                    let d = main.join(', ');
                    if (sub && sub.length > 0) {
                        d += ' / ' + sub.join(', ');
                    }
                    return d || 'Unknown';
                },
                getArtistIconHtml: function(a, small = false, customClass="artist-icon-star") {
                    const meta = app.state.artistMeta[a];
                    if (meta && meta.icon) {
                        return `<img src="${meta.icon}" class="${small ? '' : customClass}" style="${small ? 'width:20px;height:20px;border-radius:50%;margin-right:5px;object-fit:cover;' : ''}">`;
                    }
                    // Find fallback from tracks
                    const track = app.state.tracks.find(t => t.mainArtists.includes(a) || t.subArtists.includes(a));
                    if (track && track.cover) {
                        return `<img src="${track.cover}" class="${small ? '' : customClass}" style="${small ? 'width:20px;height:20px;border-radius:50%;margin-right:5px;object-fit:cover;' : ''}">`;
                    }
                    // Placeholder
                    if (small) {
                        return `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;background:var(--icon-color);"></div>`;
                    }
                    return `<div class="${customClass}"><i class="fa-solid fa-user" style="font-size:24px;"></i></div>`;
                },
                isChildArtist: function(artistName) {
                    for (let pName in app.state.artistMeta) {
                        const members = app.state.artistMeta[pName].members;
                        if (members && members.find(m => m.linked === artistName)) {
                            return { parent: pName };
                        }
                    }
                    return null;
                }
            },

            handleHeaderLeft: function() {
                if(app.state.currentArtist) app.state.currentArtist = null; 
                else if(app.state.currentPlaylistId) app.state.currentPlaylistId = null; 
                else app.state.isEditing = !app.state.isEditing; 
                app.ui.render(); 
            },
            handleHeaderRight: function() {
                if (app.state.currentArtist) {
                    const artTracks = app.state.tracks.filter(t => t.mainArtists.includes(app.state.currentArtist) || t.subArtists.includes(app.state.currentArtist));
                    if(artTracks.length > 0) app.player.playSong(artTracks[0].id, 'art');
                } else if (app.state.currentPlaylistId) {
                    app.ui.modals.openBulkAddModal();
                } else if (app.state.currentView === 'library') {
                    document.getElementById('audio-upload').click(); 
                } else if (app.state.currentView === 'playlists') {
                    const n = prompt("Playlist Name:"); 
                    if(n) {
                        app.dbInstance.transaction("playlists", "readwrite").objectStore("playlists").add({ 
                            name: n, 
                            songIds: [], 
                            tags: [], 
                            cover: null, 
                            favorite: false 
                        }).onsuccess = () => app.db.loadAll();
                    }
                } else if (app.state.currentView === 'artists') {
                    const n = prompt("Artist Name:"); 
                    if(n) {
                        app.dbInstance.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({ 
                            name: n, 
                            icon: null, 
                            favorite: false, 
                            members: [] 
                        }).onsuccess = () => app.db.loadAll();
                    }
                }
            }
        };

        // Boot
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
        
    </script>
</body>
</html>
