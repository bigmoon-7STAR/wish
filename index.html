<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music ✧</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --wish-pink: #ff2d55;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(160deg, #fdf2f8 0%, #eef2ff 100%);
            color: #1d1d1f;
            overflow: hidden;
        }

        /* プレイヤー外装 */
        .player-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* アートワーク */
        .artwork {
            width: 100%;
            aspect-ratio: 1/1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            margin: 20px 0 40px;
            transition: transform 0.3s ease;
        }

        .artwork.playing {
            transform: scale(1.05);
        }

        /* 情報表示 */
        .info {
            text-align: left;
            margin-bottom: 25px;
        }
        .info h1 { font-size: 1.5rem; margin: 0; font-weight: 700; color: #000; }
        .info p { font-size: 1.1rem; margin: 5px 0; color: var(--wish-pink); opacity: 0.8; }

        /* プログレスバー */
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            cursor: pointer;
            position: relative;
        }
        #progressFill {
            height: 100%;
            background: #8e8e93;
            width: 0%;
            border-radius: 10px;
        }

        /* 操作パネル */
        .controls-main {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            margin-bottom: 40px;
        }
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            color: #1d1d1f;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.5; }
        .play-pause { font-size: 3.5rem; }

        /* サブコントロール (リピート等) */
        .sub-controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .sub-btn {
            font-size: 1.2rem;
            color: #8e8e93;
            background: none;
            border: none;
            cursor: pointer;
        }
        .sub-btn.active { color: var(--wish-pink); text-shadow: 0 0 8px rgba(255,45,85,0.3); }

        /* リスト */
        .queue-list {
            flex-grow: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .song-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }
        .song-row.active-song { color: var(--wish-pink); font-weight: 600; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="player-container">
        <label for="fileInput" style="color: var(--apple-blue); cursor: pointer; font-size: 0.9rem;">＋ ライブラリに追加</label>
        <input type="file" id="fileInput" accept=".mp3,.m4a,.wav" multiple>

        <div class="artwork" id="artContainer">✧</div>

        <div class="info">
            <h1 id="title">Waiting...</h1>
            <p id="sub">Wish Library</p>
        </div>

        <div class="progress-bar-bg" id="progressArea">
            <div id="progressFill"></div>
        </div>

        <div class="controls-main">
            <button class="btn" id="prevBtn">⏮</button>
            <button class="btn play-pause" id="playBtn">▶︎</button>
            <button class="btn" id="nextBtn">⏭</button>
        </div>

        <div class="sub-controls">
            <button class="sub-btn" id="shuffleBtn">⇄</button>
            <button class="sub-btn" id="repeatBtn">↻</button>
        </div>

        <div class="queue-list" id="queue">
            </div>
    </div>

    <audio id="audioMain"></audio>

    <script>
        let db;
        let playlist = [];
        let currentIndex = -1;
        let repeatMode = 0; // 0: off, 1: all, 2: one

        const audio = document.getElementById('audioMain');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');

        // DB準備
        const req = indexedDB.open("AppleWishDB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "name" });
        req.onsuccess = e => { db = e.target.result; loadLibrary(); };

        // ファイル追加
        document.getElementById('fileInput').onchange = e => {
            const tx = db.transaction("songs", "readwrite");
            for(let f of e.target.files) tx.objectStore("songs").put({name: f.name, data: f});
            tx.oncomplete = loadLibrary;
        };

        function loadLibrary() {
            db.transaction("songs").objectStore("songs").getAll().onsuccess = e => {
                playlist = e.target.result;
                renderQueue();
            };
        }

        function renderQueue() {
            const q = document.getElementById('queue');
            q.innerHTML = "";
            playlist.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `song-row ${i === currentIndex ? 'active-song' : ''}`;
                div.innerHTML = `<span>${s.name}</span>`;
                div.onclick = () => playAtIndex(i);
                q.appendChild(div);
            });
        }

        function playAtIndex(index) {
            if(index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const song = playlist[currentIndex];
            audio.src = URL.createObjectURL(song.data);
            document.getElementById('title').textContent = song.name;
            document.getElementById('artContainer').classList.add('playing');
            audio.play();
            playBtn.textContent = "⏸";
            renderQueue();
        }

        // --- コントロール系 ---
        playBtn.onclick = () => {
            if(audio.paused) { audio.play(); playBtn.textContent = "⏸"; }
            else { audio.pause(); playBtn.textContent = "▶︎"; }
        };

        document.getElementById('nextBtn').onclick = () => {
            let next = currentIndex + 1;
            if(next >= playlist.length) next = 0;
            playAtIndex(next);
        };

        document.getElementById('prevBtn').onclick = () => {
            let prev = currentIndex - 1;
            if(prev < 0) prev = playlist.length - 1;
            playAtIndex(prev);
        };

        // リピート切替
        document.getElementById('repeatBtn').onclick = (e) => {
            repeatMode = (repeatMode + 1) % 3;
            const labels = ["↻", "↻ All", "①"];
            e.target.textContent = labels[repeatMode];
            e.target.classList.toggle('active', repeatMode > 0);
        };

        // 自動次曲再生ロジック
        audio.onended = () => {
            if(repeatMode === 2) { // 1曲リピート
                audio.play();
            } else if(repeatMode === 1 || currentIndex < playlist.length - 1) { // 全曲リピート or 次がある
                document.getElementById('nextBtn').click();
            } else {
                playBtn.textContent = "▶︎";
            }
        };

        // バー更新
        audio.ontimeupdate = () => {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        };

        // バークリックでスキップ
        document.getElementById('progressArea').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        };

    </script>
</body>
</html>
