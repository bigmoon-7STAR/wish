            let pLines = parseLyrics(t.lyrics);
            
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = pLines.map((l, i) => {
                let storedColors = currentLyricColors[i] || [];
                let bgStr = 'transparent';
                if(storedColors.length === 1) bgStr = storedColors[0];
                else if(storedColors.length > 1) bgStr = `linear-gradient(90deg, ${storedColors.join(', ')})`;
                
                return `
                <div onclick="applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:var(--input-bg); border-left:6px solid transparent; cursor:pointer; font-weight:800; text-align:center; position:relative;">
                    <div style="position:absolute; left:0; top:0; bottom:0; width:6px; background:${bgStr}; border-radius:12px 0 0 12px;"></div>
                    <span class="gradient-text" style="background:${bgStr=== 'transparent' ? 'var(--text-main)' : bgStr};">${l.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}</span>
                </div>
            `;
            }).join('');
        }
        
        function applyLyricColor(i) {
            currentLyricColors[i] = [...currentPaintColors];
            renderPaintLyrics();
        }
        
        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricColors = currentLyricColors;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(isLyricsMode) {
                    toggleLyricsMode();
                    toggleLyricsMode();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        
                        let mainArr = tag.tags.artist ? tag.tags.artist.split(/[,、/]/).map(x=>x.trim()).filter(x=>x) : ["Unknown"];
                        
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            mainArtists: mainArr, 
                            subArtists: [],
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            favorite: false,
                            addedDate: Date.now()
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            mainArtists: ["Unknown"], 
                            subArtists: [],
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            favorite: false,
                            addedDate: Date.now()
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { 
            if(isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${getArtistDisplayName(t)}</div>
                    </div>
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
