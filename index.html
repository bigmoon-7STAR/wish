                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        function addArtistMember() { currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); renderArtistSetup(); }
        function removeArtistMember(i) { currentMembersEdit.splice(i, 1); renderArtistSetup(); }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedMemIndex = -1; }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if(a) {
                    currentMembersEdit[currentSyncIndex].name = a;
                    const cMeta = artistMeta[a];
                    if(cMeta && cMeta.syncColor) {
                        currentMembersEdit[currentSyncIndex].color = cMeta.syncColor;
                    } else if (cMeta && cMeta.members && cMeta.members.length > 0) {
                        currentMembersEdit[currentSyncIndex].color = cMeta.members[0].color;
                    }
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                tracks.forEach(t => {
                    let changed = false;
                    if(t.artistsData) {
                        t.artistsData.forEach(ad => {
                            if(ad.name === oldName) {
                                ad.name = newName;
                                changed = true;
                            }
                        });
                    }
                    if(changed) { store.put(t); tracksChanged = true; }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let mainArtists = t.artistsData ? t.artistsData.filter(a => a.type === 'main').map(a => a.name) : [];
            let allMembers = [];
            
            mainArtists.forEach(a => {
                let trimA = a.trim();
                if(artistMeta[trimA] && artistMeta[trimA].members) {
                    allMembers = allMembers.concat(artistMeta[trimA].members);
                }
            });

            paintPaletteMembers = allMembers;
            lyricRowsData = t.lyricDataRows ? JSON.parse(JSON.stringify(t.lyricDataRows)) : [];
            
            renderLyricPaintModal();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }
        
        function renderLyricPaintModal() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = lyricRowsData.map((r, i) => {
                let membersHtml = paintPaletteMembers.map(m => {
                    let isSelected = r.members && r.members.includes(m.color);
                    let cls = isSelected ? 'member-badge selected' : 'member-badge';
                    return `<div class="${cls}" style="background:${m.color};" onclick="toggleLyricMember(${i}, '${m.color}')" title="${m.name}"></div>`;
                }).join('');
                
                let textStyle = getGradientStyleForMembers(r.members);
                
                return `
                <div class="lyric-time-row">
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <input type="number" class="lyric-time-input" value="${r.time}" step="0.1" onchange="lyricRowsData[${i}].time=parseFloat(this.value)" id="lyric-time-inp-${i}">
                        <button class="lyric-set-btn" onclick="setLyricTimeToCurrent(${i})">Set</button>
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <textarea class="lyric-text-area" rows="2" style="${textStyle}" onkeydown="handleLyricKey(event, ${i})" oninput="updateLyricRowText(${i}, this.value)">${r.text}</textarea>
                        <div class="lyric-member-select">${membersHtml}</div>
                    </div>
                    <i class="fa-solid fa-trash" style="color:var(--del-color); padding:10px; cursor:pointer;" onclick="deleteLyricRow(${i})"></i>
                </div>
                `;
            }).join('');
        }
        
        function updateLyricRowText(idx, val) {
            lyricRowsData[idx].text = val;
        }

        function toggleLyricMember(rowIdx, color) {
            if(!lyricRowsData[rowIdx].members) lyricRowsData[rowIdx].members = [];
            let mems = lyricRowsData[rowIdx].members;
            if(mems.includes(color)) {
                lyricRowsData[rowIdx].members = mems.filter(c => c !== color);
            } else {
                lyricRowsData[rowIdx].members.push(color);
            }
            renderLyricPaintModal();
        }
        
        function setLyricTimeToCurrent(idx) {
            let t = Math.max(0, audio.currentTime - 0.5).toFixed(1);
            lyricRowsData[idx].time = parseFloat(t);
            renderLyricPaintModal();
        }

        function handleLyricKey(e, idx) {
            if (e.key === 'Enter') {
                e.preventDefault();
                let nextIdx = idx + 1;
                if(nextIdx >= lyricRowsData.length) {
                    addLyricRow();
                } else {
                    let nextInp = document.getElementById(`lyric-time-inp-${nextIdx}`);
                    if(nextInp) {
                        nextInp.focus();
                        nextInp.select();
                    }
                }
            }
        }
        
        function addLyricRow() {
            lyricRowsData.push({ time: 0, members: [], text: '' });
            renderLyricPaintModal();
            setTimeout(() => {
                let el = document.getElementById(`lyric-time-inp-${lyricRowsData.length-1}`);
                if(el) { el.focus(); el.select(); }
            }, 50);
        }
        
        function deleteLyricRow(idx) {
            lyricRowsData.splice(idx, 1);
            renderLyricPaintModal();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            
            lyricRowsData.sort((a,b) => a.time - b.time);
            t.lyricDataRows = lyricRowsData;
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        let aName = tag.tags.artist || "Unknown";
                        let initArtists = aName.split(/[,、/]/).map(x=>x.trim()).filter(x=>x).map(n => ({name: n, type: 'main'}));
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artistsData: initArtists, 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricDataRows: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artistsData: [{name: "Unknown", type: 'main'}], 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricDataRows: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `<div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])"><img src="${t.cover||''}" style="width:40px; height:40px;"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--icon-color);">${formatArtistString(t.artistsData)}</div></div></div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
