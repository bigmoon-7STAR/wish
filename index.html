<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Music Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/music-metadata-browser/2.5.9/index.min.js"></script>
    <style>
        :root {
            --am-pink: #fa243c;
            --am-bg: #000000;
            --am-card: rgba(30, 30, 30, 0.75);
            --am-text: #ffffff;
            --am-sub-text: #888888;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--am-bg);
            color: var(--am-text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            transition: background 2s ease;
            overflow: hidden;
        }

        .aurora {
            position: absolute;
            width: 150%; height: 150%;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: moveAurora 20s infinite linear alternate;
        }

        .aurora-1 { top: -20%; left: -20%; background: rgba(255, 255, 255, 0.2); }
        .aurora-2 { bottom: -20%; right: -20%; background: var(--am-pink); }

        @keyframes moveAurora {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-10%, -10%) rotate(10deg); }
        }

        .container {
            padding: 20px;
            padding-top: 130px;
            height: calc(100vh - 120px);
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .header-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 10;
            box-sizing: border-box;
        }

        h1 { font-size: 32px; font-weight: 800; margin: 0; margin-bottom: 15px; }

        #search-bar {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 17px;
            outline: none;
            box-sizing: border-box;
        }

        #drop-zone {
            display: inline-block;
            padding: 10px 20px;
            color: var(--am-pink);
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            background: rgba(250, 36, 60, 0.1);
            margin-bottom: 25px;
        }

        .track-item {
            display: flex; align-items: center; padding: 10px 0; cursor: pointer;
        }

        .track-item img {
            width: 48px; height: 48px; border-radius: 6px; margin-right: 15px;
            object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .track-info-text { flex: 1; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .track-name { font-size: 17px; font-weight: 500; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { font-size: 14px; color: var(--am-sub-text); display: block; }

        .mini-player {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            height: 64px; background: var(--am-card);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 12px; display: flex; align-items: center; padding: 0 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 0.5px solid rgba(255,255,255,0.08); z-index: 100;
        }

        .player-art { width: 44px; height: 44px; border-radius: 6px; margin-right: 12px; }
        .player-text { flex: 1; overflow: hidden; }
        .player-title { font-weight: 600; font-size: 15px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { color: var(--am-sub-text); font-size: 12px; }

        .controls { display: flex; gap: 18px; font-size: 26px; align-items: center; }
        .control-btn { cursor: pointer; }
        .am-icon { font-size: 16px; opacity: 0.4; }
        .am-icon.active { opacity: 1; color: var(--am-pink); }
        #color-canvas { display: none; }
    </style>
</head>
<body>
    <div id="bg-overlay">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2" id="aurora-sub"></div>
    </div>

    <div class="header-fixed">
        <h1>ライブラリ</h1>
        <input type="text" id="search-bar" placeholder="曲名、アーティストで検索...">
    </div>

    <div class="container">
        <div id="drop-zone">＋ 曲を追加 (M4aなど)</div>
        <div id="track-list"></div>
    </div>

    <div class="mini-player">
        <canvas id="color-canvas"></canvas>
        <img src="https://via.placeholder.com/44/333/555?text=..." class="player-art" id="player-art">
        <div class="player-text">
            <span class="player-title" id="player-title">未選択</span>
            <span class="player-artist" id="player-artist">-</span>
        </div>
        <div class="controls">
            <span id="shuffle-btn" class="control-btn am-icon">🔀</span>
            <span id="play-btn" class="control-btn">▶️</span>
            <span id="repeat-btn" class="control-btn am-icon">🔁</span>
        </div>
    </div>

    <script>
        // --- 要素の取得 (重複なし) ---
        const canvas = document.getElementById('color-canvas');
        const ctx = canvas.getContext('2d');
        const dropZone = document.getElementById('drop-zone');
        const trackList = document.getElementById('track-list');
        const searchBar = document.getElementById('search-bar');
        const playBtn = document.getElementById('play-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playerArt = document.getElementById('player-art');
        const auroraSub = document.getElementById('aurora-sub');

        let audio = new Audio();
        let isPlaying = false;
        let playlist = []; 
        let currentIndex = -1; 
        let isShuffle = false;
        let isRepeat = false;

        // --- 1. ファイル追加 (iPad対応) ---
        dropZone.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/*';
            input.multiple = true;
            input.onchange = (e) => {
                if (e.target.files.length > 0) handleFiles(e.target.files);
            };
            input.click();
        });

        async function handleFiles(files) {
            for (const file of Array.from(files)) {
                let common = null;
                try {
                    if (typeof musicMetadata !== 'undefined') {
                        const metadata = await musicMetadata.parseBlob(file);
                        common = metadata.common;
                    }
                } catch (err) { console.error(err); }
                
                let coverUrl = "https://via.placeholder.com/150/333/fff?text=No+Image";
                if (common?.picture?.[0]) {
                    const pic = common.picture[0];
                    coverUrl = URL.createObjectURL(new Blob([pic.data], { type: pic.format }));
                }

                const track = {
                    url: URL.createObjectURL(file),
                    title: common?.title || file.name,
                    artist: common?.artist || "不明なアーティスト",
                    cover: coverUrl
                };
                
                playlist.push(track);
                renderPlaylist(playlist);
            }
        }

        // --- 2. 描画 ---
        function renderPlaylist(tracksToRender) {
            trackList.innerHTML = '';
            tracksToRender.forEach((track) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `
                    <img src="${track.cover}">
                    <div class="track-info-text">
                        <span class="track-name">${track.title}</span>
                        <span class="track-meta">${track.artist}</span>
                    </div>
                `;
                div.onclick = () => {
                    currentIndex = playlist.indexOf(track);
                    playTrack(track);
                };
                trackList.appendChild(div);
            });
        }

        // --- 3. 再生 & 色抽出 ---
        function playTrack(track) {
            if(!track) return;
            audio.src = track.url;
            audio.play();
            isPlaying = true;
            playBtn.innerText = '⏸';
            playerTitle.innerText = track.title;
            playerArtist.innerText = track.artist;
            playerArt.src = track.cover;

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = track.cover;
            img.onload = () => {
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const d1 = ctx.getImageData(5, 5, 1, 1).data;
                const d2 = ctx.getImageData(1, 1, 1, 1).data;
                const c1 = `rgb(${d1[0]}, ${d1[1]}, ${d1[2]})`;
                const c2 = `rgb(${d2[0]}, ${d2[1]}, ${d2[2]})`;
                document.querySelector('.aurora-1').style.background = `radial-gradient(circle at center, ${c1} 0%, transparent 80%)`;
                auroraSub.style.background = c2;
            };
        }

        // --- 4. ボタン操作 ---
        playBtn.onclick = () => {
            if (isPlaying) { audio.pause(); playBtn.innerText = '▶️'; }
            else { if(audio.src) audio.play(); playBtn.innerText = '⏸'; }
            isPlaying = !isPlaying;
        };

        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
        };

        repeatBtn.onclick = () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active', isRepeat);
        };

        searchBar.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = playlist.filter(t => t.title.toLowerCase().includes(term) || t.artist.toLowerCase().includes(term));
            renderPlaylist(filtered);
        };

        audio.onended = () => {
            if (isRepeat) { playTrack(playlist[currentIndex]); return; }
            let next = isShuffle ? Math.floor(Math.random() * playlist.length) : currentIndex + 1;
            if (next >= playlist.length) next = 0;
            currentIndex = next;
            playTrack(playlist[currentIndex]);
        };
    </script>
</body>
</html>
