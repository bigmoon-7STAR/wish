        function startTimer() {
            if (sleepTimerId) {
                clearTimeout(sleepTimerId);
                clearInterval(sleepTimerInterval);
                sleepTimerId = null;
                sleepTimerInterval = null;
                document.getElementById('timer-display').innerText = "";
                document.getElementById('timer-btn').innerText = i18nData[currentLang]['start'] || "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                return;
            }
            const min = parseInt(document.getElementById('timer-input').value);
            if (isNaN(min) || min <= 0) return;
            
            sleepEndTime = Date.now() + min * 60000;
            document.getElementById('timer-btn').innerText = i18nData[currentLang]['stop'] || "Stop";
            document.getElementById('timer-btn').style.background = "var(--del-color)";
            
            sleepTimerInterval = setInterval(() => {
                let remain = sleepEndTime - Date.now();
                if (remain <= 0) {
                    clearInterval(sleepTimerInterval);
                } else {
                    let m = Math.floor(remain / 60000);
                    let s = Math.floor((remain % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `Remaining: ${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);

            sleepTimerId = setTimeout(() => {
                audio.pause();
                document.getElementById('timer-display').innerText = "Timer finished.";
                document.getElementById('timer-btn').innerText = i18nData[currentLang]['start'] || "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                sleepTimerId = null;
                clearInterval(sleepTimerInterval);
            }, min * 60000);
        }

        const req = indexedDB.open("MusicStudioWishcore_V7", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("songs")) {
                d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            }
            if (!d.objectStoreNames.contains("playlists")) {
                d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            }
            if (!d.objectStoreNames.contains("artistMeta")) {
                d.createObjectStore("artistMeta", {keyPath:"name"});
            }
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            loadAll();
            applyLanguage();
            loadHomeIcon();
            initTheme();
        };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            let loadedSongs = false;
            let loadedPlaylists = false;
            let loadedArtists = false;

            const checkDone = () => {
                if (loadedSongs && loadedPlaylists && loadedArtists) {
                    render();
                }
            };

            tx.objectStore("songs").getAll().onsuccess = (e) => {
                tracks = e.target.result;
                loadedSongs = true;
                checkDone();
            };
            
            tx.objectStore("playlists").getAll().onsuccess = (e) => {
                playlists = e.target.result;
                loadedPlaylists = true;
                checkDone();
            };
            
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => {
                artistMeta = {};
                e.target.result.forEach(m => {
                    artistMeta[m.name] = m;
                });
                loadedArtists = true;
                checkDone();
            };
        }

        function handleSearchInput() {
            const val = document.getElementById('search-input').value;
            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            searchQueries[viewKey] = val;
            render();
        }

        function handleSortChange() {
            const val = document.getElementById('sort-type').value;
            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            sortStates[viewKey] = val;
            render();
        }

        function parseArtists(artistString) {
            let main = [];
            let sub = [];
            if (!artistString) return { main, sub };
            
            let parts = artistString.split('/');
            if (parts[0]) {
                main = parts[0].split(',').map(a => a.trim()).filter(a => a);
            }
            if (parts[1]) {
                sub = parts[1].split(',').map(a => a.trim()).filter(a => a);
            } else if (parts.length === 1 && !artistString.includes('/')) {
                main = artistString.split(',').map(a => a.trim()).filter(a => a);
            }
            return { main, sub };
        }

        function getAllArtists() {
            let allArts = new Set();
            Object.keys(artistMeta).forEach(k => allArts.add(k));
            tracks.forEach(t => {
                let parsed = parseArtists(t.artist);
                parsed.main.forEach(a => allArts.add(a));
                parsed.sub.forEach(a => allArts.add(a));
            });
            return [...allArts].sort((a,b) => a.localeCompare(b, 'ja'));
        }

        function switchContentView(viewId) {
            document.querySelectorAll('.content-view').forEach(v => {
                v.classList.remove('active');
            });
            const activeView = document.getElementById(viewId);
            if (activeView) {
                activeView.classList.add('active');
            }
        }

        function getActiveViewKey() {
            return (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
        }

        function sortList(list, sortType) {
            if (sortType === 'name_asc') {
                list.sort((a,b) => a.name.localeCompare(b.name,'ja'));
            } else if (sortType === 'name_desc') {
                list.sort((a,b) => b.name.localeCompare(a.name,'ja'));
            } else if (sortType === 'year_desc') {
                list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
                list.reverse(); 
            } else if (sortType === 'year_asc') {
                list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
            } else if (sortType === 'artist_asc') {
                list.sort((a,b) => (a.artist||'').localeCompare((b.artist||''), 'ja'));
            } else if (sortType === 'artist_desc') {
                list.sort((a,b) => (b.artist||'').localeCompare((a.artist||''), 'ja'));
            } else if (sortType === 'added_desc') {
                list.sort((a,b) => b.id - a.id);
            } else if (sortType === 'added_asc') {
                list.sort((a,b) => a.id - b.id);
            }
        }

        function render() {
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortSelectEl = document.getElementById('sort-type');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            
            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            
            if (artistSetupBtn) {
                artistSetupBtn.style.display = currentArtist ? 'flex' : 'none';
            }
            if (settingsBtn) {
                settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'flex' : 'none';
            }
            
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            const viewKey = getActiveViewKey();
            let currentSearch = searchQueries[viewKey];
            
            if (searchInputEl && searchInputEl.value !== currentSearch) {
                searchInputEl.value = currentSearch;
            }
            
            let currentSort = sortStates[viewKey];
            if (sortSelectEl) {
                sortSelectEl.value = currentSort;
                const customOpt = sortSelectEl.querySelector('option[value="custom"]');
                if (currentView === 'library' || (currentView === 'artists' && !currentArtist)) {
                    customOpt.style.display = 'none';
                    if (currentSort === 'custom') {
                        currentSort = 'added_desc';
                        sortStates[viewKey] = 'added_desc';
                        sortSelectEl.value = 'added_desc';
                    }
                } else {
                    customOpt.style.display = 'block';
                }
            }

            const search = currentSearch.toLowerCase();
            let searchTerms = search.split(/[\s,、]+/).filter(x => x);

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if (tabEl) tabEl.classList.add('active');

            if (currentView === 'library') {
                title.innerText = i18nData[currentLang]['library'] || "Library";
                switchContentView('content-library');
                const display = document.getElementById('grid-library');
                
                let list = [...tracks];
                if (searchTerms.length > 0) {
                    list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || (t.artist && t.artist.toLowerCase().includes(term))));
                }
                renderCards(list, display, currentSort, 'lib');
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = i18nData[currentLang]['artists'] || "Artists";
                    switchContentView('content-artists');
                    const display = document.getElementById('list-artists');
                    
                    let artists = getAllArtists();
                    if (searchTerms.length > 0) {
                        artists = artists.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                    }

                    if (search.length > 0 && artists.length > 0) {
                        artistFilter.style.display = 'flex';
                        artistFilter.innerHTML = artists.map(a => {
                            const firstSong = tracks.find(t => {
                                let p = parseArtists(t.artist);
                                return p.main.includes(a) || p.sub.includes(a);
                            });
                            let iconClass = "circle";
                            if (artistMeta[a] && artistMeta[a].parentGroup === null) {
                                iconClass = "star";
                            }
                            const iconHtml = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" class="${iconClass}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" class="${iconClass}">` : `<div class="placeholder ${iconClass}"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                            return `<div class="bulk-artist-icon-chip" onclick="openArtist('${a}')">${iconHtml}<span>${a}</span></div>`;
                        }).join('');
                    }

                    let parents = [];
                    let childrenMap = {};
                    
                    artists.forEach(a => {
                        let meta = artistMeta[a];
                        if (meta && meta.parentGroup) {
                            if (!childrenMap[meta.parentGroup]) childrenMap[meta.parentGroup] = [];
                            childrenMap[meta.parentGroup].push(a);
                        } else {
                            parents.push(a);
                        }
                    });

                    let sortedList = [];
                    parents.forEach(p => {
                        sortedList.push({name: p, isChild: false});
                        if (childrenMap[p]) {
                            childrenMap[p].forEach(c => {
                                sortedList.push({name: c, isChild: true});
                            });
                        }
                    });

                    display.innerHTML = sortedList.map(item => {
                        let a = item.name;
                        const firstSong = tracks.find(t => {
                            let p = parseArtists(t.artist);
                            return p.main.includes(a) || p.sub.includes(a);
                        });
                        let iconClass = item.isChild ? "circle" : "star";
                        const iconHtml = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" class="artist-icon ${iconClass}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" class="artist-icon ${iconClass}">` : `<div class="artist-icon ${iconClass}"><i class="fa-solid fa-user" style="font-size:24px;"></i></div>`);
                        let indentClass = item.isChild ? 'indented' : '';
                        
                        return `
                        <div class="swipe-container" id="swipe-art-${CSS.escape(a)}">
                            <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">Delete</div>
                            <div class="artist-list-item ${indentClass}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')" ontouchstart="handleTouchStart(event, 'art-${a}')" ontouchmove="handleTouchMove(event, 'art-${a}')" ontouchend="handleTouchEnd(event, 'art-${a}')">
                                <div class="artist-icon-container">${iconHtml}</div>
                                <div style="font-weight:800; font-size:16px; flex:1;">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist;
                    switchContentView('content-library'); 
                    const display = document.getElementById('grid-library');
                    
                    let list = tracks.filter(t => {
                        let p = parseArtists(t.artist);
                        return p.main.includes(currentArtist) || p.sub.includes(currentArtist);
                    });
                    
                    if (searchTerms.length > 0) {
                        list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    }
                    renderCards(list, display, currentSort, 'art');
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = i18nData[currentLang]['playlists'] || "Playlists";
                    switchContentView('content-playlist');
                    const display = document.getElementById('grid-playlist');
                    
                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag) {
                            p.tag.split(/[,、]/).forEach(tg => {
                                const tr = tg.trim();
                                if(tr && !allTags.includes(tr)) allTags.push(tr);
                            });
                        }
                    });
                    
                    if (search.length > 0) {
                        const matchedTags = allTags.filter(t => searchTerms.every(term => t.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(t => `<div class="tag-chip" onclick="applyTagFilter('${t}')">#${t}</div>`).join('');
                        }
                    }
                    
                    let list = [...playlists];
                    if (searchTerms.length > 0) {
                        list = list.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));
                    }

                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `
                        <div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    if (!pl) return;
                    
                    title.innerText = pl.name;
                    switchContentView('content-playlist-detail');
                    const display = document.getElementById('list-playlist-detail');
                    
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => {
                        let parsed = parseArtists(s.artist);
                        artistsInPlRaw.push(...parsed.main, ...parsed.sub);
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && search.length > 0) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => {
                                    let p = parseArtists(t.artist);
                                    return p.main.includes(a) || p.sub.includes(a);
                                });
                                let styleStr = activeArtistFilter === a ? 'border-color:var(--icon-color); opacity:1;' : 'opacity:0.6;';
                                const iconHtml = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${styleStr}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${styleStr}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${iconHtml}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = [...plSongs];
                    if (searchTerms.length > 0) {
                        filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || (t.artist && t.artist.toLowerCase().includes(term))));
                    }
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => {
                            let p = parseArtists(t.artist);
                            return p.main.includes(activeArtistFilter) || p.sub.includes(activeArtistFilter);
                        });
                    }

                    if (currentSort !== 'custom') {
                        sortList(filtered, currentSort);
                    }

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    <img src="${t.cover||''}" style="margin-right:0;">
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div>
                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${t.artist}</div>
                                </div>
                                ${currentSort === 'custom' ? `
                                <div class="reorder-btns" onclick="event.stopPropagation()">
                                    <i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i>
                                    <i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i>
                                </div>` : ''}
                            </div>
                        </div>`).join('') + 
                        `<div style="padding:40px; text-align:center;">
                            <button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">
                                + Add Tracks
                            </button>
                        </div>`;
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play primary-icon"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus primary-icon"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus primary-icon"></i>';
            }
        }

        function renderCards(list, container, sort, mode) {
            sortList(list, sort);
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'${mode}')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})">
                        <i class="fa-solid fa-trash-can"></i>
                    </div>
                    <img src="${t.cover||''}" class="card-img">
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${t.artist} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[getActiveViewKey()] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }
        
        function deleteCustomArtist(a) {
            if (confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) {
                startY = 0;
                return;
            }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) {
                closeFull();
            } else {
                fPlayer.style.transform = 'translateY(0)';
            }
            startY = 0;
            currentY = 0;
        });

        function handleLyricsViewTap(e) {
            if (e.target.closest('.lyric-line')) {
                let time = parseFloat(e.target.closest('.lyric-line').getAttribute('data-time'));
                if (!isNaN(time)) {
                    audio.currentTime = time;
                }
            } else {
                toggleLyrics();
            }
        }

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if (isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let lyricData = track?.lyricData || [];
                
                if (lyricData.length === 0 && track?.lyrics) {
                    let lines = track.lyrics.split('\n');
                    lyricData = lines.map(l => ({ text: l, time: 0, colors: [] }));
                }

                if (lyricData.length === 0) {
                    lyricData = [{ text: "No lyrics available.", time: 0, colors: [] }];
                }
                
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                
                let html = paintBtn + `<div id="lyrics-content-scroll">`;
                lyricData.forEach((ld, i) => {
                    let colorStyle = "";
                    if (ld.colors && ld.colors.length > 0) {
                        if (ld.colors.length === 1) {
                            colorStyle = `color: ${ld.colors[0]};`;
                        } else {
                            colorStyle = `background: linear-gradient(to right, ${ld.colors.join(', ')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                        }
                    }
                    html += `<div class="lyric-line" id="ll-${i}" data-time="${ld.time}" style="${colorStyle}">${ld.text}</div>`;
                });
                html += `</div>`;
                
                view.innerHTML = html;
                updateLyricsScroll(audio.currentTime);
                
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
            }
        }

        function updateLyricsScroll(currentTime) {
            const view = document.getElementById('f-lyrics-view');
            if (!view.classList.contains('active')) return;
            
            let track = playingTracks[currentTrackIdx];
            if (!track || !track.lyricData || track.lyricData.length === 0) return;
            
            let activeIdx = -1;
            for (let i = 0; i < track.lyricData.length; i++) {
                if (currentTime >= track.lyricData[i].time) {
                    activeIdx = i;
                } else {
                    break;
                }
            }
            
            const lines = view.querySelectorAll('.lyric-line');
            lines.forEach((l, i) => {
                if (i === activeIdx) {
                    l.classList.add('active');
                } else {
                    l.classList.remove('active');
                }
            });
            
            if (activeIdx !== -1) {
                const activeLine = document.getElementById(`ll-${activeIdx}`);
                const scrollContainer = document.getElementById('lyrics-content-scroll');
                if (activeLine && scrollContainer) {
                    const scrollTarget = activeLine.offsetTop - (scrollContainer.clientHeight / 2) + (activeLine.clientHeight / 2);
                    scrollContainer.scrollTo({
                        top: scrollTarget,
                        behavior: 'smooth'
                    });
                }
            }
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const t = playingTracks[currentTrackIdx];
                let p = parseArtists(t.artist);
                if (p.main.length > 0) {
                    openArtist(p.main[0]);
                } else if (p.sub.length > 0) {
                    openArtist(p.sub[0]);
                }
            }, 800); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div');
            div.id = "bulk-modal";
            div.className = "modal";
            div.style.display = "flex";
            
            let html = `
                <div class="header">
                    <div class="header-top">
                        <button class="header-btn header-left modal-close-btn" onclick="this.closest('.modal').remove()">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <h2>Select Songs</h2>
                        <button class="header-btn header-right" onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color);">
                            Done
                        </button>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions" class="suggest-container"></div>
                </div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
            `;
            
            html += tracks.map(t => `
                <label class="check-item" data-search="${t.name.toLowerCase()} ${(t.artist||'').toLowerCase()}">
                    <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                    <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                    <div style="flex:1;">
                        <b style="font-size:14px;">${t.name}</b><br>
                        <span style="font-size:11px; color:var(--icon-color);">${t.artist}</span>
                    </div>
                </label>`).join('');
                
            html += `</div>`;
            div.innerHTML = html;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => {
                el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none';
            });
            
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => {
                        let p = parseArtists(t.artist);
                        return p.main.includes(a) || p.sub.includes(a);
                    });
                    const iconHtml = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${iconHtml}<span>${a}</span></div>`;
                }).join('');
            } else {
                suggest.style.display = 'none';
            }
        }

        function switchTab(v) { 
            currentView = v;
            currentArtist = null;
            currentPlaylistId = null;
            isEditing = false;
            activeArtistFilter = null;
            render(); 
        }
        
        function openPlaylist(id) { 
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            sortStates.playlistDetail = 'year_desc'; 
            render(); 
        }
        
        function openArtist(n) { 
            currentArtist = n; 
            render(); 
        }
        
        function openFull() { 
            fPlayer.classList.add('active'); 
            fPlayer.style.transform = 'translateY(0)'; 
        }
        
        function closeFull() { 
            fPlayer.classList.remove('active'); 
            fPlayer.style.transform = 'translateY(100%)'; 
        }
        
        function handleHeaderLeft() { 
            if (currentArtist) {
                currentArtist = null; 
            } else if (currentPlaylistId) {
                currentPlaylistId = null; 
            } else {
                isEditing = !isEditing; 
            }
            render(); 
        }
        
        function openAddNameModal(titleKey, labelKey, callback) {
            document.getElementById('add-name-title').innerText = i18nData[currentLang][titleKey] || "Add";
            document.getElementById('add-name-label').innerText = i18nData[currentLang][labelKey] || "Name";
            document.getElementById('add-name-input').value = "";
            addNameCallback = callback;
            document.getElementById('add-name-modal').style.display = 'flex';
        }
        
        function saveAddName() {
            const val = document.getElementById('add-name-input').value.trim();
            if (val && addNameCallback) {
                addNameCallback(val);
            }
            document.getElementById('add-name-modal').style.display = 'none';
        }

        function handleHeaderRight() { 
            if (currentArtist) { 
                const artTracks = tracks.filter(t => {
                    let p = parseArtists(t.artist);
                    return p.main.includes(currentArtist) || p.sub.includes(currentArtist);
                });
                if (artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            } else if (currentPlaylistId) {
                openBulkAddModal();
            } else if (currentView === 'library') {
                document.getElementById('audio-upload').click(); 
            } else if (currentView === 'playlist') {
                openAddNameModal('add_playlist_title', 'playlist_name', (n) => {
                    db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null }).onsuccess = loadAll;
                });
            } else if (currentView === 'artists') {
                openAddNameModal('add_artist_title', 'name', (n) => {
                    db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, members: [], parentGroup: null }).onsuccess = loadAll;
                });
            }
        }
        
        function togglePlay() { 
            if (audio.paused) {
                audio.play(); 
            } else {
                audio.pause(); 
            }
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { 
                loadTrack(playingTracks[currentTrackIdx]); 
                return; 
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); 
                audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function prev() { 
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }
        
        function playSong(id, mode) {
            let original = [];
            if (mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if (mode === 'art') {
                original = tracks.filter(tx => {
                    let p = parseArtists(tx.artist);
                    return p.main.includes(currentArtist) || p.sub.includes(currentArtist);
                });
            } else {
                original = [...tracks];
            }
            
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if (t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if (!t) return;
            
            if (!t.data || !(t.data instanceof Blob)) {
                console.error("Invalid audio data format");
                return;
            }

            if (audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = t.artist || '';
            
            document.getElementById('mini').style.display = 'flex';
            
            const lyricsView = document.getElementById('f-lyrics-view');
            if (lyricsView.classList.contains('active')) {
                toggleLyrics();
            }
            
            updatePlayerBlurBg();
            
            audio.play().catch(e => console.error("Play prevented: ", e));
        }
        
        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            } else {
                el.innerText = text;
            }
        }
        
        function formatTime(s) { 
            let m = Math.floor(s/60);
            let sec = Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }
        
        function seekAudio(val) {
            audio.currentTime = val;
            updateLyricsScroll(val);
        }

        audio.ontimeupdate = () => { 
            if (!isNaN(audio.duration)) { 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                updateLyricsScroll(audio.currentTime);
            } 
        };
        
        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };
        
        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };
        
        audio.onended = () => { 
            next(); 
        };

        function setArtistAddMode(mode) {
            artistAddMode = mode;
            document.getElementById('btn-main-artist').classList.toggle('active', mode === 'main');
            document.getElementById('btn-sub-artist').classList.toggle('active', mode === 'sub');
        }

        function renderTrackArtists() {
            let html = '';
            currentMainArtists.forEach(a => {
                html += `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg, var(--key-color), var(--card-bg));">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a}', 'main')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`;
            });
            currentSubArtists.forEach(a => {
                html += `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a}', 'sub')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`;
            });
            document.getElementById('track-active-artists').innerHTML = html;
        }
        
        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if (val) {
                if (artistAddMode === 'main' && !currentMainArtists.includes(val)) {
                    currentMainArtists.push(val);
                } else if (artistAddMode === 'sub' && !currentSubArtists.includes(val)) {
                    currentSubArtists.push(val);
                }
                el.value = '';
                renderTrackArtists();
            }
        }
        
        function removeTrackArtist(a, type) {
            if (type === 'main') {
                currentMainArtists = currentMainArtists.filter(x => x !== a);
            } else {
                currentSubArtists = currentSubArtists.filter(x => x !== a);
            }
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            
            document.getElementById('edit-name').value = t.name; 
            
            let parsed = parseArtists(t.artist);
            currentMainArtists = [...parsed.main];
            currentSubArtists = [...parsed.sub];
            
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            
            document.getElementById('edit-year').value = t.year || ""; 
            
            let lyricsText = "";
            if (t.lyricData && t.lyricData.length > 0) {
                lyricsText = t.lyricData.map(ld => ld.text).join('\n');
            } else {
                lyricsText = t.lyrics || "";
            }
            document.getElementById('edit-lyrics').value = lyricsText; 
            
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        
        function closeEdit() { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }
        
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            
            let artistStr = currentMainArtists.join(',');
            if (currentSubArtists.length > 0) {
                artistStr += '/' + currentSubArtists.join(',');
            }
            t.artist = artistStr;
            
            t.year = document.getElementById('edit-year').value; 
            
            let newLyricsText = document.getElementById('edit-lyrics').value;
            t.lyrics = newLyricsText;
            
            if (!t.lyricData) t.lyricData = [];
            let lines = newLyricsText.split('\n');
            let newLyricData = [];
            lines.forEach((l, i) => {
                let existing = t.lyricData[i];
                if (existing) {
                    existing.text = l;
                    newLyricData.push(existing);
                } else {
                    newLyricData.push({ text: l, time: 0, colors: [] });
                }
            });
            t.lyricData = newLyricData;
            
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
            }; 
        }
        
        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
        }
        
        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }
        
        function deleteSong(id) { 
            if (confirm("Delete this track?")) {
                db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess = loadAll;
            }
        }
        
        function deletePlaylist(id) { 
            if (confirm("Delete this playlist?")) {
                db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess = loadAll;
            }
        }
        
        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }
        
        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').remove(); 
            }; 
        }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        
        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if (val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }
        
        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function openPlEdit(id) { 
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }
        
        function closePlEdit() { 
            document.getElementById('pl-edit-modal').style.display = 'none'; 
        }
        
        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if (f) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }
        
        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) {
                    p.tag.split(/[,、]/).forEach(tg => {
                        const tr = tg.trim(); 
                        if (tr && !allTags.includes(tr)) allTags.push(tr);
                    });
                }
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }
        
        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }
        
        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if (f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [], parentGroup: null };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, members: [], parentGroup: null };
            if (!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        
        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label" data-i18n="name">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;" data-i18n="add_member">+ Add Member</button>
                </div>
                
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            applyLanguage();
        }
        
        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); 
            renderArtistSetup(); 
        }
        
        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(); 
        }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { 
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move'; 
        }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { 
            e.target.classList.remove('dragging'); 
            draggedMemIndex = -1; 
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            
            let html = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:24px;height:24px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:24px;height:24px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('');
            
            html += `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color); border-color:var(--del-color);">Unlink</div>`;
            
            body.innerHTML = html;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        
        function linkArtistMember(a) {
            if (currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                
                if (a) {
                    let childMeta = artistMeta[a] || { name: a, members: [], parentGroup: null };
                    childMeta.parentGroup = editingArtistSetupName;
                    if (currentMembersEdit[currentSyncIndex].color) {
                        childMeta.syncColor = currentMembersEdit[currentSyncIndex].color;
                    }
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(childMeta);
                }
                
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if (newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [], parentGroup: null };
                meta.name = newName;
                meta.members = currentMembersEdit;
                
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let parsed = parseArtists(t.artist);
                    let changed = false;
                    for (let i=0; i<parsed.main.length; i++) { 
                        if (parsed.main[i] === oldName) { parsed.main[i] = newName; changed = true; } 
                    }
                    for (let i=0; i<parsed.sub.length; i++) { 
                        if (parsed.sub[i] === oldName) { parsed.sub[i] = newName; changed = true; } 
                    }
                    
                    if (changed) { 
                        let newArtistStr = parsed.main.join(',');
                        if (parsed.sub.length > 0) newArtistStr += '/' + parsed.sub.join(',');
                        t.artist = newArtistStr; 
                        store.put(t); 
                        tracksChanged = true; 
                    }
                });
                
                if (currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if (tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName, members: [], parentGroup: null };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if (!t) return;
            
            let allMembers = [];
            
            let parsed = parseArtists(t.artist);
            let mainArtists = parsed.main;
            
            mainArtists.forEach(a => {
                if (artistMeta[a] && artistMeta[a].members) {
                    allMembers = allMembers.concat(artistMeta[a].members);
                }
            });
            
            allMembers.push({name: 'Reset', color: ''});

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            
            if (t.lyricData && t.lyricData.length > 0) {
                currentLyricData = JSON.parse(JSON.stringify(t.lyricData));
            } else if (t.lyrics) {
                currentLyricData = t.lyrics.split('\n').map(l => ({ text: l, time: 0, colors: [] }));
            } else {
                currentLyricData = [];
            }
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="currentPaintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }
        
        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricData.map((ld, i) => {
                let colorStyle = "";
                let indicatorHtml = "";
                if (ld.colors && ld.colors.length > 0) {
                    if (ld.colors.length === 1) {
                        colorStyle = `color: ${ld.colors[0]}; border-left-color: ${ld.colors[0]};`;
                        indicatorHtml = `<div style="width:10px;height:10px;border-radius:50%;background:${ld.colors[0]};"></div>`;
                    } else {
                        colorStyle = `background: linear-gradient(to right, ${ld.colors.join(', ')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-left-color: ${ld.colors[0]};`;
                        indicatorHtml = ld.colors.map(c => `<div style="width:10px;height:10px;border-radius:50%;background:${c};"></div>`).join('');
                    }
                } else {
                    colorStyle = `color: var(--text-main); border-left-color: transparent;`;
                }
                
                return `
                <div style="padding:15px; border-radius:12px; background:var(--input-bg); border-left:6px solid transparent; display:flex; flex-direction:column; gap:8px; box-shadow:0 2px 5px rgba(0,0,0,0.02);" style="${colorStyle}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; gap:2px;">${indicatorHtml}</div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <button class="lyric-time-btn" onclick="setCurrentTimeToLyric(${i})">Get Time</button>
                            <input type="number" step="0.1" value="${ld.time}" onchange="updateLyricTime(${i}, this.value)" style="width:60px; padding:5px; border-radius:8px; border:1px solid var(--border-color); text-align:center;">
                        </div>
                    </div>
                    <div onclick="applyLyricColor(${i})" style="font-weight:800; text-align:center; cursor:pointer; padding:10px; ${colorStyle}">
                        ${ld.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                    </div>
                </div>
                `;
            }).join('');
        }
        
        function setCurrentTimeToLyric(i) {
            currentLyricData[i].time = parseFloat(audio.currentTime.toFixed(1));
            renderPaintLyrics();
            
            if (i + 1 < currentLyricData.length) {
                const nextEl = document.querySelectorAll('#paint-lyrics-container > div')[i + 1];
                if (nextEl) nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        function updateLyricTime(i, val) {
            currentLyricData[i].time = parseFloat(val);
        }
        
        function applyLyricColor(i) {
            if (!currentPaintColor) {
                currentLyricData[i].colors = [];
            } else {
                if (!currentLyricData[i].colors.includes(currentPaintColor)) {
                    currentLyricData[i].colors.push(currentPaintColor);
                }
            }
            renderPaintLyrics();
        }
        
        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                
                const lyricsView = document.getElementById('f-lyrics-view');
                if (lyricsView.classList.contains('active')) {
                    lyricsView.classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if (tag.tags.picture) {
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for (let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: tag.tags.artist || "Unknown", 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            lyricData: []
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: "Unknown", 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            lyricData: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        
        function handleTouchStart(e, id) { 
            if (isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }
        
        function handleTouchMove(e, id) {
            if (isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if (btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        
        function handleTouchEnd(e, id) {
            if (isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            
            if (moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if (btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if (btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            
            if (nextTracks.length === 0) {
                list.innerHTML = '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
            } else {
                list.innerHTML = nextTracks.map((t, i) => `
                    <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                        <img src="${t.cover||''}" style="width:40px; height:40px;">
                        <div>
                            <div style="font-weight:800;">${t.name}</div>
                            <div style="font-size:11px; color:var(--icon-color);">${t.artist}</div>
                        </div>
                    </div>`).join('');
            }
        }
    </script>
</body>
</html>
