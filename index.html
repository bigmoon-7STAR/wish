    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], artistMeta = {}, isEditing = false, currentView = 'library', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        let currentPlTags = [];
        let currentTrackArtists = { main: [], sub: [] };
        let activeArtistRole = 'main';
        let editingArtistSetupName = null;
        let currentMembersEdit = [];
        let currentPaintColor = '';
        let currentLyricsEdit = [];
        
        let scrollPositions = { library: 0, artists: 0, playlist: 0, playlistDetail: 0 };
        
        const audio = document.getElementById('audio-element');

        let sortStates = { artists: 'added', library: 'added', playlist: 'added', playlistDetail: 'year' };
        let searchQueries = { artists: '', library: '', playlist: '', playlistDetail: '', bulkAdd: '' };
        let activeArtistFilter = null; 
        let currentSyncIndex = -1;

        function applyTheme(mode) {
            if(mode === 'system') {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { document.documentElement.setAttribute('data-theme', 'dark'); }
                else { document.documentElement.removeAttribute('data-theme'); }
            } else if(mode === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('themeMode', mode);
            updatePlayerBlurBg();
        }
        function initTheme() {
            let mode = localStorage.getItem('themeMode') || 'system';
            document.getElementById('theme-select').value = mode;
            applyTheme(mode);
        }
        initTheme();

        function loadHomeIcon() {
            let saved = localStorage.getItem('homeIcon');
            let link = document.getElementById('apple-touch-icon');
            if(saved) {
                if(link) link.href = saved;
            } else {
                if(link) link.href = "IMG_8755.jpeg";
            }
        }
        loadHomeIcon();
        function changeHomeIcon(e) {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = ev => { localStorage.setItem('homeIcon', ev.target.result); loadHomeIcon(); }
                r.readAsDataURL(f);
            }
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }

        const req = indexedDB.open("MusicStudioWishcore_V7", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { 
                tracks = e.target.result.map(t => {
                    if(typeof t.artist === 'string') {
                        let parts = t.artist.split('/');
                        t.artistObj = { main: parts[0] ? parts[0].split(/[,、]/).map(x=>x.trim()) : [], sub: parts[1] ? parts[1].split(/[,、]/).map(x=>x.trim()) : [] };
                    }
                    if(!t.lyricsObj) {
                        t.lyricsObj = (t.lyrics || '').split('\n').map(l => ({time: 0, text: l, colors: []}));
                    }
                    return t;
                });
                render(); 
            };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => {
                    if(!m.parent) m.parent = null;
                    artistMeta[m.name] = m;
                });
                render();
            };
        }

        function saveScroll() {
            const content = document.getElementById('content');
            if(currentPlaylistId !== null) scrollPositions.playlistDetail = content.scrollTop;
            else if(currentArtist !== null) scrollPositions.artists = content.scrollTop; 
            else scrollPositions[currentView] = content.scrollTop;
        }

        function restoreScroll() {
            const content = document.getElementById('content');
            if(currentPlaylistId !== null) content.scrollTop = scrollPositions.playlistDetail || 0;
            else if(currentArtist !== null) content.scrollTop = scrollPositions.artists || 0;
            else content.scrollTop = scrollPositions[currentView] || 0;
        }

        function handleSearchInput() {
            const val = document.getElementById('search-input').value;
            if (currentView === 'playlist' && currentPlaylistId !== null) {
                searchQueries.playlistDetail = val;
            } else {
                searchQueries[currentView] = val;
            }
            render();
        }

        function handleSortChange() {
            const val = document.getElementById('sort-type').value;
            const key = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            sortStates[key] = val;
            render();
        }

        function getAllArtists() {
            let allArts = new Set();
            Object.keys(artistMeta).forEach(k => allArts.add(k));
            tracks.forEach(t => { 
                if(t.artistObj) {
                    t.artistObj.main.forEach(a => { if(a) allArts.add(a); });
                    t.artistObj.sub.forEach(a => { if(a) allArts.add(a); });
                }
            });
            return [...allArts].sort((a,b) => a.localeCompare(b, 'ja'));
        }

        function buildArtistDisplayStr(t) {
            let m = t.artistObj.main.join(', ');
            let s = t.artistObj.sub.join(', ');
            if(m && s) return `${m} / ${s}`;
            return m || s || "Unknown";
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortSelectEl = document.getElementById('sort-type');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            
            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            if (artistSetupBtn) artistSetupBtn.style.display = currentArtist ? 'inline-block' : 'none';
            if (settingsBtn) settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'inline-block' : 'none';
            
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            const viewKey = (currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView;
            let currentSearch = searchQueries[viewKey] || '';
            if (searchInputEl && searchInputEl.value !== currentSearch) searchInputEl.value = currentSearch;
            
            let currentSort = sortStates[viewKey];
            if (sortSelectEl) {
                sortSelectEl.value = currentSort;
                const customOpt = sortSelectEl.querySelector('option[value="custom"]');
                if (currentView === 'library' || (currentView === 'artists' && !currentArtist)) {
                    customOpt.style.display = 'none';
                    if (currentSort === 'custom') {
                        currentSort = 'added';
                        sortStates[viewKey] = 'added';
                        sortSelectEl.value = 'added';
                    }
                } else {
                    customOpt.style.display = 'block';
                }
            }

            const search = currentSearch.toLowerCase();
            let searchTerms = search.split(/[\s,、]+/).filter(x => x);

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if(tabEl) tabEl.classList.add('active');

            if (currentView === 'library') {
                title.innerText = "Library"; display.className = "grid";
                let list = tracks.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || buildArtistDisplayStr(t).toLowerCase().includes(term)));
                renderCards(list, display, currentSort);
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = "Artists"; display.className = "";
                    let artists = getAllArtists();
                    
                    artists = artists.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));

                    let parents = [], childrenMap = {};
                    artists.forEach(a => {
                        let meta = artistMeta[a];
                        if(meta && meta.parent) {
                            if(!childrenMap[meta.parent]) childrenMap[meta.parent] = [];
                            childrenMap[meta.parent].push(a);
                        } else {
                            parents.push(a);
                        }
                    });

                    let finalOrder = [];
                    parents.forEach(p => {
                        finalOrder.push({name: p, isChild: false});
                        if(childrenMap[p]) {
                            childrenMap[p].forEach(c => finalOrder.push({name: c, isChild: true}));
                        }
                    });

                    if (search.length > 0 && artists.length > 0) {
                        artistFilter.style.display = 'flex';
                        artistFilter.innerHTML = finalOrder.map(item => {
                            const a = item.name;
                            const firstSong = tracks.find(t => t.artistObj.main.includes(a) || t.artistObj.sub.includes(a));
                            const iconClass = item.isChild ? '' : 'parent';
                            const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                            return `<div class="bulk-artist-icon-chip ${iconClass}" onclick="openArtist('${a}')">${icon}<span>${a}</span></div>`;
                        }).join('');
                    }

                    display.innerHTML = finalOrder.map(item => {
                        const a = item.name;
                        const firstSong = tracks.find(t => t.artistObj.main.includes(a) || t.artistObj.sub.includes(a));
                        const iconClass = item.isChild ? 'artist-icon' : 'artist-icon parent';
                        const itemClass = item.isChild ? 'artist-list-item child' : 'artist-list-item';
                        const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" class="${iconClass}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" class="${iconClass}">` : `<div class="${iconClass}"><i class="fa-solid fa-user" style="font-size:24px;"></i></div>`);
                        
                        return `
                        <div class="swipe-container" id="swipe-art-${CSS.escape(a)}">
                            <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">Delete</div>
                            <div class="${itemClass}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')" ontouchstart="handleTouchStart(event, 'art-${a}')" ontouchmove="handleTouchMove(event, 'art-${a}')" ontouchend="handleTouchEnd(event, 'art-${a}')">
                                <div class="artist-icon-container" style="${item.isChild?'width:40px;height:40px;margin-right:10px;':''}">${icon}</div>
                                <div style="font-weight:800; font-size:16px; flex:1;">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => t.artistObj.main.includes(currentArtist) || t.artistObj.sub.includes(currentArtist));
                    list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    renderCards(list, display, currentSort);
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = "Playlists"; display.className = "grid";
                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                            const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                        });
                    });
                    
                    if (search.length > 0) {
                        const matchedTags = allTags.filter(t => searchTerms.every(term => t.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(t => `<div class="tag-chip" onclick="applyTagFilter('${t}')">#${t}</div>`).join('');
                        }
                    }
                    let list = playlists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));

                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => { 
                        if(s.artistObj) {
                            artistsInPlRaw.push(...s.artistObj.main);
                            artistsInPlRaw.push(...s.artistObj.sub);
                        }
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && search.length > 0) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => t.artistObj.main.includes(a) || t.artistObj.sub.includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || buildArtistDisplayStr(t).toLowerCase().includes(term)));
                    if (activeArtistFilter) filtered = filtered.filter(t => t.artistObj.main.includes(activeArtistFilter) || t.artistObj.sub.includes(activeArtistFilter));

                    if (currentSort === 'name_asc') filtered.sort((a,b) => a.name.localeCompare(b.name,'ja'));
                    else if (currentSort === 'name_desc') filtered.sort((a,b) => b.name.localeCompare(a.name,'ja'));
                    else if (currentSort === 'year') filtered.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    <img src="${t.cover||''}" style="margin-right:0;">
                                </div>
                                <div style="flex:1;"><div style="font-weight:800; font-size:14px; display:flex; align-items:center; gap:5px;">${t.name}</div><div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${buildArtistDisplayStr(t)}</div></div>
                                ${currentSort==='custom'? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>`;
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }
            restoreScroll();
        }

        function renderCards(list, container, sort) {
            if (sort === 'name_asc') list.sort((a,b) => a.name.localeCompare(b.name,'ja'));
            else if (sort === 'name_desc') list.sort((a,b) => b.name.localeCompare(a.name,'ja'));
            else if (sort === 'year') list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img">
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${buildArtistDisplayStr(t)} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[currentView] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }
        
        function deleteCustomArtist(a) {
            if(confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
        });

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                let lyricLines = track?.lyricsObj || [];
                
                const fsToggleBtn = `<button id="fs-lyric-btn" onclick="event.stopPropagation(); toggleFullscreenLyrics()" style="position:absolute; top:25px; right:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-expand"></i></button>`;
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
                
                view.innerHTML = fsToggleBtn + paintBtn + `<div id="lyrics-content-scroll">` + 
                    lyricLines.map((l, i) => {
                        let gradient = l.colors && l.colors.length > 0 ? `background: linear-gradient(90deg, ${l.colors.join(',')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;` : '';
                        let textCol = (!gradient && l.colors && l.colors[0]) ? `color: ${l.colors[0]};` : '';
                        return `<div class="lyric-line" id="lyr-${i}" onclick="seekLyric(${l.time}, ${i})" style="${gradient} ${textCol}">${l.text || '&nbsp;'}</div>`;
                    }).join('') + `</div>`;
                
                if(view.classList.contains('fullscreen-lyrics')) {
                    document.getElementById('fs-lyric-btn').innerHTML = '<i class="fa-solid fa-compress"></i>';
                }
                updateLyricsHighlight();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.classList.remove('fullscreen-lyrics');
                view.innerHTML = '';
            }
        }

        function seekLyric(time, index) {
            audio.currentTime = time;
            updateLyricsHighlight();
        }

        function toggleFullscreenLyrics() {
            const view = document.getElementById('f-lyrics-view');
            view.classList.toggle('fullscreen-lyrics');
            const btn = document.getElementById('fs-lyric-btn');
            if(view.classList.contains('fullscreen-lyrics')) {
                btn.innerHTML = '<i class="fa-solid fa-compress"></i>';
                document.getElementById('f-artwork-container').style.position = 'static';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-expand"></i>';
                document.getElementById('f-artwork-container').style.position = 'relative';
            }
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const t = playingTracks[currentTrackIdx];
                let arts = [];
                if(t.artistObj) {
                    arts.push(...t.artistObj.main);
                    arts.push(...t.artistObj.sub);
                }
                if(arts.length > 0) openArtist(arts[0]);
            }, 800); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); div.id="bulk-modal"; div.className="modal"; div.style.display = "flex";
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <div class="header-btn-container"><button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button></div>
                        <h2>Select Songs</h2>
                        <div class="header-btn-container right"><button class="modal-action-btn" onclick="saveBulkAdd()">Done</button></div>
                    </div>
                </div>
                <div class="search-container"><div class="search-bar-row"><input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)"></div><div id="bulk-artist-suggestions"></div></div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px;">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${buildArtistDisplayStr(t).toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;">
                        <div style="flex:1;"><b style="font-size:14px;">${t.name}</b><br><span style="font-size:11px; color:var(--icon-color);">${buildArtistDisplayStr(t)}</span></div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
        }

        function switchTab(v) { 
            saveScroll();
            currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; activeArtistFilter=null;
            render(); 
        }
        function openPlaylist(id) { saveScroll(); currentPlaylistId=id; activeArtistFilter=null; sortStates.playlistDetail = 'year'; render(); }
        function openArtist(n) { saveScroll(); currentArtist=n; render(); }
        function openFull() { fPlayer.classList.add('active'); fPlayer.style.transform = 'translateY(0)'; }
        function closeFull() { fPlayer.classList.remove('active'); fPlayer.style.transform = 'translateY(100%)'; }
        
        function handleHeaderLeft() { 
            saveScroll();
            if(currentArtist) currentArtist=null; 
            else if(currentPlaylistId) currentPlaylistId=null; 
            else isEditing=!isEditing; 
            render(); 
        }
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => t.artistObj.main.includes(currentArtist) || t.artistObj.sub.includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') { const n = prompt("Playlist Name:"); if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null, favorite: false }).onsuccess = loadAll; } 
            else if(currentView==='artists') { const n = prompt("Artist Name:"); if(n) db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ name: n, icon: null, favorite: false, members: [], parent: null }).onsuccess = loadAll; }
        }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { audio.pause(); audio.currentTime = 0; return; }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => tx.artistObj.main.includes(currentArtist) || tx.artistObj.sub.includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            audio.src = URL.createObjectURL(t.data);
            audio.volume = 1.0;
            document.getElementById('m-img').src = t.cover || ''; checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || ''; checkMarquee('f-title', t.name); document.getElementById('f-artist').innerText = buildArtistDisplayStr(t);
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-lyrics-view').classList.remove('active');
            document.getElementById('f-img').style.opacity = "1";
            updatePlayerBlurBg();
            audio.play().catch(e => console.warn(e));
        }
        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            else el.innerText = text;
        }
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    updateLyricsHighlight();
                }
            } 
        };

        function updateLyricsHighlight() {
            const t = playingTracks[currentTrackIdx];
            if(!t || !t.lyricsObj) return;
            let activeIdx = -1;
            for(let i = 0; i < t.lyricsObj.length; i++) {
                if(audio.currentTime >= t.lyricsObj[i].time) {
                    activeIdx = i;
                }
            }
            
            const lines = document.querySelectorAll('.lyric-line');
            lines.forEach((line, i) => {
                if(i === activeIdx) {
                    if(!line.classList.contains('active')) {
                        line.classList.add('active');
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    line.classList.remove('active');
                }
            });
        }

        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        audio.onended = () => { next(); };

        function renderTrackArtists() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists[activeArtistRole].map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        function switchArtistRole(role) {
            activeArtistRole = role;
            document.getElementById('role-main').classList.toggle('active', role === 'main');
            document.getElementById('role-sub').classList.toggle('active', role === 'sub');
            renderTrackArtists();
        }
        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if(val && !currentTrackArtists[activeArtistRole].includes(val)) {
                currentTrackArtists[activeArtistRole].push(val);
                el.value = '';
                renderTrackArtists();
            }
        }
        function removeTrackArtist(a) {
            currentTrackArtists[activeArtistRole] = currentTrackArtists[activeArtistRole].filter(x => x !== a);
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = { main: [...(t.artistObj?.main || [])], sub: [...(t.artistObj?.sub || [])] };
            activeArtistRole = 'main';
            document.getElementById('role-main').classList.add('active');
            document.getElementById('role-sub').classList.remove('active');
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artistObj = { main: [...currentTrackArtists.main], sub: [...currentTrackArtists.sub] };
            t.year = document.getElementById('edit-year').value; 
            
            let mStr = t.artistObj.main.join(',');
            let sStr = t.artistObj.sub.join(',');
            t.artist = sStr ? `${mStr}/${sStr}` : mStr;

            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; }
        function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; }
        function deleteSong(id) { if(confirm("Delete this track?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; }
        function deletePlaylist(id) { if(confirm("Delete this playlist?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; }
        function removeTrackFromPlaylist(sid) { const pl = playlists.find(p => p.id === currentPlaylistId); pl.songIds = pl.songIds.filter(id => id !== sid); db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; }
        function saveBulkAdd() { const pl = playlists.find(p => p.id === currentPlaylistId); const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); pl.songIds = newIds; db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { loadAll(); document.getElementById('bulk-modal').remove(); }; }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }
        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }
        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function openPlEdit(id) { 
            editingPlId = id; const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; 
        }
        
        function previewPlImg(e) { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { tempPlImg = ev.target.result; document.getElementById('pl-edit-img').src = tempPlImg; }; r.readAsDataURL(f); } }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }
        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }
        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, members: [] };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, members: [] };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        function renderArtistSetup() {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Artist Name</span>
                <input type="text" id="setup-artist-name" class="edit-input" value="${editingArtistSetupName}">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">+ Add Member</button>
                    </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="handleDragOver(event, ${i})" ondrop="handleDrop(event, ${i})" ondragend="handleDragEnd(event)">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <i class="fa-solid fa-bars" style="color:#ccc; padding:0 5px; cursor:grab;"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px; background:none;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        function addArtistMember() { currentMembersEdit.push({name:'', color:'#a6cbe3', linked: null}); renderArtistSetup(); }
        function removeArtistMember(i) { currentMembersEdit.splice(i, 1); renderArtistSetup(); }
        
        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); draggedMemIndex = -1; }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if(a && !currentMembersEdit[currentSyncIndex].name) {
                    currentMembersEdit[currentSyncIndex].name = a;
                }
                if(a && artistMeta[a]) {
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({...artistMeta[a], parent: editingArtistSetupName});
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                tracks.forEach(t => {
                    let changed = false;
                    for(let i=0; i<t.artistObj.main.length; i++) { if(t.artistObj.main[i] === oldName) { t.artistObj.main[i] = newName; changed = true; } }
                    for(let i=0; i<t.artistObj.sub.length; i++) { if(t.artistObj.sub[i] === oldName) { t.artistObj.sub[i] = newName; changed = true; } }
                    if(changed) { store.put(t); tracksChanged = true; }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if(tracksChanged) tx.oncomplete = loadAll; else loadAll();

            } else {
                let meta = artistMeta[oldName] || { name: oldName };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let allMembers = [];
            t.artistObj.main.forEach(a => {
                let trimA = a.trim();
                if(artistMeta[trimA] && artistMeta[trimA].members) {
                    allMembers = allMembers.concat(artistMeta[trimA].members);
                }
            });
            
            if(allMembers.length === 0) {
                allMembers.push({name: 'Default', color: 'var(--text-main)'});
            }

            currentPaintColor = '';
            currentLyricsEdit = t.lyricsObj ? JSON.parse(JSON.stringify(t.lyricsObj)) : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map((m, i) => `
                <div onclick="togglePaintColor('${m.color}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div id="pal-col-${i}" class="pal-col" data-col="${m.color}" style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('') + `
                <div onclick="clearPaintColor()" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:transparent; border:2px dashed var(--icon-color); display:flex; align-items:center; justify-content:center; color:var(--icon-color);"><i class="fa-solid fa-eraser"></i></div>
                    <span style="font-size:10px; margin-top:4px; text-align:center;">Reset</span>
                </div>
            `;

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        let selectedColorsForGradient = [];
        function togglePaintColor(col) {
            const idx = selectedColorsForGradient.indexOf(col);
            if(idx > -1) {
                selectedColorsForGradient.splice(idx, 1);
            } else {
                selectedColorsForGradient.push(col);
            }
            
            document.querySelectorAll('.pal-col').forEach(el => {
                if(selectedColorsForGradient.includes(el.getAttribute('data-col'))) {
                    el.style.transform = "scale(1.2)";
                    el.style.borderColor = "var(--text-main)";
                } else {
                    el.style.transform = "scale(1)";
                    el.style.borderColor = el.getAttribute('data-col');
                }
            });
        }
        function clearPaintColor() {
            selectedColorsForGradient = [];
            document.querySelectorAll('.pal-col').forEach(el => {
                el.style.transform = "scale(1)";
                el.style.borderColor = el.getAttribute('data-col');
            });
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricsEdit.map((l, i) => {
                let bgGradient = '';
                if(l.colors && l.colors.length > 0) {
                    if(l.colors.length === 1) bgGradient = l.colors[0];
                    else bgGradient = `linear-gradient(90deg, ${l.colors.join(', ')})`;
                }

                return `
                <div style="padding:15px; border-radius:12px; background:var(--glass); border: 2px solid var(--border-color); display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button onclick="setLineTime(${i})" style="background:var(--accent-blue); border:none; border-radius:10px; padding:8px; color:var(--icon-active); font-weight:800; font-size:10px; white-space:nowrap;">Sync Time</button>
                        <input type="number" step="0.1" value="${l.time || 0}" class="edit-input" style="margin:0; padding:8px; width:70px;" onchange="currentLyricsEdit[${i}].time=parseFloat(this.value)">
                        <div style="flex:1; height:8px; border-radius:4px; background:${bgGradient || 'transparent'}; border: 1px solid var(--border-color);"></div>
                        <i class="fa-solid fa-paintbrush" onclick="applyLyricColor(${i})" style="color:var(--icon-color); padding:10px; cursor:pointer;"></i>
                        <i class="fa-solid fa-trash" onclick="removeLyricLine(${i})" style="color:var(--del-color); padding:10px; cursor:pointer;"></i>
                    </div>
                    <textarea class="edit-input" style="margin:0; padding:10px; resize:none; height:45px;" onchange="currentLyricsEdit[${i}].text=this.value" onkeydown="handleLyricEnter(event, ${i})">${l.text || ''}</textarea>
                </div>
            `}).join('');
        }

        function handleLyricEnter(e, i) {
            if(e.key === 'Enter') {
                e.preventDefault();
                setLineTime(i+1);
            }
        }

        function setLineTime(i) {
            if(i < currentLyricsEdit.length) {
                currentLyricsEdit[i].time = parseFloat(audio.currentTime.toFixed(1));
                renderPaintLyrics();
            }
        }

        function addBlankLyricLine() {
            currentLyricsEdit.push({time: 0, text: '', colors: []});
            renderPaintLyrics();
        }

        function removeLyricLine(i) {
            currentLyricsEdit.splice(i, 1);
            renderPaintLyrics();
        }

        function applyLyricColor(i) {
            currentLyricsEdit[i].colors = [...selectedColorsForGradient];
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricsObj = currentLyricsEdit;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artistObj: {main: [tag.tags.artist || "Unknown"], sub: []}, 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricsObj: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artistObj: {main: ["Unknown"], sub: []}, 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricsObj: [] 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `<div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])"><img src="${t.cover||''}" style="width:40px; height:40px;"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--icon-color);">${buildArtistDisplayStr(t)}</div></div></div>`).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
