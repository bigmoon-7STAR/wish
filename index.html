                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            ${!p.autoGen ? `<div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>` : ''}
                            <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img" alt="pl-cover">
                            ${p.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name;
                    display.className = "list-view";
                    
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => { artistsInPlRaw.push(...getArtistNames(s.artist)); });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && search.length > 0 && !isFavSearch) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => getArtistNames(t.artist).includes(a));
                                const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}">` : `<div class="placeholder" style="${activeArtistFilter===a?'border-color:var(--icon-color); opacity:1;':'opacity:0.6;'}"><i class="fa-solid fa-user"></i></div>`);
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs;
                    if (isFavSearch) {
                        filtered = filtered.filter(t => t.favorite);
                    } else {
                        filtered = filtered.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term) || getDisplayArtistString(t.artist).toLowerCase().includes(term)));
                    }
                    if (activeArtistFilter) {
                        filtered = filtered.filter(t => getArtistNames(t.artist).includes(activeArtistFilter));
                    }

                    if (currentSort === 'name_asc') {
                        filtered.sort((a,b) => a.name.localeCompare(b.name,'ja'));
                        if(sortOrders[viewKey]==='desc') filtered.reverse();
                    } else if (currentSort === 'name_desc') {
                        filtered.sort((a,b) => b.name.localeCompare(a.name,'ja'));
                        if(sortOrders[viewKey]==='desc') filtered.reverse();
                    } else if (currentSort === 'year') {
                        filtered.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
                        if(sortOrders[viewKey]==='asc') filtered.reverse();
                    } else if (currentSort === 'artist') {
                        filtered.sort((a,b) => getDisplayArtistString(a.artist).localeCompare(getDisplayArtistString(b.artist), 'ja'));
                        if(sortOrders[viewKey]==='desc') filtered.reverse();
                    }

                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover||''}" style="margin-right:0;" alt="cover">
                                </div>
                                <div style="flex:1; overflow:hidden;">
                                    <div style="font-weight:800; font-size:14px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${t.name}</div>
                                    <div class="artist-tag-display">${getArtistTagsHtml(t.artist)}</div>
                                </div>
                                ${currentSort==='custom' && !pl.autoGen ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + (!pl.autoGen ? `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>` : '');
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }

            restoreScrollPosition();
        }

        function parseArtistField(artistData) {
            if (!artistData) return [];
            try {
                let parsed = JSON.parse(artistData);
                if (Array.isArray(parsed)) return parsed;
            } catch (e) {
                let arr = artistData.split(/[,、/]/).map(x => x.trim()).filter(x => x);
                return arr.map(a => ({ name: a, type: 'main' }));
            }
            return [];
        }

        function getArtistNames(artistData) {
            return parseArtistField(artistData).map(a => a.name);
        }

        function getDisplayArtistString(artistData) {
            let arr = parseArtistField(artistData);
            return arr.map(a => a.name).join(', ');
        }

        function getArtistTagsHtml(artistData) {
            let arr = parseArtistField(artistData);
            return arr.map(a => {
                let typeClass = a.type === 'sub' ? 'sub' : '';
                return `<span class="artist-tag-badge ${typeClass}">${a.name}</span>`;
            }).join(' ');
        }

        function renderCards(list, container, sort, order) {
            if (sort === 'name_asc') {
                list.sort((a,b) => a.name.localeCompare(b.name,'ja'));
                if(order === 'desc') list.reverse();
            } else if (sort === 'name_desc') {
                list.sort((a,b) => b.name.localeCompare(a.name,'ja'));
                if(order === 'desc') list.reverse();
            } else if (sort === 'year') {
                list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
                if(order === 'asc') list.reverse();
            } else if (sort === 'artist') {
                list.sort((a,b) => getDisplayArtistString(a.artist).localeCompare(getDisplayArtistString(b.artist), 'ja'));
                if(order === 'desc') list.reverse();
            } else {
                if(order === 'desc') list.reverse();
            }
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover||''}" class="card-img" alt="cover">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${getDisplayArtistString(t.artist)} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                    </div>
                </div>`).join('');
        }

        function editArtistNamePrompt(oldName) {
            const newName = prompt("Edit Artist Name:", oldName);
            if (newName && newName !== oldName) {
                let meta = artistMeta[oldName];
                if (meta) {
                    meta.name = newName;
                    artistMeta[newName] = meta;
                    delete artistMeta[oldName];
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);
                }
                
                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let arts = parseArtistField(t.artist);
                    let changed = false;
                    arts.forEach(a => {
                        if (a.name === oldName) {
                            a.name = newName;
                            changed = true;
                        }
                    });
                    if (changed) {
                        t.artist = JSON.stringify(arts);
                        store.put(t);
                        tracksChanged = true;
                    }
                });
                
                if (tracksChanged) {
                    tx.oncomplete = loadAll;
                } else {
                    loadAll();
                }
            }
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl || pl.autoGen) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                loadAll();
                updateQueueFromPlaylistChange();
            };
        }

        function updateQueueFromPlaylistChange() {
            if (currentPlaylistId !== null && playingTracks.length > 0) {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                let currentId = playingTracks[currentTrackIdx].id;
                
                playingTracks = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                currentTrackIdx = playingTracks.findIndex(x => x.id === currentId);
                
                if(currentTrackIdx === -1) {
                    currentTrackIdx = 0;
                    loadTrack(playingTracks[currentTrackIdx]);
                } else {
                    renderQueue();
                }
            }
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[currentView] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function toggleFavArtist(a) {
            let meta = artistMeta[a] || { name: a, icon: null, favorite: false, members: [], syncColor: '' };
            meta.favorite = !meta.favorite;
            artistMeta[a] = meta;
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll;
        }
        
        function deleteCustomArtist(a) {
            if(confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if(btn) {
                const icon = btn.querySelector('i');
                if(isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
        });

        function parseLyrics(text) {
            if(!text) return [];
            let lines = text.split('\n');
            let parsed = [];
            
            lines.forEach((l, idx) => {
                let match = l.match(/\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/);
                if (match) {
                    let min = parseInt(match[1]);
                    let sec = parseFloat(match[2]);
                    let time = min * 60 + sec;
                    let content = match[3].trim();
                    parsed.push({ time: time, text: content, originalIndex: idx });
                } else {
                    parsed.push({ time: null, text: l.trim(), originalIndex: idx });
                }
            });
            return parsed;
        }

        function formatLyricTime(timeInSeconds) {
            let m = Math.floor(timeInSeconds / 60);
            let s = (timeInSeconds % 60).toFixed(2);
            if(s < 10) s = '0' + s;
            return `[0${m}:${s}]`;
        }

        let parsedCurrentLyrics = [];

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                
                let track = playingTracks[currentTrackIdx];
                parsedCurrentLyrics = parseLyrics(track?.lyrics);
                let colors = track?.lyricColors || [];
                
                const fsToggleBtn = `<button id="fs-lyric-btn" onclick="event.stopPropagation(); toggleFullscreenLyrics()" style="position:absolute; top:25px; right:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-expand"></i></button>`;
                const paintBtn = `<button onclick="event.stopPropagation(); openLyricPaint()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.1); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-pen-to-square"></i></button>`;
                
                view.innerHTML = fsToggleBtn + paintBtn + `<div id="lyrics-content-scroll" style="width:100%; height:100%; overflow-y:auto; padding-top:40px; padding-bottom:80px;">` + 
                    parsedCurrentLyrics.map((l, i) => {
                        let c = colors[i] || 'inherit';
                        return `<div id="lyric-line-${i}" style="color:${c}; width:100%; word-wrap:break-word; min-height:24px;" onclick="seekToLyric(${i})">${l.text}</div>`;
                    }).join('') + `</div>`;
                
                if(view.classList.contains('fullscreen-lyrics')) {
                    document.getElementById('fs-lyric-btn').innerHTML = '<i class="fa-solid fa-compress"></i>';
                }
                
                updateLyricsHighlight(audio.currentTime);
                
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.classList.remove('fullscreen-lyrics');
                view.innerHTML = '';
            }
        }

        function seekToLyric(idx) {
            let l = parsedCurrentLyrics[idx];
            if (l && l.time !== null) {
                audio.currentTime = l.time;
                audio.play();
            }
        }

        function updateLyricsHighlight(time) {
            if (!document.getElementById('f-lyrics-view').classList.contains('active')) return;
            
            let activeIdx = -1;
            for(let i = 0; i < parsedCurrentLyrics.length; i++) {
                if(parsedCurrentLyrics[i].time !== null && parsedCurrentLyrics[i].time <= time) {
                    activeIdx = i;
                }
            }
            
            parsedCurrentLyrics.forEach((_, i) => {
                let el = document.getElementById(`lyric-line-${i}`);
                if(el) {
                    if (i === activeIdx) {
                        el.classList.add('active-lyric');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        el.classList.remove('active-lyric');
                    }
                }
            });
        }

        function toggleFullscreenLyrics() {
            const view = document.getElementById('f-lyrics-view');
            view.classList.toggle('fullscreen-lyrics');
            const btn = document.getElementById('fs-lyric-btn');
            if(view.classList.contains('fullscreen-lyrics')) {
                btn.innerHTML = '<i class="fa-solid fa-compress"></i>';
                document.getElementById('f-artwork-container').style.position = 'static';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-expand"></i>';
                document.getElementById('f-artwork-container').style.position = 'relative';
            }
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                const arts = getArtistNames(playingTracks[currentTrackIdx].artist);
                if(arts.length > 0) openArtist(arts[0]);
            }, 800); 
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); 
            div.id="bulk-modal"; 
            div.className="modal"; 
            div.style.display = "flex";
            div.style.zIndex = "9000";
            
            div.innerHTML = `
                <div class="header">
                    <div class="header-top">
                        <button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                        <h2>Select Songs</h2>
                        <button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color); background:none; border:none; font-size:16px;">Done</button>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions"></div>
                </div>
                <div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:50px; background:var(--bg-color);">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${getDisplayArtistString(t.artist).toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                        <img src="${t.cover||''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px; object-fit:cover;">
                        <div style="flex:1; overflow:hidden;">
                            <b style="font-size:14px; white-space:nowrap;">${t.name}</b><br>
                            <span style="font-size:11px; color:var(--icon-color);">${getDisplayArtistString(t.artist)}</span>
                        </div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => getArtistNames(t.artist).includes(a));
                    const icon = (artistMeta[a] && artistMeta[a].icon) ? `<img src="${artistMeta[a].icon}">` : (firstSong && firstSong.cover ? `<img src="${firstSong.cover}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`);
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else { 
                suggest.style.display = 'none'; 
            }
        }

        function switchTab(v) { 
            currentView = v; 
            currentArtist = null; 
            currentPlaylistId = null; 
            isEditing = false; 
            activeArtistFilter = null;
            render(); 
        }
        
        function openPlaylist(id) { 
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            sortStates.playlistDetail = 'year'; 
            render(); 
        }
        
        function openArtist(n) { 
            currentArtist = n; 
            render(); 
        }
        
        function openFull() { 
            fPlayer.classList.add('active'); 
            fPlayer.style.transform = 'translateY(0)'; 
        }
        
        function closeFull() { 
            fPlayer.classList.remove('active'); 
            fPlayer.style.transform = 'translateY(100%)'; 
        }
        
        function handleHeaderLeft() { 
            if(currentArtist) currentArtist = null; 
            else if(currentPlaylistId) currentPlaylistId = null; 
            else isEditing = !isEditing; 
            render(); 
        }
        
        function handleHeaderRight() { 
            if(currentArtist) { 
                const artTracks = tracks.filter(t => getArtistNames(t.artist).includes(currentArtist)); 
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId) {
                openBulkAddModal();
            }
            else if(currentView === 'library') {
                document.getElementById('audio-upload').click(); 
            }
            else if(currentView === 'playlist') { 
                const n = prompt("Playlist Name:"); 
                if(n) {
                    db.transaction("playlists","readwrite").objectStore("playlists").add({ 
                        name: n, 
                        songIds: [], 
                        tag: "", 
                        cover: null, 
                        favorite: false,
                        autoGen: false
                    }).onsuccess = loadAll; 
                } 
            } 
            else if(currentView === 'artists') { 
                const n = prompt("Artist Name:"); 
                if(n) {
                    db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ 
                        name: n, 
                        icon: null, 
                        favorite: false, 
                        members: [], 
                        syncColor: '' 
                    }).onsuccess = loadAll; 
                }
            }
        }

        function togglePlay() { 
            initAudioContext();
            if (audio.paused) {
                let p = audio.play();
                if (p !== undefined) {
                    p.then(() => {
                        fadeAudioIn();
                    }).catch(e => console.log(e));
                }
            } else {
                audio.pause(); 
            }
        }

        function handleSeek(val) {
            audio.currentTime = val;
            updateLyricsHighlight(val);
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { 
                audio.currentTime = 0;
                audio.play();
                return; 
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); 
                audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function prev() { 
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }

        function playSong(id, mode) {
            initAudioContext();
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            } else if(mode === 'art') {
                original = tracks.filter(tx => getArtistNames(tx.artist).includes(currentArtist));
            } else {
                original = [...tracks];
            }
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
            
            audio.play().catch(e => console.log(e));
        }
        
        function updatePlayerBlurBg() {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if(!t) return;
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            
            document.getElementById('m-img').src = t.cover || document.getElementById('apple-touch-icon').href; 
            checkMarquee('m-title', t.name);
            
            document.getElementById('f-img').src = t.cover || document.getElementById('apple-touch-icon').href; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = getDisplayArtistString(t.artist);
            
            document.getElementById('mini').style.display = 'flex';
            
            if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                toggleLyrics(); 
                toggleLyrics();
            }
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            updateMediaSession(t);
            renderQueue();
            
            audio.play().catch(e => console.log(e));
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            } else {
                el.innerText = text;
            }
        }

        function formatTime(s) { 
            let m = Math.floor(s/60);
            let sec = Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }

        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)){ 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                updateLyricsHighlight(audio.currentTime);
            } 
        };
        
        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };
        
        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };
        
        audio.onended = () => { 
            next(); 
        };

        function renderTrackArtists() {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtists.map((a, i) => `
                <div style="display:flex; align-items:center; gap:10px; background:var(--card-bg); padding:10px; border-radius:12px; border:1px solid var(--border-color);">
                    <input type="text" class="edit-input" style="margin:0; padding:8px; flex:1; font-size:12px;" value="${a.name}" onchange="currentTrackArtists[${i}].name=this.value">
                    <select class="edit-input" style="margin:0; padding:8px; width:100px; font-size:12px;" onchange="currentTrackArtists[${i}].type=this.value">
                        <option value="main" ${a.type==='main'?'selected':''}>Main</option>
                        <option value="sub" ${a.type==='sub'?'selected':''}>Sub</option>
                    </select>
                    <i class="fa-solid fa-xmark" onclick="removeTrackArtist(${i})" style="cursor:pointer; font-size:16px; color:var(--del-color);"></i>
                </div>
            `).join('');
        }
        
        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if(val) {
                currentTrackArtists.push({ name: val, type: 'main' });
                el.value = '';
                renderTrackArtists();
            }
        }
        
        function removeTrackArtist(idx) {
            currentTrackArtists.splice(idx, 1);
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtists = parseArtistField(t.artist);
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            
            let displayLyrics = t.lyrics || "";
            let parsed = parseLyrics(displayLyrics);
            let rawText = parsed.map(p => p.text).join('\n');
            
            document.getElementById('edit-lyrics').value = rawText; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }

        function closeEdit() { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }

        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = JSON.stringify(currentTrackArtists);
            t.year = document.getElementById('edit-year').value; 
            
            let newRawLyrics = document.getElementById('edit-lyrics').value;
            let existingParsed = parseLyrics(t.lyrics);
            let newLines = newRawLyrics.split('\n');
            
            let finalLyricsArr = [];
            newLines.forEach((l, i) => {
                if (existingParsed[i] && existingParsed[i].time !== null) {
                    finalLyricsArr.push(formatLyricTime(existingParsed[i].time) + ' ' + l);
                } else {
                    finalLyricsArr.push(l);
                }
            });
            
            t.lyrics = finalLyricsArr.join('\n');
            
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
            }; 
        }

        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
            if(isShuffle) {
                let current = playingTracks[currentTrackIdx];
                playingTracks.sort(() => Math.random() - 0.5);
                currentTrackIdx = playingTracks.findIndex(x => x.id === current.id);
            } else {
                updateQueueFromPlaylistChange(); 
            }
            renderQueue();
        }

        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function deleteSong(id) { 
            if(confirm("Delete this track?")) {
                db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; 
            }
        }

        function deletePlaylist(id) { 
            if(confirm("Delete this playlist?")) {
                db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; 
            }
        }

        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl.autoGen) return;
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                loadAll();
                updateQueueFromPlaylistChange();
            };
        }

        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').remove(); 
                updateQueueFromPlaylistChange();
            }; 
        }
        
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if(val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }

        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function togglePlFav() {
            tempPlFav = !tempPlFav;
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            if(tempPlFav) {
                icon.className = 'fa-solid fa-star star-icon active';
            } else {
                icon.className = 'fa-regular fa-star star-icon';
            }
        }

        function openPlEdit(id) { 
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            document.getElementById('pl-edit-name').disabled = pl.autoGen;

            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t=>t.trim()).filter(t=>t) : [];
            tempPlFav = pl.favorite || false;
            
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
            
            document.getElementById('pl-edit-tag').value = '';
            document.getElementById('pl-edit-tag').disabled = pl.autoGen;

            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || document.getElementById('apple-touch-icon').href; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }

        function closePlEdit() { 
            document.getElementById('pl-edit-modal').style.display = 'none'; 
        }

        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            if(!pl.autoGen) {
                pl.name = document.getElementById('pl-edit-name').value; 
                pl.tag = currentPlTags.join(',');
            }
            pl.cover = tempPlImg; 
            pl.favorite = tempPlFav;
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if(f){ 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('pl-edit-img').src = tempPlImg; 
                }; 
                r.readAsDataURL(f); 
            } 
        }
        
        function updateArtistSuggest(v) { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }

        function updateTagSuggest(v) { 
            const container = document.getElementById('tag-quick-select'); 
            const allTags = [];
            playlists.forEach(p => {
                if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                    const tr = tg.trim(); if(tr && !allTags.includes(tr)) allTags.push(tr);
                });
            });
            container.innerHTML = allTags.map(t => `<div class="artist-chip" onclick="document.getElementById('pl-edit-tag').value='${t}'; addPlTag();">${t}</div>`).join(''); 
        }

        function selectArtistIcon(name) { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }

        function saveArtistIcon(e) { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, favorite: false, members: [], syncColor: '' };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = loadAll; 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [], syncColor: '' };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup(meta.syncColor);
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }

        function renderArtistSetup(syncCol = '') {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <span class="field-label">Parent Artist Color</span>
                <input type="color" value="${syncCol || '#a6cbe3'}" id="setup-parent-color" style="width:100%; height:50px; border:none; border-radius:15px; margin-bottom:20px;">
                <div style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">+ Add Member</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container setup-mem-item" style="margin-bottom:10px; border-radius:15px;">
                            <div class="list-item" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked?'var(--icon-active)':'#ccc'}; padding:0 5px;" onclick="openSyncModal(${i})"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.name}" oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                                <i class="fa-solid fa-trash" style="color:var(--del-color); padding:10px; cursor:pointer;" onclick="removeArtistMember(${i})"></i>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addArtistMember() { 
            currentMembersEdit.push({name:'', color:'var(--icon-color)', linked: null}); 
            renderArtistSetup(document.getElementById('setup-parent-color').value); 
        }

        function removeArtistMember(i) { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(document.getElementById('setup-parent-color').value); 
        }
        
        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                renderArtistSetup(document.getElementById('setup-parent-color').value);
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let oldName = editingArtistSetupName;
            let pColor = document.getElementById('setup-parent-color').value;
            
            let meta = artistMeta[oldName] || { name: oldName, favorite: false };
            meta.members = currentMembersEdit;
            meta.syncColor = pColor;
            artistMeta[oldName] = meta;
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                document.getElementById('artist-setup-modal').style.display = 'none';
                loadAll();
            };
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            let allMembers = [];
            let arts = getArtistNames(t.artist);
            
            arts.forEach(a => {
                let trimA = a.trim();
                if(artistMeta[trimA]) {
                    if(artistMeta[trimA].syncColor) {
                        allMembers.push({name: trimA, color: artistMeta[trimA].syncColor});
                    }
                    if(artistMeta[trimA].members) {
                        allMembers = allMembers.concat(artistMeta[trimA].members);
                    }
                }
            });
            
            allMembers.push({name: 'Reset', color: ''});

            currentPaintColor = allMembers[0] ? allMembers[0].color : '';
            currentLyricColors = t.lyricColors ? [...t.lyricColors] : [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map(m => `
                <div onclick="currentPaintColor='${m.color}'" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyrics();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function renderPaintLyrics() {
            const t = playingTracks[currentTrackIdx];
            parsedCurrentLyrics = parseLyrics(t.lyrics);
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = parsedCurrentLyrics.map((l, i) => `
                <div style="display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px; background:var(--input-bg); border-left:6px solid ${currentLyricColors[i] || 'transparent'};">
                    <button onclick="tagLyricTime(${i})" style="background:var(--icon-color); color:#fff; border:none; border-radius:10px; padding:10px; cursor:pointer; min-width:60px; font-weight:800; font-size:12px;">
                        ${l.time !== null ? formatTime(l.time) : 'Tag'}
                    </button>
                    <div onclick="applyLyricColor(${i})" style="flex:1; color:${currentLyricColors[i] || 'var(--text-main)'}; cursor:pointer; font-weight:800; overflow-wrap:anywhere;">
                        ${l.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                    </div>
                </div>
            `).join('');
        }

        function tagLyricTime(idx) {
            let t = audio.currentTime;
            parsedCurrentLyrics[idx].time = t;
            renderPaintLyrics();
        }

        function applyLyricColor(i) {
            currentLyricColors[i] = currentPaintColor;
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            
            let finalLyricsArr = [];
            parsedCurrentLyrics.forEach(l => {
                if (l.time !== null) {
                    finalLyricsArr.push(formatLyricTime(l.time) + ' ' + l.text);
                } else {
                    finalLyricsArr.push(l.text);
                }
            });
            
            t.lyrics = finalLyricsArr.join('\n');
            t.lyricColors = currentLyricColors;
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data, s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: JSON.stringify([{name: tag.tags.artist || "Unknown", type: 'main'}]), 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: JSON.stringify([{name: "Unknown", type: 'main'}]), 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover||document.getElementById('apple-touch-icon').href}" style="width:40px; height:40px; border-radius:8px;" alt="cover">
                    <div style="overflow:hidden;">
                        <div style="font-weight:800; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color); white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${getDisplayArtistString(t.artist)}</div>
                    </div>
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
        }
    </script>
</body>
</html>
