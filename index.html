<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Studio ✧ Pure Wish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            /* パレットの強化：ウィッシュコア・魔法少女感を強調 */
            --key-color: #fbe0e6;
            --accent-blue: #e1f1fa;
            --accent-green: #ebf5e6;
            --accent-purple: #eee5f8;
            --magic-pink: #ffb7c5;
            --magic-star: #fff9ae;
            --text-main: #5a5a8a;
            --text-bright: #ff7eb9;
            --sub-text: #a0a6cc;
            --glass: rgba(255, 255, 255, 0.45);
            --glass-heavy: rgba(255, 255, 255, 0.65);
            --star-clip: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            --card-shadow: 0 12px 30px rgba(220, 180, 210, 0.25);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", sans-serif;
            background: #ffffff;
            background-image: 
                radial-gradient(circle at 10% 20%, var(--accent-blue) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--key-color) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, var(--accent-purple) 0%, transparent 60%),
                linear-gradient(135deg, #fff 0%, #fef4f7 100%);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        /* 背景オーブ装飾の強化 */
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(70px); z-index: -1; opacity: 0.6; animation: float 12s infinite alternate ease-in-out; }
        @keyframes float { 
            from { transform: translate(0,0) scale(1); } 
            to { transform: translate(40px, 60px) scale(1.1); } 
        }

        /* --- ボタンアニメーション (魔法少女/ウィッシュコア風) --- */
        button, i[class*="fa-"] { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        button:active, i[class*="fa-"]:active { transform: scale(0.85) rotate(-5deg); filter: brightness(1.2); text-shadow: 0 0 12px var(--magic-pink); }
        
        .magic-btn-glow { position: relative; overflow: hidden; }
        .magic-btn-glow::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 5px; height: 5px;
            background: rgba(255,255,255,0.8); opacity: 0; border-radius: 50%; transform: translate(-50%, -50%);
        }
        .magic-btn-glow:active::after { animation: magic-spark 0.6s ease-out; }
        @keyframes magic-spark {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 100px; height: 100px; opacity: 0; }
        }

        /* --- Header --- */
        .header { padding: calc(45px + env(safe-area-inset-top)) 20px 15px; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1.5px solid rgba(255,255,255,0.5); z-index: 100; box-shadow: 0 4px 20px rgba(255,182,197,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--text-main), var(--text-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: 0.1em; }
        #left-btn, #right-btn { background: none; border: none; color: var(--text-bright); font-size: 14px; font-weight: 800; padding: 8px; text-transform: uppercase; }
        #right-btn i { font-size: 18px; color: #fff; background: linear-gradient(135deg, var(--magic-pink), var(--accent-purple)); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 6px 15px rgba(255,183,197,0.4); border: 2px solid #fff; }

        .search-container { padding: 12px 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; gap: 10px; align-items: center; }
        #search-input { flex: 1; padding: 11px 20px; border-radius: 25px; border: 2.5px solid #fff; background: rgba(255,255,255,0.7); font-size: 13px; outline: none; box-shadow: 0 8px 25px rgba(255,182,197,0.1); color: var(--text-main); }
        .sort-select { background: #fff; border: 2px solid var(--accent-blue); border-radius: 14px; font-size: 11px; color: var(--text-main); padding: 8px 12px; outline: none; font-weight: 700; }

        /* --- Content Area --- */
        #content { flex: 1; overflow-y: auto; padding-bottom: 180px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; padding: 20px; }
        
        .card { position: relative; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:active { transform: translateY(-5px) scale(0.98); }
        .card-img { width: 100%; aspect-ratio: 1/1; border-radius: 32px; object-fit: cover; box-shadow: var(--card-shadow); border: 5px solid #fff; display: block; background: #fff; transition: 0.3s; }
        .card:hover .card-img { border-color: var(--key-color); }
        .card-info { padding: 10px 4px; }
        .card-title { font-size: 14px; font-weight: 800; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-sub { font-size: 11px; color: var(--sub-text); margin-top: 4px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .card-year { font-size: 9px; color: var(--text-bright); background: var(--key-color); padding: 2px 8px; border-radius: 10px; font-weight: 800; }
        
        .card-tag { display: inline-block; font-size: 9px; background: linear-gradient(135deg, var(--magic-pink), var(--accent-purple)); color: #fff; padding: 4px 12px; border-radius: 20px; margin-top: 8px; font-weight: 800; box-shadow: 0 4px 10px rgba(255,183,197,0.3); }

        .list-item { display: flex; align-items: center; padding: 16px 22px; border-bottom: 1px solid rgba(255,182,197,0.15); cursor: pointer; transition: 0.3s; position: relative; }
        .list-item:active { background: rgba(255,224,230,0.4); }
        .list-item img:not(.artist-icon) { width: 60px; height: 60px; border-radius: 20px; margin-right: 18px; object-fit: cover; border: 3px solid #fff; box-shadow: 0 8px 20px rgba(255,182,197,0.2); }

        .artist-icon-container { width: 75px; height: 75px; margin-right: 20px; flex-shrink: 0; filter: drop-shadow(0 10px 15px rgba(255,180,210,0.4)); position: relative; animation: hover-star 4s infinite alternate ease-in-out; }
        @keyframes hover-star { from { transform: translateY(0); } to { transform: translateY(-6px); } }
        .artist-icon { 
            width: 100%; height: 100%; object-fit: cover; 
            background: linear-gradient(135deg, var(--accent-blue), var(--magic-pink), var(--magic-star)); 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; clip-path: var(--star-clip); border: none;
        }

        /* --- Full Player --- */
        .full-player { position: fixed; inset: 0; z-index: 5000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.2, 0, 0, 1); visibility: hidden; background: transparent; }
        .full-player.active { transform: translateY(0); visibility: visible; }
        /* すりガラス背景 */
        .full-player-glass { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px); z-index: -1; }

        #bg-blur-overlay { position: absolute; inset: 0; z-index: -2; background: #fff; overflow: hidden; }
        .bg-sphere { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: radial-gradient(circle, var(--accent-blue) 0%, var(--magic-pink) 30%, var(--magic-star) 60%, var(--accent-green) 100%); filter: blur(100px); opacity: 0.4; animation: rotateBg 40s linear infinite; }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #f-artwork-container { width: 82vw; max-width: 360px; aspect-ratio: 1/1; position: relative; z-index: 10; }
        #f-img { width: 100%; height: 100%; border-radius: 50px; object-fit: cover; box-shadow: 0 40px 100px rgba(255,150,180,0.4); border: 12px solid #fff; transition: opacity 0.5s; }
        #f-lyrics-view { position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(30px); border-radius: 50px; padding: 50px 35px; overflow-y: auto; display: none; flex-direction: column; align-items: center; text-align: center; font-size: 19px; line-height: 2.4; color: var(--text-main); font-weight: 700; text-shadow: 0 0 10px rgba(255,255,255,1); }
        #f-lyrics-view.active { display: flex; }

        .seeker { -webkit-appearance: none; width: 100%; height: 8px; background: rgba(255,255,255,0.5); border-radius: 12px; outline: none; margin: 50px 0 15px; border: 1px solid rgba(255,182,197,0.3); }
        .seeker::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: linear-gradient(135deg, #fff, var(--key-color)); border: 2px solid var(--magic-pink); border-radius: 50%; box-shadow: 0 4px 12px rgba(255,150,180,0.4); cursor: pointer; }

        /* --- Mini Player --- */
        .mini-player { position: fixed; bottom: calc(95px + env(safe-area-inset-bottom)); left: 15px; right: 15px; height: 80px; background: rgba(255,255,255,0.5); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-radius: 30px; display: none; align-items: center; padding: 0 20px; box-shadow: 0 15px 40px rgba(255,182,197,0.25); z-index: 2000; border: 2.5px solid rgba(255,255,255,0.8); }
        #m-img { width: 56px; height: 56px; border-radius: 18px; margin-right: 15px; object-fit: cover; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(255,150,180,0.2); flex-shrink: 0; }
        
        /* --- Tab Bar --- */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: calc(85px + env(safe-area-inset-bottom)); background: rgba(255,255,255,0.7); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding-top: 15px; border-top: 1.5px solid rgba(255,255,255,0.5); z-index: 1000; }
        .tab-item { border:none; background:none; color: var(--sub-text); font-weight: 800; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 7px; width: 33%; transition: all 0.4s; }
        .tab-item.active { color: var(--text-bright); text-shadow: 0 0 8px rgba(255,126,185,0.3); }
        .tab-item i { font-size: 24px; }

        /* Modal & UI Elements */
        .modal { position: fixed; inset: 0; background: #ffffff; z-index: 7000; display: none; flex-direction: column; animation: modalSlide 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        @keyframes modalSlide { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-body { padding: 35px; overflow-y: auto; flex: 1; background: linear-gradient(to bottom, #fff, #fff9fb); }
        .edit-input { width: 100%; padding: 20px; border: 2.5px solid #fff; border-radius: 22px; margin-bottom: 24px; outline: none; font-size: 16px; background: rgba(255,224,230,0.2); color: var(--text-main); font-weight: 600; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); }
        .edit-input:focus { border-color: var(--magic-pink); background: #fff; }
        .field-label { font-size: 11px; color: var(--text-bright); font-weight: 900; letter-spacing: 0.2em; display: block; margin-bottom: 12px; margin-left: 8px; text-transform: uppercase; }

        .artist-chip { display: inline-block; padding: 10px 22px; background: #fff; border: 2px solid var(--accent-blue); border-radius: 28px; font-size: 12px; margin: 0 8px 12px 0; color: var(--text-main); font-weight: 800; cursor: pointer; transition: 0.3s; }
        .artist-chip:active { background: var(--magic-pink); color: #fff; border-color: #fff; }

        .del-badge { position: absolute; top: -12px; left: -12px; width: 36px; height: 36px; background: var(--text-bright); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 3px solid #fff; z-index: 10; font-size: 14px; box-shadow: 0 8px 20px rgba(255,126,185,0.4); }
        .editing .del-badge { display: flex; }
        
        .check-item { display: flex; align-items: center; padding: 20px 30px; border-bottom: 1.5px solid #fef4f7; cursor: pointer; }
        .check-item input[type="checkbox"] { width: 24px; height: 24px; margin-right: 22px; accent-color: var(--text-bright); border-radius: 8px; }

        .queue-panel { position: absolute; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(60px); z-index: 6000; transform: translateY(100%); transition: transform 0.7s cubic-bezier(0.2, 1, 0.2, 1); display: flex; flex-direction: column; }
        .queue-panel.open { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="bg-orb" style="width:350px; height:350px; background:var(--accent-blue); top:-100px; left:-50px;"></div>
    <div class="bg-orb" style="width:300px; height:300px; background:var(--key-color); bottom:150px; right:-50px;"></div>
    <div class="bg-orb" style="width:200px; height:200px; background:var(--magic-star); top:40%; right:10%;"></div>

    <div class="header">
        <div class="header-top">
            <button id="left-btn" onclick="handleHeaderLeft()" class="magic-btn-glow">Edit</button>
            <h2 id="view-title">Artists</h2>
            <button id="right-btn" onclick="handleHeaderRight()" class="magic-btn-glow"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search track, artist..." oninput="render()">
        <select id="sort-type" class="sort-select" onchange="render()">
            <option value="added">Newest</option>
            <option value="name_asc">Title A-Z</option>
            <option value="name_desc">Title Z-A</option>
            <option value="year">Release Date</option>
        </select>
    </div>

    <div id="content"><div id="main-display"></div></div>

    <div class="mini-player" id="mini" onclick="openFull()">
        <img id="m-img" src="">
        <div id="m-title" style="flex:1; font-weight:800; font-size:15px; color:var(--text-main); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; letter-spacing:0.04em;"></div>
        <div style="display:flex; align-items:center; gap:5px;">
             <i id="m-pp" class="fa-solid fa-play magic-btn-glow" style="font-size:24px; color:var(--text-bright); padding:15px;" onclick="event.stopPropagation(); togglePlay();"></i>
        </div>
    </div>

    <div class="full-player" id="full">
        <div class="full-player-glass"></div>
        <div id="bg-blur-overlay"><div class="bg-sphere"></div></div>
        <div onclick="closeFull()" style="padding:30px; text-align:center;"><div style="width:45px; height:6px; border-radius:10px; background:var(--magic-pink); opacity:0.5; margin:0 auto;"></div></div>
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px;">
            <div id="f-artwork-container">
                <img id="f-img">
                <div id="f-lyrics-view" onclick="toggleLyrics()"></div>
            </div>
            
            <div style="width:100%; margin-top:60px; display:flex; justify-content:space-between; align-items:flex-end;">
                <div style="flex:1; overflow:hidden; padding-right:20px;">
                    <div id="f-title" style="font-size:28px; font-weight:900; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:0.04em;"></div>
                    <div id="f-artist" style="font-size:18px; color:var(--text-bright); margin-top:8px; font-weight:700;"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="f-lyric-btn" onclick="toggleLyrics()" style="background:rgba(255,255,255,0.6); border:none; color:var(--text-bright); border-radius:14px; font-size:18px; width:48px; height:48px; box-shadow:0 4px 10px rgba(0,0,0,0.05);"><i class="fa-solid fa-quote-right"></i></button>
                    <button onclick="toggleQueue()" style="background:rgba(255,255,255,0.6); border:none; color:var(--text-bright); border-radius:14px; font-size:18px; width:48px; height:48px; box-shadow:0 4px 10px rgba(0,0,0,0.05);"><i class="fa-solid fa-list-ul"></i></button>
                </div>
            </div>
            
            <input type="range" class="seeker" id="seeker" value="0" step="0.1" oninput="audio.currentTime=this.value">
            <div style="width:100%; display:flex; justify-content:space-between; color:var(--text-bright); font-size:12px; font-weight:800; letter-spacing:0.08em;">
                <span id="cur-time">0:00</span><span id="dur-time">0:00</span>
            </div>

            <div style="display:flex; width:100%; justify-content:space-between; align-items:center; margin-top:55px;">
                <button onclick="toggleShuffle()" id="btn-shuffle" style="background:none; border:none; font-size:22px; color:var(--text-bright); opacity:0.4;"><i class="fa-solid fa-shuffle"></i></button>
                <div style="display:flex; align-items:center; gap:48px;">
                    <i class="fa-solid fa-backward-step" style="font-size:30px; color:var(--text-main);" onclick="prev()"></i>
                    <i id="f-pp" class="fa-solid fa-play magic-btn-glow" style="font-size:64px; color:var(--text-bright); filter: drop-shadow(0 0 15px rgba(255,126,185,0.4));" onclick="togglePlay()"></i>
                    <i class="fa-solid fa-forward-step" style="font-size:30px; color:var(--text-main);" onclick="next()"></i>
                </div>
                <button onclick="toggleRepeat()" id="btn-repeat" style="background:none; border:none; font-size:22px; color:var(--text-bright); opacity:0.4; position:relative;"><i class="fa-solid fa-repeat"></i><span id="repeat-badge" style="display:none; position:absolute; top:-8px; right:-10px; background:var(--text-bright); color:#fff; border-radius:50%; width:18px; height:18px; font-size:10px; text-align:center; line-height:18px; font-weight:900; border:2px solid #fff;">1</span></button>
            </div>
        </div>

        <div class="queue-panel" id="queue-panel">
            <div style="padding:25px 30px; border-bottom:2px solid var(--key-color); display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:19px; font-weight:900; color:var(--text-main);">Next Magic</h3>
                <button onclick="toggleQueue()" style="background:var(--magic-pink); border:none; font-size:14px; color:#fff; font-weight:800; padding:10px 22px; border-radius:18px; box-shadow:0 4px 12px rgba(255,183,197,0.4);">Close</button>
            </div>
            <div id="queue-list" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="header">
            <div class="header-top">
                <button onclick="closeEdit()">Cancel</button>
                <h2 style="font-size:17px; color:var(--text-main);">Magic Details</h2>
                <button onclick="saveEdit()" style="color:var(--text-bright); font-weight:900;">Save</button>
            </div>
        </div>
        <div class="modal-body">
            <span class="field-label">Song Title</span>
            <input type="text" id="edit-name" class="edit-input" placeholder="e.g. Pure Wish">
            
            <span class="field-label">Artist Name</span>
            <input type="text" id="edit-artist" class="edit-input" placeholder="Artist" oninput="updateArtistSuggest(this.value)">
            <div id="artist-quick-select" style="margin-bottom: 25px;"></div>
            
            <span class="field-label">Release Year</span>
            <input type="text" id="edit-year" class="edit-input" placeholder="2026">
            
            <span class="field-label">Lyrics</span>
            <textarea id="edit-lyrics" class="edit-input" style="height:250px; resize:none; font-family:inherit; line-height:1.7;" placeholder="Write lyrics..."></textarea>
        </div>
    </div>

    <div id="pl-edit-modal" class="modal">
        <div class="header">
            <div class="header-top">
                <button onclick="closePlEdit()">Cancel</button>
                <h2 style="font-size:17px; color:var(--text-main);">Stage Settings</h2>
                <button onclick="savePlEdit()" style="color:var(--text-bright); font-weight:900;">Done</button>
            </div>
        </div>
        <div class="modal-body" style="text-align:center; padding-top:40px;">
            <div style="position:relative; display:inline-block; margin-bottom:40px;">
                <img id="pl-edit-img" style="width:220px; height:220px; border-radius:45px; object-fit:cover; background:#fef4f7; border:8px solid #fff; box-shadow:0 30px 60px rgba(255,182,197,0.2); cursor:pointer;" onclick="document.getElementById('pl-img-input').click()">
                <div style="position:absolute; bottom:15px; right:15px; background:var(--magic-pink); width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 15px rgba(255,183,197,0.4); pointer-events:none; border:3px solid #fff;">
                    <i class="fa-solid fa-wand-sparkles" style="font-size:18px; color:#fff;"></i>
                </div>
            </div>
            <input type="file" id="pl-img-input" style="display:none" onchange="previewPlImg(event)">
            
            <div style="text-align:left;">
                <span class="field-label">Stage Name</span>
                <input type="text" id="pl-edit-name" class="edit-input">
                <span class="field-label">Magic Tag</span>
                <input type="text" id="pl-edit-tag" class="edit-input" placeholder="#Favorite">
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active magic-btn-glow" id="tab-artist" onclick="switchTab('artists')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Artists</span></button>
        <button class="tab-item magic-btn-glow" id="tab-lib" onclick="switchTab('library')"><i class="fa-solid fa-gem"></i><span>Library</span></button>
        <button class="tab-item magic-btn-glow" id="tab-play" onclick="switchTab('playlist')"><i class="fa-solid fa-heart"></i><span>Stage</span></button>
    </div>

    <input type="file" id="audio-upload" multiple style="display:none">
    <input type="file" id="artist-icon-upload" style="display:none" accept="image/*" onchange="saveArtistIcon(event)">
    <audio id="audio-element"></audio>

    <script>
        let db, tracks = [], playlists = [], artistMeta = {}, isEditing = false, currentView = 'artists', currentArtist = null, currentPlaylistId = null;
        let playingTracks = [], currentTrackIdx = -1, isShuffle = false, repeatMode = 0; 
        let historyTracks = []; 
        let editingId = null, editingPlId = null, tempPlImg = null, editingArtistName = null;
        const audio = document.getElementById('audio-element');

        const req = indexedDB.open("MusicStudioWishcore_V4", 3);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
            if(!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", {keyPath:"name"});
        };
        req.onsuccess = (e) => { db = e.target.result; loadAll(); };

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            tx.objectStore("songs").getAll().onsuccess = (e) => { tracks = e.target.result; render(); };
            tx.objectStore("playlists").getAll().onsuccess = (e) => { playlists = e.target.result; render(); };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => { 
                artistMeta = {}; 
                e.target.result.forEach(m => artistMeta[m.name] = m.icon);
                render();
            };
        }

        function sortList(list, type) {
            if (type === 'name_asc') return list.sort((a,b) => (a.name||'').localeCompare(b.name||'','ja'));
            if (type === 'name_desc') return list.sort((a,b) => (b.name||'').localeCompare(a.name||'','ja'));
            if (type === 'year') return list.sort((a,b) => (b.year||'').toString().localeCompare((a.year||'').toString()));
            return list;
        }

        function render() {
            const display = document.getElementById('main-display');
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-type').value;

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if(tabEl) tabEl.classList.add('active');

            if (currentArtist) rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            else rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';

            if (currentView === 'library') {
                title.innerText = "Library"; display.className = "grid";
                let list = tracks.filter(t => t.name.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search));
                list = sortList(list, sort);
                display.innerHTML = list.map(t => `
                    <div class="card ${isEditing?'editing':''}" onclick="isEditing?openEdit(${t.id}):playSong(${t.id},'lib')">
                        <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash"></i></div>
                        <img src="${t.cover||''}" class="card-img">
                        <div class="card-info">
                            <div class="card-title">${t.name}</div>
                            <div class="card-sub">${t.artist} ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                        </div>
                    </div>`).join('');
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    title.innerText = "Artists"; display.className = "";
                    let artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(search));
                    artists.sort((a,b) => sort === 'name_desc' ? b.localeCompare(a,'ja') : a.localeCompare(b,'ja'));

                    display.innerHTML = artists.map(a => {
                        const icon = artistMeta[a] ? `<img src="${artistMeta[a]}" class="artist-icon">` : `<div class="artist-icon"><i class="fa-solid fa-user"></i></div>`;
                        return `<div class="list-item" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')">
                                <div class="artist-icon-container">${icon}</div>
                                <div style="font-weight:800; font-size:17px; color:var(--text-main);">${a}</div>
                                <i class="fa-solid fa-star" style="margin-left:auto; font-size:12px; color:var(--magic-pink); opacity:0.5;"></i>
                            </div>`;
                    }).join('');
                } else {
                    title.innerText = currentArtist; display.className = "grid";
                    let list = tracks.filter(t => t.artist === currentArtist);
                    list = sortList(list, sort);
                    display.innerHTML = list.map(t => `
                        <div class="card" onclick="playSong(${t.id},'art')">
                            <img src="${t.cover||''}" class="card-img">
                            <div class="card-info">
                                <div class="card-title">${t.name}</div>
                                <div class="card-sub">Artist ${t.year ? `<span class="card-year">${t.year}</span>`:''}</div>
                            </div>
                        </div>`).join('');
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    title.innerText = "Stage"; display.className = "grid";
                    let list = playlists.filter(p => p.name.toLowerCase().includes(search) || (p.tag && p.tag.toLowerCase().includes(search)));
                    list = sortList(list, sort);
                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        return `<div class="card ${isEditing?'editing':''}" onclick="isEditing?openPlEdit(${p.id}):openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-xmark"></i></div>
                            <div style="position:relative;">
                                <img src="${p.cover || (firstSong?firstSong.cover:'')}" class="card-img">
                                <div style="position:absolute; inset:0; border-radius:32px; background:linear-gradient(to top, rgba(255,182,197,0.2), transparent);"></div>
                            </div>
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                ${p.tag?`<div class="card-tag">${p.tag}</div>`:''}
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    title.innerText = pl.name; display.className = "";
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    display.innerHTML = plSongs.map(t => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})" style="background:var(--key-color); color:var(--text-bright);">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')"
                                 ontouchstart="handleTouchStart(event, ${t.id})" ontouchmove="handleTouchMove(event, ${t.id})" ontouchend="handleTouchEnd(event, ${t.id})">
                                <img src="${t.cover||''}">
                                <div>
                                    <div style="font-weight:800; font-size:15px; color:var(--text-main);">${t.name}</div>
                                    <div style="font-size:12px; color:var(--sub-text); margin-top:4px; font-weight:700;">${t.artist} ${t.year?`· ${t.year}`:''}</div>
                                </div>
                            </div>
                        </div>`).join('') + 
                        `<div style="padding:60px 20px; text-align:center;"><button onclick="openBulkAddModal()" style="background:linear-gradient(135deg, #fff, var(--key-color)); color:var(--text-bright); border:none; padding:18px 45px; border-radius:35px; font-weight:900; font-size:13px; box-shadow: 0 15px 35px rgba(255,182,197,0.3); border:2px solid #fff;">+ Add More Magic</button></div>`;
                }
            }
            document.getElementById('left-btn').innerText = (currentArtist || currentPlaylistId) ? "Back" : (isEditing ? "Done" : "Edit");
        }

        // --- Core Music Logic ---
        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { loadTrack(playingTracks[currentTrackIdx]); return; }
            let nextIdx = currentTrackIdx + 1;
            if (nextIdx >= playingTracks.length) {
                if (repeatMode === 1) nextIdx = 0; 
                else { audio.pause(); audio.currentTime = 0; return; }
            }
            currentTrackIdx = nextIdx; loadTrack(playingTracks[currentTrackIdx]);
        }
        function prev() { 
            if (audio.currentTime > 3) audio.currentTime = 0;
            else { currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; loadTrack(playingTracks[currentTrackIdx]); }
        }
        function playSong(id, mode) {
            let original = [];
            if(mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
            }
            else if(mode === 'art') original = tracks.filter(tx => tx.artist === currentArtist);
            else original = [...tracks];
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        function loadTrack(t) {
            if(!t) return;
            if(currentTrackIdx !== -1 && !historyTracks.some(h => h.id === t.id)) {
                historyTracks.unshift(t); if(historyTracks.length > 20) historyTracks.pop();
            }
            if(audio.src) URL.revokeObjectURL(audio.src);
            audio.src = URL.createObjectURL(t.data);
            document.getElementById('m-img').src = t.cover || ''; document.getElementById('m-title').innerText = t.name;
            document.getElementById('f-img').src = t.cover || ''; document.getElementById('f-title').innerText = t.name; document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-lyrics-view').classList.remove('active');
            document.getElementById('f-img').style.opacity = "1";
            document.getElementById('f-artwork-container').style.transform = "scale(1)";
            audio.play(); renderQueue();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; }
        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function toggleLyrics() {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            document.getElementById('f-img').style.opacity = isActive ? "0.05" : "1";
            document.getElementById('f-artwork-container').style.transform = isActive ? "scale(1.04)" : "scale(1)";
            if(isActive) view.innerText = playingTracks[currentTrackIdx]?.lyrics || "...";
        }

        // --- Edit Logic ---
        function openEdit(id) { 
            editingId = id; const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            document.getElementById('edit-artist').value = t.artist; 
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(t.artist);
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = document.getElementById('edit-artist').value; 
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => { closeEdit(); loadAll(); }; 
        }
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }

        function openPlEdit(id) { editingPlId = id; const pl = playlists.find(p => p.id === id); document.getElementById('pl-edit-name').value = pl.name; document.getElementById('pl-edit-tag').value = pl.tag || ""; tempPlImg = pl.cover; document.getElementById('pl-edit-img').src = tempPlImg || ""; document.getElementById('pl-edit-modal').style.display = 'flex'; }
        function savePlEdit() { const pl = playlists.find(p => p.id === editingPlId); pl.name = document.getElementById('pl-edit-name').value; pl.tag = document.getElementById('pl-edit-tag').value; pl.cover = tempPlImg; db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { closePlEdit(); loadAll(); }; }
        function closePlEdit() { document.getElementById('pl-edit-modal').style.display = 'none'; }
        function previewPlImg(e) { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { tempPlImg = ev.target.result; document.getElementById('pl-edit-img').src = tempPlImg; }; r.readAsDataURL(f); } }

        function handleHeaderRight() { 
            if(currentArtist) {
                const artTracks = tracks.filter(t => t.artist === currentArtist);
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art');
            }
            else if(currentPlaylistId) openBulkAddModal();
            else if(currentView==='library') document.getElementById('audio-upload').click(); 
            else if(currentView==='playlist') {
                const n = prompt("New Stage Name:");
                if(n) db.transaction("playlists","readwrite").objectStore("playlists").add({ name: n, songIds: [], tag: "", cover: null }).onsuccess = loadAll;
            } 
        }

        function handleHeaderLeft() { 
            if(currentArtist) currentArtist=null; 
            else if(currentPlaylistId) { if(isEditing) isEditing=false; else currentPlaylistId=null; } 
            else isEditing=!isEditing; 
            render(); 
        }

        function switchTab(v) { currentView=v; currentArtist=null; currentPlaylistId=null; isEditing=false; render(); }
        function openArtist(n) { currentArtist=n; render(); }
        function openPlaylist(id) { currentPlaylistId=id; render(); }
        function openFull() { document.getElementById('full').classList.add('active'); }
        function closeFull() { document.getElementById('full').classList.remove('active'); }
        function toggleQueue() { document.getElementById('queue-panel').classList.toggle('open'); renderQueue(); }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            let html = "";
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if (nextTracks.length > 0) {
                html += `<div style="padding:20px 30px; font-size:11px; font-weight:900; color:var(--text-bright); letter-spacing:0.15em;">NEXT STAGE</div>`;
                html += nextTracks.map((t, i) => `<div class="list-item" onclick="jumpToQueue(${currentTrackIdx + 1 + i})"><img src="${t.cover||''}" style="width:48px; height:48px;"><div><div style="font-weight:800; font-size:15px; color:var(--text-main);">${t.name}</div><div style="font-size:12px; color:var(--sub-text);">${t.artist}</div></div></div>`).join('');
            }
            if (historyTracks.length > 0) {
                html += `<div style="padding:20px 30px; font-size:11px; font-weight:900; color:var(--sub-text); letter-spacing:0.15em;">PAST ECHOES</div>`;
                html += historyTracks.map(t => `<div class="list-item" onclick="loadTrackById(${t.id})"><img src="${t.cover||''}" style="width:48px; height:48px; opacity:0.4;"><div><div style="font-weight:700; font-size:15px; color:#aaa;">${t.name}</div><div style="font-size:12px; color:#ccc;">${t.artist}</div></div></div>`).join('');
            }
            list.innerHTML = html || `<div style="padding:100px; text-align:center; color:var(--key-color); font-weight:800;">Silent night...</div>`;
        }

        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div'); div.id="bulk-modal"; div.className="modal active";
            let html = `<div class="header"><div class="header-top"><button onclick="this.closest('.modal').remove()">Cancel</button><h2 style="color:var(--text-main);">Collect Magic</h2><button onclick="saveBulkAdd()" style="font-weight:900; color:var(--text-bright);">Done</button></div></div>`;
            html += `<div class="search-container"><input type="text" placeholder="Filter magic..." oninput="filterBulk(this.value)"></div>`;
            html += `<div id="bulk-list" style="flex:1; overflow-y:auto; padding-bottom:100px; background:linear-gradient(to bottom, #fff, #fff9fb);">`;
            html += tracks.map(t => `
                <label class="check-item" data-search="${t.name.toLowerCase()} ${t.artist.toLowerCase()}">
                    <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id)?'checked':''}>
                    <img src="${t.cover||''}" style="width:54px; height:54px; border-radius:16px; margin-right:18px; border:2px solid #fff; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                    <div><b style="color:var(--text-main); font-size:15px; font-weight:800;">${t.name}</b><br><span style="font-size:12px; color:var(--sub-text); font-weight:700;">${t.artist}</span></div>
                </label>`).join('');
            html += `</div>`;
            div.innerHTML = html; document.body.appendChild(div);
        }
        function saveBulkAdd() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            pl.songIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value));
            db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => { document.getElementById('bulk-modal').remove(); loadAll(); };
        }
        function filterBulk(val) { const v = val.toLowerCase(); document.querySelectorAll('#bulk-list .check-item').forEach(el => { el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none'; }); }

        function jumpToQueue(idx) { currentTrackIdx = idx; loadTrack(playingTracks[idx]); }
        function loadTrackById(id) { const t = tracks.find(x => x.id === id); if(t) loadTrack(t); }

        let touchStartX = 0;
        function handleTouchStart(e, id) { if(isEditing) return; touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            if (moveX < 0) { el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; el.style.transition = "none"; }
        }
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`);
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.5s cubic-bezier(0.15, 0, 0.15, 1)";
            el.style.transform = moveX < -50 ? `translateX(-85px)` : `translateX(0)`;
        }

        function updateArtistSuggest(val) {
            const container = document.getElementById('artist-quick-select');
            const artists = [...new Set(tracks.map(t => t.artist))].filter(a => a.toLowerCase().includes(val.toLowerCase())).sort();
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist').value='${a}'">${a}</div>`).join('');
        }
        function selectArtistIcon(name) { editingArtistName = name; document.getElementById('artist-icon-upload').click(); }
        function saveArtistIcon(e) {
            const f = e.target.files[0];
            if(f && editingArtistName) {
                const r = new FileReader();
                r.onload = (ev) => { db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({name: editingArtistName, icon: ev.target.result}).onsuccess = loadAll; };
                r.readAsDataURL(f);
            }
        }
        function deleteSong(id) { if(confirm("Discard this magic?")) db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess=loadAll; }
        function deletePlaylist(id) { if(confirm("Delete this stage?")) db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess=loadAll; }
        function removeTrackFromPlaylist(sid) { const pl = playlists.find(p => p.id === currentPlaylistId); pl.songIds = pl.songIds.filter(id => id !== sid); db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; }

        audio.onended = () => { if(repeatMode === 2) { audio.currentTime = 0; audio.play(); } else { next(); } };
        audio.onplay = () => { document.getElementById('m-pp').className = 'fa-solid fa-pause'; document.getElementById('f-pp').className = 'fa-solid fa-pause'; };
        audio.onpause = () => { document.getElementById('m-pp').className = 'fa-solid fa-play'; document.getElementById('f-pp').className = 'fa-solid fa-play'; };
        audio.ontimeupdate = () => { if(!isNaN(audio.duration)){ const s = document.getElementById('seeker'); s.max = audio.duration; s.value = audio.currentTime; document.getElementById('cur-time').innerText = formatTime(audio.currentTime); document.getElementById('dur-time').innerText = formatTime(audio.duration); } };
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; if (files.length === 0) return;
            const tx = db.transaction("songs", "readwrite");
            const store = tx.objectStore("songs");
            for (let f of files) {
                jsmediatags.read(f, { onSuccess: (tag) => {
                    let c = null; if(tag.tags.picture){
                        let d = tag.tags.picture.data, s = ""; for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                        c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                    }
                    store.add({ name: tag.tags.title || f.name, artist: tag.tags.artist || "Unknown", year: tag.tags.year || "", cover: c, data: f, lyrics: "" });
                }});
            }
            tx.oncomplete = () => { setTimeout(loadAll, 600); };
        };
    </script>
</body>
</html>
