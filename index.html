        let draggedMemIndex = -1;
        function handleDragStart(e, i) {
            draggedMemIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        function handleDragOver(e, i) { 
            e.preventDefault(); 
            e.dataTransfer.dropEffect = 'move'; 
        }
        function handleDrop(e, i) {
            e.stopPropagation();
            if (draggedMemIndex !== i && draggedMemIndex !== -1) {
                let temp = currentMembersEdit[draggedMemIndex];
                currentMembersEdit.splice(draggedMemIndex, 1);
                currentMembersEdit.splice(i, 0, temp);
                renderArtistSetup();
            }
        }
        function handleDragEnd(e) { 
            e.target.classList.remove('dragging'); 
            draggedMemIndex = -1; 
        }

        function openSyncModal(i) {
            currentSyncIndex = i;
            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                const firstSong = tracks.find(t => getAllTrackArtistNames(t).includes(a));
                const iconSrc = (artistMeta[a] && artistMeta[a].icon) ? artistMeta[a].icon : (firstSong && firstSong.cover ? firstSong.cover : '');
                let imgHtml = iconSrc ? `<img src="${iconSrc}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }

        function linkArtistMember(a) {
            if (currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if (a) {
                    currentMembersEdit[currentSyncIndex].name = a; // Auto-fill name
                    if (artistMeta[a] && artistMeta[a].members && artistMeta[a].members.length > 0) {
                        currentMembersEdit[currentSyncIndex].color = artistMeta[a].members[0].color; // Pull color if exists
                    }
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if (newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                let tracksChanged = false;
                
                tracks.forEach(t => {
                    let changed = false;
                    if (t.artists) {
                        t.artists.forEach(art => {
                            if (art.name === oldName) {
                                art.name = newName;
                                changed = true;
                            }
                        });
                    }
                    if (changed) { 
                        store.put(t); 
                        tracksChanged = true; 
                    }
                });
                
                if (currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                if (tracksChanged) {
                    tx.oncomplete = loadAll; 
                } else {
                    loadAll();
                }

            } else {
                let meta = artistMeta[oldName] || { name: oldName };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        // ------------------ Lyric Painter (Time & Color) ------------------

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if (!t) return;
            
            let allMembers = [];
            // Gather members from Main artists only
            if (t.artists) {
                t.artists.forEach(a => {
                    if (a.type === 'main') {
                        let trimA = a.name.trim();
                        if (artistMeta[trimA] && artistMeta[trimA].members) {
                            allMembers = allMembers.concat(artistMeta[trimA].members);
                        }
                    }
                });
            }

            currentPaintMembers = [];
            currentLyricData = t.lyricData ? JSON.parse(JSON.stringify(t.lyricData)) : [];
            
            const pal = document.getElementById('paint-palette');
            let palHtml = allMembers.map(m => `
                <div onclick="togglePaintMember('${m.name}', '${m.color}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div id="pal-icon-${m.name}" style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color ? m.color : 'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');
            
            palHtml += `
                <div onclick="currentPaintMembers=[] ; updatePaletteUI()" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px;">
                    <div style="width:30px; height:30px; border-radius:50%; background:transparent; border:2px dashed var(--icon-color); display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-eraser"></i></div>
                    <span style="font-size:10px; margin-top:4px; width:100%; text-align:center;">Clear</span>
                </div>`;
            
            pal.innerHTML = palHtml;
            updatePaletteUI();
            renderPaintLyrics();
            
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function togglePaintMember(name, color) {
            const idx = currentPaintMembers.findIndex(x => x.name === name);
            if (idx > -1) {
                currentPaintMembers.splice(idx, 1);
            } else {
                currentPaintMembers.push({ name, color });
            }
            updatePaletteUI();
        }

        function updatePaletteUI() {
            document.querySelectorAll('[id^="pal-icon-"]').forEach(el => {
                let mName = el.id.replace('pal-icon-', '');
                if (currentPaintMembers.some(x => x.name === mName)) {
                    el.style.transform = 'scale(1.2)';
                    el.style.borderWidth = '3px';
                } else {
                    el.style.transform = 'scale(1)';
                    el.style.borderWidth = '2px';
                }
            });
        }

        function renderPaintLyrics() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricData.map((line, i) => {
                let badgeHtml = '';
                if (line.members && line.members.length > 0) {
                    badgeHtml = line.members.map(m => `<span style="background:${m.color}; color:#fff; font-size:9px; padding:2px 5px; border-radius:10px; font-weight:bold;">${m.name}</span>`).join(' ');
                }

                return `
                <div style="padding:15px; border-radius:12px; background:var(--glass); border:1px solid var(--border-color); display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:10px; width:60%;">
                            <input type="number" step="0.1" value="${line.time}" class="edit-input" style="padding:8px; margin:0; width:80px; font-size:13px;" onchange="currentLyricData[${i}].time=parseFloat(this.value)" onkeydown="if(event.key==='Enter') document.getElementById('time-input-${i+1}')?.focus()" id="time-input-${i}">
                            <button onclick="currentLyricData[${i}].time = parseFloat(audio.currentTime.toFixed(1)); renderPaintLyrics();" style="background:var(--icon-color); color:#fff; border:none; border-radius:8px; padding:8px 12px; font-size:10px; font-weight:bold; white-space:nowrap;">Current</button>
                        </div>
                        <button onclick="applyPaintToLyric(${i})" style="background:transparent; border:2px solid var(--icon-color); color:var(--icon-color); padding:5px 10px; border-radius:10px; font-size:10px; font-weight:800;">Set Color</button>
                        <i class="fa-solid fa-xmark" style="color:var(--del-color); cursor:pointer; padding:5px;" onclick="removeLyricLine(${i})"></i>
                    </div>
                    <textarea class="edit-input" style="margin:0; padding:10px; font-size:14px; height:50px; resize:none;" oninput="currentLyricData[${i}].text=this.value">${line.text}</textarea>
                    <div style="min-height:15px; display:flex; gap:5px; flex-wrap:wrap;">${badgeHtml}</div>
                </div>
            `;
            }).join('');
        }

        function addLyricLine() {
            currentLyricData.push({ time: parseFloat(audio.currentTime.toFixed(1)), text: '', members: [] });
            renderPaintLyrics();
            setTimeout(() => {
                const els = document.querySelectorAll('[id^="time-input-"]');
                if (els.length > 0) els[els.length - 1].focus();
            }, 50);
        }

        function removeLyricLine(i) {
            currentLyricData.splice(i, 1);
            renderPaintLyrics();
        }

        function applyPaintToLyric(i) {
            currentLyricData[i].members = JSON.parse(JSON.stringify(currentPaintMembers));
            renderPaintLyrics();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            
            // Sort by time
            t.lyricData.sort((a, b) => a.time - b.time);
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        // ------------------ File Imports & UX Events ------------------

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if (tag.tags.picture) {
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for (let i = 0; i < d.length; i++) {
                                s += String.fromCharCode(d[i]);
                            }
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artists: [{name: tag.tags.artist || "Unknown", type: 'main'}], 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artists: [{name: "Unknown", type: 'main'}], 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        
        function handleTouchStart(e, id) { 
            if (isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }

        function handleTouchMove(e, id) {
            if (isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if (btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }

        function handleTouchEnd(e, id) {
            if (isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if (!el) return;
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            if (moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if (btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if (btn) btn.style.opacity = 0;
            }
        }

        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            if (nextTracks.length === 0) {
                list.innerHTML = '<div style="padding:50px; text-align:center; color:#ccc;">Queue is empty</div>';
            } else {
                list.innerHTML = nextTracks.map((t, i) => `
                <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx + 1 + i}; loadTrack(playingTracks[currentTrackIdx])">
                    <img src="${t.cover || ''}" style="width:40px; height:40px;">
                    <div>
                        <div style="font-weight:800;">${t.name}</div>
                        <div style="font-size:11px; color:var(--icon-color);">${formatTrackArtists(t)}</div>
                    </div>
                </div>`).join('');
            }
        }

        window.onload = initApp;

    </script>
</body>
</html>
