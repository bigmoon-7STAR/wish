            let artists = getAllArtists();
            const body = document.getElementById('artist-sync-body');
            body.innerHTML = artists.map(a => {
                let icon = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : ``;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${icon}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        
        function linkArtistMember(a) {
            if(currentSyncIndex !== -1) {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                
                if(a && artistMeta[editingArtistSetupName]) {
                    currentMembersEdit[currentSyncIndex].name = a;
                }
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() {
            let newName = document.getElementById('setup-artist-name').value.trim();
            let oldName = editingArtistSetupName;
            
            if(newName && newName !== oldName) {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false, members: [] };
                meta.name = newName;
                meta.members = currentMembersEdit;
                
                delete artistMeta[oldName];
                artistMeta[newName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);

                let tx = db.transaction("songs", "readwrite");
                let store = tx.objectStore("songs");
                
                tracks.forEach(t => {
                    let arts = parseArtistString(t.artist);
                    let changed = false;
                    for(let i=0; i<arts.length; i++) { 
                        if(arts[i].name === oldName) { 
                            arts[i].name = newName; 
                            changed = true; 
                        } 
                    }
                    if(changed) { 
                        t.artist = stringifyArtistArray(arts); 
                        store.put(t); 
                    }
                });
                
                if(currentArtist === oldName) currentArtist = newName;
                document.getElementById('artist-setup-modal').style.display = 'none';
                tx.oncomplete = loadAll;
            } else {
                let meta = artistMeta[oldName] || { name: oldName, favorite: false };
                meta.members = currentMembersEdit;
                artistMeta[oldName] = meta;
                
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => {
                    document.getElementById('artist-setup-modal').style.display = 'none';
                    loadAll();
                };
            }
        }

        // --- Lyrics Edit & Paint Features ---
        
        function openLyricEditor() {
            const t = playingTracks[currentTrackIdx];
            if(!t) return;
            
            currentLyricData = t.lyricData ? JSON.parse(JSON.stringify(t.lyricData)) : [];
            renderLyricTimingList();
            document.getElementById('lyric-editor-modal').style.display = 'flex';
        }

        function renderLyricTimingList() {
            const container = document.getElementById('lyric-timing-list');
            container.innerHTML = currentLyricData.map((ld, i) => `
                <div style="display:flex; gap:10px; align-items:center; background:var(--card-bg); padding:10px; border-radius:12px;">
                    <button onclick="setTimingToCurrent(${i})" style="padding:10px; border-radius:10px; border:none; background:var(--accent-blue); color:var(--icon-active); font-weight:900;"><i class="fa-solid fa-clock"></i></button>
                    <input type="number" step="0.1" value="${ld.time}" onchange="currentLyricData[${i}].time=parseFloat(this.value)" class="edit-input" style="width:70px; margin-bottom:0; padding:10px; font-size:12px;" onkeydown="checkEnterForNext(event, ${i})">
                    <input type="text" value="${ld.text}" oninput="currentLyricData[${i}].text=this.value" class="edit-input" style="flex:1; margin-bottom:0; padding:10px;">
                    <button onclick="removeLyricLine(${i})" style="background:none; border:none; color:var(--del-color);"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function checkEnterForNext(e, i) {
            if(e.key === 'Enter') {
                e.preventDefault();
                const inputs = document.querySelectorAll('#lyric-timing-list input[type="number"]');
                if(i + 1 < inputs.length) {
                    inputs[i+1].focus();
                }
            }
        }

        function setTimingToCurrent(i) {
            currentLyricData[i].time = parseFloat(audio.currentTime.toFixed(1));
            renderLyricTimingList();
        }

        function addLyricLine() {
            currentLyricData.push({ time: 0, text: '', colors: [] });
            renderLyricTimingList();
        }

        function removeLyricLine(i) {
            currentLyricData.splice(i, 1);
            renderLyricTimingList();
        }

        function batchInsertLyrics() {
            const text = prompt("Paste lyrics here. Each line will become a measure.");
            if(!text) return;
            
            const lines = text.split('\n');
            lines.forEach(l => {
                const tr = l.trim();
                if(tr) {
                    currentLyricData.push({ time: 0, text: tr, colors: [] });
                }
            });
            renderLyricTimingList();
        }

        function saveLyricTiming() {
            currentLyricData.sort((a,b) => a.time - b.time);
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-editor-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        function openLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            if(!t || !t.lyricData || t.lyricData.length === 0) {
                alert("Please add lyrics timings first via Edit.");
                return;
            }
            
            let allMembers = [];
            parseArtistString(t.artist).forEach(a => {
                if(artistMeta[a.name] && artistMeta[a.name].members) {
                    allMembers = allMembers.concat(artistMeta[a.name].members);
                }
            });

            currentLyricData = JSON.parse(JSON.stringify(t.lyricData));
            currentPaintMembers = [];
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = allMembers.map((m, i) => `
                <div onclick="togglePaintMember(${i}, '${m.color}')" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:50px;">
                    <div id="paint-mem-icon-${i}" class="lyric-paint-member-icon" style="background:${m.color || '#ccc'};"></div>
                    <span style="font-size:10px; margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center; font-weight:800;">${m.name}</span>
                </div>
            `).join('') + `
                <div onclick="clearPaintMembers()" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:50px;">
                    <div class="lyric-paint-member-icon" style="background:#fff; display:flex; align-items:center; justify-content:center; color:var(--icon-color);"><i class="fa-solid fa-eraser"></i></div>
                    <span style="font-size:10px; margin-top:5px; font-weight:800;">Clear</span>
                </div>
            `;

            renderPaintLyricsList();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }

        function togglePaintMember(i, color) {
            const icon = document.getElementById(`paint-mem-icon-${i}`);
            if(currentPaintMembers.includes(color)) {
                currentPaintMembers = currentPaintMembers.filter(c => c !== color);
                icon.classList.remove('selected');
            } else {
                currentPaintMembers.push(color);
                icon.classList.add('selected');
            }
        }

        function clearPaintMembers() {
            currentPaintMembers = [];
            document.querySelectorAll('.lyric-paint-member-icon').forEach(el => el.classList.remove('selected'));
        }

        function renderPaintLyricsList() {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricData.map((ld, i) => {
                let colStyle = "";
                if(ld.colors && ld.colors.length > 0) {
                    if(ld.colors.length === 1) {
                        colStyle = `color: ${ld.colors[0]}; border-left: 6px solid ${ld.colors[0]};`;
                    } else {
                        colStyle = `background: linear-gradient(90deg, ${ld.colors.join(', ')}); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; border-left: 6px solid ${ld.colors[0]};`;
                    }
                }
                
                return `
                <div onclick="applyLyricColor(${i})" style="padding:15px; border-radius:12px; background:var(--input-bg); cursor:pointer; font-weight:900; text-align:center; ${colStyle}">
                    ${ld.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}
                </div>
            `;
            }).join('');
        }

        function applyLyricColor(i) {
            currentLyricData[i].colors = [...currentPaintMembers];
            renderPaintLyricsList();
        }

        function saveLyricPaint() {
            const t = playingTracks[currentTrackIdx];
            t.lyricData = currentLyricData;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                loadAll();
                if(document.getElementById('f-lyrics-view').classList.contains('active')) {
                    document.getElementById('f-lyrics-view').classList.remove('active');
                    toggleLyrics();
                }
            };
        }

        // --- File Upload & Touch Handlers ---

        document.getElementById('audio-upload').onchange = (e) => {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let f of files) {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => {
                        let c = null; 
                        if(tag.tags.picture){
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: tag.tags.artist || "Unknown", 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyricData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => {
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: "Unknown", 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyricData: [], 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        let touchStartX = 0;
        
        function handleTouchStart(e, id) { 
            if(isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }
        
        function handleTouchMove(e, id) {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (el && moveX < 0) { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        
        function handleTouchEnd(e, id) {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            if(!el) return;
            
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            
            if(moveX < -40) {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } else {
                el.style.transform = `translateX(0)`;
                if(btn) btn.style.opacity = 0;
            }
        }
        
        function toggleQueue() { 
            document.getElementById('queue-panel').classList.toggle('open'); 
            renderQueue(); 
        }
        
        function renderQueue() {
            const list = document.getElementById('queue-list');
            const nextTracks = playingTracks.slice(currentTrackIdx + 1);
            
            if(nextTracks.length === 0) {
                list.innerHTML = '<div style="padding:50px; text-align:center; color:#ccc; font-weight:800;">Queue is empty</div>';
            } else {
                list.innerHTML = nextTracks.map((t, i) => `
                    <div class="list-item" onclick="currentTrackIdx=${currentTrackIdx+1+i}; loadTrack(playingTracks[currentTrackIdx])">
                        <img src="${t.cover||''}" style="width:40px; height:40px;">
                        <div style="flex:1;">
                            <div style="font-weight:800; font-size:14px;">${t.name}</div>
                            <div style="font-size:11px; color:var(--icon-color);">${parseArtistString(t.artist).map(a=>a.name).join(', ')}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        // Initialize once DOM is ready
        window.onload = initApp;

    </script>
</body>
</html>
