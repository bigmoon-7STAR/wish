        function editArtistNamePrompt(oldName)
        {
            let newName = prompt("Edit Artist Name:", oldName);
            if(newName && newName !== oldName && newName.trim().length > 0)
            {
                newName = newName.trim();
                
                // update meta
                let meta = artistMeta[oldName];
                if(meta)
                {
                    meta.name = newName;
                    delete artistMeta[oldName];
                    artistMeta[newName] = meta;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(oldName);
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta);
                }
                
                // update tracks
                const tx = db.transaction("songs", "readwrite");
                const store = tx.objectStore("songs");
                tracks.forEach(t => 
                {
                    let comp = parseArtistsComplex(t.artist);
                    let changed = false;
                    comp.forEach(c => {
                        if(c.name === oldName) {
                            c.name = newName;
                            changed = true;
                        }
                    });
                    if(changed)
                    {
                        t.artist = stringifyArtistsComplex(comp);
                        store.put(t);
                    }
                });
                
                // update member links
                Object.values(artistMeta).forEach(m => {
                    if(m.members) {
                        let changed = false;
                        m.members.forEach(mem => {
                            if(mem.linked === oldName) {
                                mem.linked = newName;
                                changed = true;
                            }
                        });
                        if(changed) {
                            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(m);
                        }
                    }
                });

                tx.oncomplete = () => loadAll();
            }
        }

        function moveTrack(idx, dir) 
        {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => {
                loadAll();
                syncCurrentPlaylistOrder(pl);
            };
        }

        function syncCurrentPlaylistOrder(pl)
        {
            // If playing from this playlist, sync the play queue
            if(playingTracks.length > 0 && currentPlaylistId !== null)
            {
                let currentlyPlayingId = playingTracks[currentTrackIdx].id;
                let newOrder = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                playingTracks = isShuffle ? [...newOrder].sort(() => Math.random() - 0.5) : [...newOrder];
                currentTrackIdx = playingTracks.findIndex(x => x.id === currentlyPlayingId);
                renderQueue();
            }
        }

        /*
         * ==========================================
         * AUDIO PLAYBACK AND MEDIA SESSION
         * ==========================================
         */
        function playSong(id, mode) 
        {
            initAudioContext();
            
            let original = [];
            let currentSort = sortStates[(currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView];
            let currentSortDir = sortDirections[(currentView === 'playlist' && currentPlaylistId !== null) ? 'playlistDetail' : currentView];

            if(mode === 'pl') 
            {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x=>x);
                
                // Apply playlist sort logic
                if (currentSort !== 'custom')
                {
                    sortList(original, currentSort, currentSortDir);
                }
            } 
            else if(mode === 'art') 
            {
                original = tracks.filter(tx => 
                {
                    let comp = parseArtistsComplex(tx.artist);
                    return comp.some(c => c.name === currentArtist);
                });
                sortList(original, currentSort, currentSortDir);
            } 
            else 
            {
                original = [...tracks];
                sortList(original, currentSort, currentSortDir);
            }
            
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            if(currentTrackIdx === -1) currentTrackIdx = 0; // fallback
            
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function loadTrack(t) 
        {
            if(!t) return;
            
            if(audio.src) 
            {
                URL.revokeObjectURL(audio.src);
            }
            
            audio.src = URL.createObjectURL(t.data);
            audio.load();
            
            let artistDisplay = getDisplayArtistNames(t.artist);
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = artistDisplay;
            
            document.getElementById('mini').style.display = 'flex';
            document.getElementById('f-lyrics-view').classList.remove('active');
            document.getElementById('f-img').style.opacity = "1";
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            parseLyricData(t);
            
            // Handle Autoplay Policy
            const playPromise = audio.play();
            if (playPromise !== undefined) 
            {
                playPromise.then(_ => {
                    // Autoplay started!
                    updateMediaSession(t);
                }).catch(error => {
                    // Autoplay was prevented.
                    console.log("Playback prevented:", error);
                    document.getElementById('m-pp').className = 'fa-solid fa-play'; 
                    document.getElementById('f-pp').className = 'fa-solid fa-play';
                });
            }
            else
            {
                updateMediaSession(t);
            }
            
            renderQueue();
        }

        function updateMediaSession(t)
        {
            if ('mediaSession' in navigator) 
            {
                let artistDisplay = getDisplayArtistNames(t.artist);
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: t.name,
                    artist: artistDisplay,
                    album: 'Music Studio Pure Wish',
                    artwork: t.cover ? [{ src: t.cover, sizes: '512x512', type: 'image/jpeg' }] : []
                });

                navigator.mediaSession.setActionHandler('play', function() { audio.play(); });
                navigator.mediaSession.setActionHandler('pause', function() { audio.pause(); });
                navigator.mediaSession.setActionHandler('seekto', function(details) {
                    if (details.fastSeek && 'fastSeek' in audio) {
                        audio.fastSeek(details.seekTime);
                    } else {
                        audio.currentTime = details.seekTime;
                    }
                });
                navigator.mediaSession.setActionHandler('previoustrack', function() { prev(); });
                navigator.mediaSession.setActionHandler('nexttrack', function() { next(); });
            }
        }

        function checkMarquee(elId, text) 
        {
            const el = document.getElementById(elId);
            if (text.length > 20) 
            {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            }
            else 
            {
                el.innerText = text;
            }
        }

        function formatTime(s) 
        { 
            if(isNaN(s) || !isFinite(s)) return "0:00";
            let m = Math.floor(s/60);
            let sec = Math.floor(s%60); 
            return `${m}:${sec<10?'0':''}${sec}`; 
        }

        audio.ontimeupdate = () => 
        { 
            if(!isNaN(audio.duration))
            { 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                updateLyricsHighlight(audio.currentTime);
            } 
        };

        audio.onplay = () => 
        { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
            if(audioContext && audioContext.state === 'suspended')
            {
                audioContext.resume();
            }
            navigator.mediaSession.playbackState = "playing";
        };
        
        audio.onpause = () => 
        { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
            navigator.mediaSession.playbackState = "paused";
        };
        
        audio.onended = () => 
        { 
            next(); 
        };

        function togglePlay() 
        { 
            initAudioContext();
            if(audio.paused) 
            {
                audio.play().catch(e => console.log(e));
            }
            else
            {
                audio.pause();
            }
        }

        function next() 
        { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) 
            { 
                audio.currentTime = 0;
                audio.play();
                return; 
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) 
            { 
                audio.pause(); 
                audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() 
        { 
            if (audio.currentTime > 3) 
            {
                audio.currentTime = 0;
            }
            else 
            { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }

        function handleSeek(val)
        {
            audio.currentTime = val;
        }

        /*
         * ==========================================
         * ADVANCED LYRICS ENGINE
         * ==========================================
         */
        function parseLyricData(track)
        {
            currentLyricData = [];
            if(!track.lyrics) return;
            
            // Apple Music Style: auto split by newline. 
            // Internal representation: [time][color]text
            let lines = track.lyrics.split('\n');
            let timeRegex = /^\[(\d+(?:\.\d+)?)\]/;
            let colorRegex = /^\{([^}]+)\}/;
            
            lines.forEach(l => {
                let text = l.trim();
                let time = null;
                let color = null;
                
                let tMatch = text.match(timeRegex);
                if(tMatch) {
                    time = parseFloat(tMatch[1]);
                    text = text.replace(timeRegex, '').trim();
                }
                
                let cMatch = text.match(colorRegex);
                if(cMatch) {
                    color = cMatch[1];
                    text = text.replace(colorRegex, '').trim();
                }
                
                // Fallback coloring from main artist if none specified
                if(!color && track.artist)
                {
                    let comp = parseArtistsComplex(track.artist);
                    let mainArts = comp.filter(c => c.role.includes('Main'));
                    
                    if(mainArts.length === 1)
                    {
                        // Single Main Artist, get their color or parent color
                        color = getArtistMemberColor(mainArts[0].name);
                    }
                    else if(mainArts.length > 1)
                    {
                        // Gradient for multiple main artists
                        let colors = mainArts.map(c => getArtistMemberColor(c.name)).filter(c => c);
                        if(colors.length > 1)
                        {
                            color = `linear-gradient(90deg, ${colors.join(', ')})`;
                        }
                        else if(colors.length === 1)
                        {
                            color = colors[0];
                        }
                    }
                }
                
                currentLyricData.push({ text: text, time: time, color: color });
            });
        }

        function getArtistMemberColor(artistName)
        {
            // First check if it's a child with a linked color
            let childColor = null;
            Object.values(artistMeta).forEach(meta => {
                if(meta.members) {
                    let mem = meta.members.find(m => m.linked === artistName || m.name === artistName);
                    if(mem && mem.color) childColor = mem.color;
                }
            });
            if(childColor) return childColor;
            
            return null;
        }

        function stringifyLyricData()
        {
            return currentLyricData.map(d => {
                let str = "";
                if(d.time !== null && d.time !== undefined) str += `[${d.time.toFixed(2)}]`;
                if(d.color) str += `{${d.color}}`;
                str += d.text;
                return str;
            }).join('\n');
        }

        function toggleLyrics() 
        {
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if(isActive) 
            {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                renderLyricsView();
            } 
            else 
            {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.innerHTML = '';
            }
        }

        function renderLyricsView()
        {
            const view = document.getElementById('f-lyrics-view');
            if(currentLyricData.length === 0)
            {
                view.innerHTML = `<div style="padding-top:40%; opacity:0.5;">No lyrics available.<br><span style="font-size:14px; text-decoration:underline;" onclick="openEdit(${playingTracks[currentTrackIdx].id})">Edit Track to Add</span></div>`;
                return;
            }
            
            const paintBtn = `<button onclick="event.stopPropagation(); openLyricSyncModal()" style="position:absolute; top:25px; left:25px; background:rgba(0,0,0,0.2); border:none; color:var(--icon-color); padding:12px; border-radius:12px; z-index:50;"><i class="fa-solid fa-palette"></i></button>`;
            
            let html = paintBtn + `<div id="lyrics-content-scroll" style="width:100%; padding-top:40px; padding-bottom:150px;">`;
            
            currentLyricData.forEach((d, i) => {
                let styleStr = "";
                if(d.color)
                {
                    if(d.color.includes('gradient')) {
                        styleStr = `background: ${d.color}; -webkit-background-clip: text; -webkit-text-fill-color: transparent;`;
                    } else {
                        styleStr = `color: ${d.color};`;
                    }
                }
                html += `<div class="lyric-line" id="lyric-line-${i}" style="${styleStr}" data-index="${i}">${d.text || '&nbsp;'}</div>`;
            });
            
            html += `</div>`;
            view.innerHTML = html;
        }

        function handleLyricsViewClick(e)
        {
            let lineEl = e.target.closest('.lyric-line');
            if(lineEl)
            {
                let index = parseInt(lineEl.getAttribute('data-index'));
                let d = currentLyricData[index];
                if(d.time !== null)
                {
                    audio.currentTime = d.time;
                }
            }
        }

        let lastActiveLyricIndex = -1;
        function updateLyricsHighlight(time)
        {
            if(!document.getElementById('f-lyrics-view').classList.contains('active')) return;
            
            let activeIdx = -1;
            for(let i=0; i<currentLyricData.length; i++)
            {
                if(currentLyricData[i].time !== null && time >= currentLyricData[i].time)
                {
                    activeIdx = i;
                }
            }
            
            if(activeIdx !== lastActiveLyricIndex)
            {
                document.querySelectorAll('.lyric-line').forEach((el, i) => {
                    if(i === activeIdx) el.classList.add('active-line');
                    else el.classList.remove('active-line');
                });
                
                let activeEl = document.getElementById(`lyric-line-${activeIdx}`);
                if(activeEl)
                {
                    activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                lastActiveLyricIndex = activeIdx;
            }
        }

        function openLyricSyncModal()
        {
            if(currentTrackIdx === -1) return;
            lyricSyncMode = true;
            
            const t = playingTracks[currentTrackIdx];
            let comp = parseArtistsComplex(t.artist);
            
            let allMembers = [];
            comp.forEach(c => {
                if(artistMeta[c.name] && artistMeta[c.name].members) {
                    allMembers = allMembers.concat(artistMeta[c.name].members);
                }
            });
            
            // Dedup
            let uniqueMembers = [];
            allMembers.forEach(m => {
                if(!uniqueMembers.find(x => x.name === m.name)) uniqueMembers.push(m);
            });
            
            uniqueMembers.push({name: 'Reset Color', color: ''});
            
            currentPaintColor = uniqueMembers[0] ? uniqueMembers[0].color : '';
            
            const pal = document.getElementById('paint-palette');
            pal.innerHTML = uniqueMembers.map((m, i) => `
                <div onclick="selectPaintColor('${m.color}', ${i})" class="paint-swatch" id="swatch-${i}" style="display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:45px; opacity:${i===0?1:0.5}; transition:0.3s;">
                    <div style="width:30px; height:30px; border-radius:50%; background:${m.color || '#ccc'}; border:2px solid ${m.color?m.color:'var(--border-color)'}; box-shadow:0 2px 5px rgba(0,0,0,0.2);"></div>
                    <span style="font-size:10px; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center;">${m.name}</span>
                </div>
            `).join('');

            renderPaintLyricsList();
            document.getElementById('lyric-paint-modal').style.display = 'flex';
        }
        
        function selectPaintColor(color, idx)
        {
            currentPaintColor = color;
            document.querySelectorAll('.paint-swatch').forEach((el, i) => {
                el.style.opacity = i === idx ? 1 : 0.5;
            });
        }

        function renderPaintLyricsList()
        {
            const container = document.getElementById('paint-lyrics-container');
            container.innerHTML = currentLyricData.map((d, i) => {
                let bgStyle = d.color ? (d.color.includes('gradient') ? `background:${d.color};` : `background:${d.color}; opacity: 0.8;`) : 'background:var(--input-bg);';
                let timeStr = d.time !== null ? formatTime(d.time) : '--:--';
                
                return `
                <div onmousedown="handleLyricSyncStart(event, ${i})" onmouseup="handleLyricSyncEnd(event, ${i})" ontouchstart="handleLyricSyncStart(event, ${i})" ontouchend="handleLyricSyncEnd(event, ${i})" style="padding:15px; border-radius:12px; ${bgStyle} color:${d.color ? '#fff' : 'var(--text-main)'}; cursor:pointer; font-weight:800; display:flex; justify-content:space-between; align-items:center;">
                    <span style="flex:1; padding-right:10px;">${d.text || '<span style="color:#ccc; font-size:12px;">(empty line)</span>'}</span>
                    <span style="font-size:11px; background:rgba(0,0,0,0.2); padding:4px 8px; border-radius:8px;">${timeStr}</span>
                </div>
                `;
            }).join('');
        }
        
        let syncPressTimer;
        let isSyncLongPress = false;
        
        function handleLyricSyncStart(e, idx)
        {
            e.preventDefault(); // prevent scroll issues
            isSyncLongPress = false;
            syncPressTimer = setTimeout(() => {
                isSyncLongPress = true;
                // Long press: Reset Time and Color
                currentLyricData[idx].time = null;
                currentLyricData[idx].color = null;
                renderPaintLyricsList();
                if(navigator.vibrate) navigator.vibrate(50);
            }, 600);
        }
        
        function handleLyricSyncEnd(e, idx)
        {
            e.preventDefault();
            clearTimeout(syncPressTimer);
            if(!isSyncLongPress)
            {
                // Short tap: assign current time and selected color
                currentLyricData[idx].time = audio.currentTime;
                if(currentPaintColor) currentLyricData[idx].color = currentPaintColor;
                renderPaintLyricsList();
            }
        }

        function saveLyricSync()
        {
            lyricSyncMode = false;
            const t = playingTracks[currentTrackIdx];
            t.lyrics = stringifyLyricData();
            
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                document.getElementById('lyric-paint-modal').style.display = 'none';
                if(document.getElementById('f-lyrics-view').classList.contains('active')) 
                {
                    renderLyricsView();
                }
                loadAll();
            };
        }
        
        function closeLyricSync()
        {
            lyricSyncMode = false;
            document.getElementById('lyric-paint-modal').style.display = 'none';
        }

        /*
         * ==========================================
         * UI TOGGLES AND HANDLERS
         * ==========================================
         */
        const fPlayer = document.getElementById('full');
        let fStartY = 0, fCurrentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => 
        {
            if (e.target.closest('#f-lyrics-view')) { fStartY = 0; return; }
            fStartY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => 
        {
            if (e.target.closest('#f-lyrics-view')) return;
            fCurrentY = e.touches[0].clientY;
            let diff = fCurrentY - fStartY;
            if (diff > 0) 
            {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => 
        {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = fCurrentY - fStartY;
            fPlayer.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) 
            {
                closeFull();
            }
            else 
            {
                fPlayer.style.transform = 'translateY(0)';
            }
            fStartY = 0; fCurrentY = 0;
        });

        function goToArtistFromPlayer() 
        {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                let comp = parseArtistsComplex(playingTracks[currentTrackIdx].artist);
                if(comp.length > 0) openArtist(comp[0].name);
            }, 500);

            currentPlaylistId = null; 
            isEditing = false; 
            activeArtistFilter = null;
            render();

            render();

            fPlayer.classList.add('active');

        }

        function handleHeaderLeft() 
        { 
            if(currentArtist) 
            {
                currentArtist = null; 
            }
            else if(currentPlaylistId) 
            {
                currentPlaylistId = null; 
            }
            else 
            {
                isEditing = !isEditing;

        }

        function handleHeaderRight() 
        { 
            if(currentArtist) 
            { 
                const artTracks = tracks.filter(t => 
                {
                    let comp = parseArtistsComplex(t.artist);
                    return comp.some(c => c.name === currentArtist);
                });
                if(artTracks.length > 0) playSong(artTracks[0].id, 'art'); 
            }
            else if(currentPlaylistId) 
            {
                openBulkAddModal();
            }
            else if(currentView === 'library') 
            {
                document.getElementById('audio-upload').click(); 
            }
            else if(currentView === 'playlist') 
            { 
                const n = prompt(dictionaries[currentLang].playlist_name + ":"); 
                if(n) 
                {
                    db.transaction("playlists","readwrite").objectStore("playlists").add({ 
                        name: n, 
                        songIds: [], 
                        tag: "", 
                        cover: null, 
                        favorite: false 
                    }).onsuccess = () => loadAll(); 
                } 
            } 
            else if(currentView === 'artists') 
            { 
                const n = prompt(dictionaries[currentLang].artist + ":"); 
                if(n) 
                {
                    db.transaction("artistMeta","readwrite").objectStore("artistMeta").put({ 
                        name: n, 
                        icon: null, 
                        favorite: false, 
                        members: [] 
                    }).onsuccess = () => loadAll(); 
                }
            }
        }

        function updatePlayerBlurBg() 
        {
            if(document.documentElement.getAttribute('data-theme') === 'dark') 
            {
                const t = playingTracks[currentTrackIdx];
                if(t && t.cover) 
                {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);

                else 
                {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }

        {
            if (currentTrackIdx === -1) return;

            t.favorite = !t.favorite;
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () =>

            };

                if(isFav)

         * ==========================================
         */
        function renderTrackArtists() 
        {
            document.getElementById('track-active-artists').innerHTML = currentTrackArtistsComplex.map(a => 
                `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">
                    ${a.name} <span class="artist-role-badge">${a.role}</span> 
                    <i class="fa-solid fa-xmark" onclick="removeTrackArtist('${a.name}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i>
                </div>`
            ).join('');

        function addTrackArtist() 
        {
            const el = document.getElementById('edit-artist-input');
            const roleEl = document.getElementById('edit-artist-role');
            const val = el.value.trim();
            const role = roleEl.value;
            
            if(val && !currentTrackArtistsComplex.find(x => x.name === val)) 
            {
                currentTrackArtistsComplex.push({name: val, role: role});
                el.value = '';
                renderTrackArtists();

        function removeTrackArtist(a) 
        {
            currentTrackArtistsComplex = currentTrackArtistsComplex.filter(x => x.name !== a);
            renderTrackArtists();
        }

        function openEdit(id) 
        { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtistsComplex = parseArtistsComplex(t.artist);
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            document.getElementById('edit-lyrics').value = t.lyrics || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }
        
        function closeEdit() 
        { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }
        
        function saveEdit() 
        { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.artist = stringifyArtistsComplex(currentTrackArtistsComplex);
            t.year = document.getElementById('edit-year').value; 
            t.lyrics = document.getElementById('edit-lyrics').value; 
            db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => 
            { 
                closeEdit(); 
                loadAll(); 
            }; 
        }

        function updateArtistSuggest(v) 
        { 
            const container = document.getElementById('artist-quick-select'); 
            const artists = getAllArtists(); 
            container.innerHTML = artists.map(a => `<div class="artist-chip" onclick="document.getElementById('edit-artist-input').value='${a}'; addTrackArtist();">${a}</div>`).join(''); 
        }

        function toggleShuffle() 
        { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
        }
        
        function toggleRepeat() 
        { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }
        
        function deleteSong(id) 
        { 
            if(confirm("Delete this track?")) 
            {
                db.transaction("songs","readwrite").objectStore("songs").delete(id).onsuccess = () => loadAll(); 
            }
        }
        
        function deletePlaylist(id) 
        { 
            const pl = playlists.find(p => p.id === id);
            if(pl && pl.isAutoFav)
            {
                alert("Cannot delete auto-generated Favorites playlist.");
                return;
            }
            if(confirm("Delete this playlist?")) 
            {
                db.transaction("playlists","readwrite").objectStore("playlists").delete(id).onsuccess = () => loadAll(); 
            }
        }
        
        function removeTrackFromPlaylist(sid) 
        { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            if(pl.isAutoFav)
            {
                // unfavorite track
                const t = tracks.find(x => x.id === sid);
                if(t) {
                    t.favorite = false;
                    db.transaction("songs","readwrite").objectStore("songs").put(t).onsuccess = () => loadAll();
                }
            }
            else
            {
                pl.songIds = pl.songIds.filter(id => id !== sid); 
                db.transaction("playlists","readwrite").objectStore("playlists").put(pl).onsuccess = () => loadAll(); 
            }
        }

            {

                }).join('');

            {

         */
        function selectArtistIcon(name) 
        { 
            editingArtistName = name; 
            document.getElementById('artist-icon-upload').click(); 
        }
        
        function saveArtistIcon(e) 
        { 
            const f = e.target.files[0]; 
            if(f && editingArtistName) 
            { 
                const r = new FileReader(); 
                r.onload = (ev) => 
                { 
                    let meta = artistMeta[editingArtistName] || { name: editingArtistName, favorite: false, members: [] };
                    meta.icon = ev.target.result;
                    db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => loadAll(); 
                }; 
                r.readAsDataURL(f); 
            } 
        }

        function openArtistSetup(a) 
        {
            const meta = artistMeta[a] || { name: a, favorite: false, members: [] };
            if(!meta.members) meta.members = [];
            editingArtistSetupName = a;
            currentMembersEdit = JSON.parse(JSON.stringify(meta.members));
            renderArtistSetup();
            document.getElementById('artist-setup-modal').style.display = 'flex';
        }
        
        function closeArtistSetup()
        {
            document.getElementById('artist-setup-modal').style.display = 'none';
        }

        function renderArtistSetup() 
        {
            const body = document.getElementById('artist-setup-body');
            body.innerHTML = `
                <div style="margin-bottom:20px; text-align:center;">
                    <div style="font-size:12px; color:var(--sub-text); margin-bottom:10px;">Setup members for hierarchy & lyrics color. Linked artists will inherit color and show as children.</div>
                    <button onclick="addArtistMember()" style="padding:10px 20px; background:var(--icon-color); color:#fff; border:none; border-radius:15px; font-weight:800;">+ Add Member / Child</button>
                </div>
                <div id="artist-members-list" style="position:relative;">
                    ${currentMembersEdit.map((m, i) => `
                        <div class="swipe-container" id="swipe-mem-${i}" style="margin-bottom:10px; border-radius:15px;">
                            <div class="swipe-delete-btn" onclick="removeArtistMember(${i})">Delete</div>
                            <div class="list-item" ontouchstart="handleTouchStart(event, 'mem-${i}')" ontouchmove="handleTouchMove(event, 'mem-${i}')" ontouchend="handleTouchEnd(event, 'mem-${i}')" style="display:flex; gap:10px; align-items:center; background:var(--card-bg); border-radius:15px; padding: 10px 15px;">
                                <i class="fa-solid fa-link" style="color:${m.linked ? 'var(--icon-active)' : '#ccc'}; padding:0 5px; font-size:18px; cursor:pointer;" onclick="openSyncModal(${i})"></i>
                                <input type="color" value="${m.color || '#000000'}" onchange="currentMembersEdit[${i}].color=this.value" style="width:40px; height:40px; border:none; border-radius:10px;">
                                <input type="text" class="edit-input" style="margin-bottom:0; flex:1; padding: 10px;" value="${m.linked ? m.linked : (m.name||'')}" ${m.linked ? 'readonly' : ''} oninput="currentMembersEdit[${i}].name=this.value" placeholder="Member Name">
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function addArtistMember() 
        { 
            currentMembersEdit.push({name: '', color: '#a6cbe3', linked: null}); 
            renderArtistSetup(); 
        }
        
        function removeArtistMember(i) 
        { 
            currentMembersEdit.splice(i, 1); 
            renderArtistSetup(); 
        }
        
        function openSyncModal(i) 
        {
            currentSyncIndex = i;
            let artists = getAllArtists().filter(a => a !== editingArtistSetupName); // prevent self link
            const body = document.getElementById('artist-sync-body');
            
            body.innerHTML = artists.map(a => 
            {
                let imgHtml = artistMeta[a] && artistMeta[a].icon ? `<img src="${artistMeta[a].icon}" style="width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;object-fit:cover;">` : `<div style="display:inline-block;width:20px;height:20px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--icon-color);"></div>`;
                return `<div class="artist-chip" onclick="linkArtistMember('${a}')">${imgHtml}${a}</div>`;
            }).join('') + `<div class="artist-chip" onclick="linkArtistMember('')" style="color:var(--del-color);">Unlink</div>`;
            
            document.getElementById('artist-sync-modal').style.display = 'flex';
        }
        
        function linkArtistMember(a) 
        {
            if(currentSyncIndex !== -1) 
            {
                currentMembersEdit[currentSyncIndex].linked = a || null;
                if(a) currentMembersEdit[currentSyncIndex].name = a; // Sync name
                renderArtistSetup();
            }
            document.getElementById('artist-sync-modal').style.display = 'none';
        }

        function saveArtistSetup() 
        {
            let name = editingArtistSetupName;
            let meta = artistMeta[name] || { name: name, favorite: false };
            meta.members = currentMembersEdit;
            artistMeta[name] = meta;
            
            db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put(meta).onsuccess = () => 
            {
                document.getElementById('artist-setup-modal').style.display = 'none';
                loadAll();
            };
        }

        /*
         * ==========================================
         * FILE UPLOAD AND DB MAINTENANCE
         * ==========================================
         */
        document.getElementById('audio-upload').onchange = (e) => 
        {
            const files = e.target.files; 
            if (files.length === 0) return;
            
            for (let f of files) 
            {
                jsmediatags.read(f, { 
                    onSuccess: (tag) => 
                    {
                        let c = null; 
                        if(tag.tags.picture)
                        {
                            let d = tag.tags.picture.data;
                            let s = ""; 
                            for(let i=0; i<d.length; i++) s += String.fromCharCode(d[i]);
                            c = `data:${tag.tags.picture.format};base64,${btoa(s)}`;
                        }
                        
                        let artStr = tag.tags.artist || "Unknown";
                        // Wrap in Complex artist struct format string
                        let complex = [{name: artStr, role: "Main"}];
                        
                        const tx = db.transaction("songs", "readwrite");
                        tx.objectStore("songs").add({ 
                            name: tag.tags.title || f.name, 
                            artist: stringifyArtistsComplex(complex), 
                            year: tag.tags.year || "", 
                            cover: c, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    },
                    onError: () => 
                    {
                        const tx = db.transaction("songs", "readwrite");
                        let complex = [{name: "Unknown", role: "Main"}];
                        tx.objectStore("songs").add({ 
                            name: f.name, 
                            artist: stringifyArtistsComplex(complex), 
                            year: "", 
                            cover: null, 
                            data: f, 
                            lyrics: "", 
                            favorite: false 
                        });
                        tx.oncomplete = () => loadAll();
                    }
                });
            }
        };

        function triggerDBMaintenance()
        {
            // Compact database visually by re-saving. True compaction happens in browser engine.
            if(confirm("This will read and re-write all entries to optimize. Continue?"))
            {
                const tx = db.transaction("songs", "readwrite");
                const store = tx.objectStore("songs");
                tracks.forEach(t => store.put(t));
                tx.oncomplete = () => {
                    alert("Database maintained.");
                    loadAll();
                };
            }
        }

        /*
         * ==========================================
         * SWIPE TO DELETE / TOUCH EVENT HANDLERS
         * ==========================================
         */
        let touchStartX = 0;
        
        function handleTouchStart(e, id) 
        { 
            if(isEditing) return; 
            touchStartX = e.touches[0].clientX; 
        }
        
        function handleTouchMove(e, id) 
        {
            if(isEditing) return;
            let moveX = e.touches[0].clientX - touchStartX;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if (el && moveX < 0) 
            { 
                el.style.transform = `translateX(${Math.max(moveX, -85)}px)`; 
                el.style.transition = "none";
                if(btn) btn.style.opacity = Math.min(Math.abs(moveX) / 85, 1);
            }
        }
        
        function handleTouchEnd(e, id) 
        {
            if(isEditing) return;
            const el = document.querySelector(`#swipe-${id} .list-item`) || document.querySelector(`#swipe-${id} .artist-list-item`);
            const btn = document.querySelector(`#swipe-${id} .swipe-delete-btn`);
            
            if(!el) return;
            
            let moveX = e.changedTouches[0].clientX - touchStartX;
            el.style.transition = "transform 0.4s ease";
            
            if(moveX < -40) 
            {
                el.style.transform = `translateX(-85px)`;
                if(btn) btn.style.opacity = 1;
            } 
            else 
            {
                transform = "translateX(-85px)";
                if(btn) btn.style.opacity = 1;
            }
            else 
            {
                el.style.transform = "translateX(0)";
                if(btn) btn.style.opacity = 0;
            }
        }

        /* * ==========================================
         * CORE STATE MANAGEMENT & DATABASE (V7)
         * ==========================================
         */
        let db;
        const req = indexedDB.open("MusicStudioWishcore_V7", 2);
        
        let allSongs = [];
        let allArtists = [];
        let allPlaylists = [];
        let currentQueue = [];
        let currentIndex = -1;
        let isShuffle = false;
        let repeatMode = 'none'; // none, one, all
        let scrollPositions = {};
        let currentLang = 'en';
        let currentThemeColor = '#fbe0e6';
        
        const audio = new Audio();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gainNode = audioCtx.createGain();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        req.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains("songs")) {
                database.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            }
            if (!database.objectStoreNames.contains("artists")) {
                database.createObjectStore("artists", { keyPath: "id", autoIncrement: true });
            }
            if (!database.objectStoreNames.contains("playlists")) {
                database.createObjectStore("playlists", { keyPath: "id", autoIncrement: true });
            }
            if (!database.objectStoreNames.contains("settings")) {
                database.createObjectStore("settings", { keyPath: "key" });
            }
        };

        req.onsuccess = (e) => {
            db = e.target.result;
            initApp();
        };

        /* * ==========================================
         * INITIALIZATION & UI ROUTING
         * ==========================================
         */
        async function initApp() {
            await loadData();
            setupMediaSession();
            renderLibrary();
            restoreSettings();
            
            audio.addEventListener('ended', handleTrackEnded);
            audio.addEventListener('timeupdate', updateLyricsUI);
            audio.addEventListener('error', handlePlaybackError);
            
            window.addEventListener('popstate', handleNavigation);
            document.getElementById('search-input').addEventListener('input', handleSearch);
        }

        async function loadData() {
            allSongs = await getAllFromStore("songs");
            allArtists = await getAllFromStore("artists");
            allPlaylists = await getAllFromStore("playlists");
            ensureDefaultFavorites();
        }

        function getAllFromStore(storeName) {
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        /* * ==========================================
         * ARTIST MANAGEMENT (HIERARCHY & SYNC)
         * ==========================================
         */
        function renderArtists() {
            const container = document.getElementById('content');
            saveScrollPosition('artists');
            container.innerHTML = '';
            
            const artistList = document.createElement('div');
            artistList.className = 'artist-list-vertical';
            
            const parents = allArtists.filter(a => !a.parentId);
            
            parents.forEach(parent => {
                const item = createArtistListItem(parent, false);
                artistList.appendChild(item);
                
                const children = allArtists.filter(a => a.parentId === parent.id);
                children.forEach(child => {
                    const childItem = createArtistListItem(child, true);
                    artistList.appendChild(childItem);
                });
            });
            
            container.appendChild(artistList);
            restoreScrollPosition('artists');
        }

        function createArtistListItem(artist, isChild) {
            const div = document.createElement('div');
            div.className = `artist-item-row ${isChild ? 'child-indent' : 'parent-row'}`;
            div.id = `swipe-artist-${artist.id}`;
            
            const content = `
                <div class="artist-list-item" onclick="viewArtistSongs(${artist.id})">
                    <div class="artist-image-container">
                        <img src="${artist.image || 'IMG_8755.jpeg'}" class="${isChild ? 'child-circle' : 'parent-star'}" 
                             style="border-color: ${artist.color || 'var(--icon-color)'}">
                        ${!isChild ? '<div class="star-overlay"><i class="fas fa-star"></i></div>' : ''}
                    </div>
                    <div class="artist-info">
                        <span class="artist-name">${artist.name}</span>
                        <span class="artist-meta">${getArtistMeta(artist)}</span>
                    </div>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="swipe-delete-btn" onclick="deleteArtist(${artist.id})"><i class="fas fa-trash"></i></div>
            `;
            
            div.innerHTML = content;
            setupSwipeHandlers(div, `artist-${artist.id}`);
            return div;
        }

        /* * ==========================================
         * TRACK & MULTI-ARTIST SYSTEM
         * ==========================================
         */
        function renderLibrary() {
            const container = document.getElementById('content');
            saveScrollPosition('library');
            container.innerHTML = '';
            
            const sortedSongs = sortItems(allSongs, document.getElementById('sort-select').value);
            const grid = document.createElement('div');
            grid.className = 'grid';
            
            sortedSongs.forEach(song => {
                const card = createSongCard(song);
                grid.appendChild(card);
            });
            
            container.appendChild(grid);
            restoreScrollPosition('library');
        }

        function createSongCard(song) {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => playTrack(song.id);
            
            const artistsHtml = formatMultiArtists(song.artists);
            
            div.innerHTML = `
                <img src="${song.cover || 'IMG_8755.jpeg'}" class="card-img">
                <div class="card-info">
                    <div class="card-title">${song.title}</div>
                    <div class="card-sub">${artistsHtml}</div>
                </div>
            `;
            return div;
        }

        function formatMultiArtists(trackArtists) {
            if (!trackArtists || trackArtists.length === 0) return "Unknown Artist";
            return trackArtists.map(ta => {
                const artist = allArtists.find(a => a.id === ta.id);
                const name = artist ? artist.name : ta.name;
                return `<span class="artist-tag role-${ta.role}">${name}</span>`;
            }).join(', ');
        }

        /* * ==========================================
         * APPLE STYLE LYRICS ENGINE
         * ==========================================
         */
        function renderLyricsPlayer() {
            const lyricsContainer = document.getElementById('lyrics-display');
            const song = currentQueue[currentIndex];
            if (!song || !song.lyrics) {
                lyricsContainer.innerHTML = '<div class="no-lyrics">✧ No Lyrics ✧</div>';
                return;
            }
            
            lyricsContainer.innerHTML = '';
            song.lyrics.forEach((line, index) => {
                const p = document.createElement('p');
                p.className = 'lyric-line';
                p.id = `lyric-${index}`;
                p.dataset.time = line.time;
                p.innerText = line.text;
                p.onclick = () => { audio.currentTime = line.time; };
                
                // Member Color Application
                if (line.memberIds && line.memberIds.length > 0) {
                    if (line.memberIds.length > 1) {
                        const colors = line.memberIds.map(id => getArtistColor(id));
                        p.style.background = `linear-gradient(90deg, ${colors.join(', ')})`;
                        p.style.webkitBackgroundClip = 'text';
                        p.style.webkitTextFillColor = 'transparent';
                    } else {
                        p.style.color = getArtistColor(line.memberIds[0]);
                    }
                }
                
                lyricsContainer.appendChild(p);
            });
        }

        function updateLyricsUI() {
            const currentTime = audio.currentTime;
            const lines = document.querySelectorAll('.lyric-line');
            let activeIndex = -1;
            
            lines.forEach((line, i) => {
                const time = parseFloat(line.dataset.time);
                if (currentTime >= time) activeIndex = i;
                line.classList.remove('active');
            });
            
            if (activeIndex !== -1) {
                const activeLine = document.getElementById(`lyric-${activeIndex}`);
                activeLine.classList.add('active');
                scrollLyrics(activeLine);
            }
        }

        /* * ==========================================
         * AUDIO CONTROL & REFINEMENT
         * ==========================================
         */
        function playTrack(songId, queue = allSongs) {
            const index = queue.findIndex(s => s.id === songId);
            if (index === -1) return;
            
            currentQueue = [...queue];
            currentIndex = index;
            
            const song = currentQueue[currentIndex];
            audio.src = song.url;
            
            // Gain adjustment for smooth volume
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(1.0, audioCtx.currentTime + 0.5);
            
            audio.play().catch(() => {
                // Retry logic for first play bug
                setTimeout(() => audio.play(), 500);
            });
            
            updateMetadata();
            showPlayer();
            renderLyricsPlayer();
        }

        function handlePlaybackError() {
            console.warn("Playback failed, retrying...");
            setTimeout(() => {
                if (audio.paused && currentIndex !== -1) audio.play();
            }, 1000);
        }

        /* * ==========================================
         * MEDIASESSION & BACKGROUND SYNC
         * ==========================================
         */
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
                navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    audio.currentTime = details.seekTime;
                });
            }
        }

        function updateMetadata() {
            const song = currentQueue[currentIndex];
            if (!song) return;
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artists.map(a => a.name).join(', '),
                    artwork: [{ src: song.cover || 'IMG_8755.jpeg', sizes: '512x512', type: 'image/jpeg' }]
                });
            }
        }

        /* * ==========================================
         * UTILS & PERSISTENCE
         * ==========================================
         */
        function saveScrollPosition(view) {
            const container = document.getElementById('content');
            scrollPositions[view] = container.scrollTop;
        }

        function restoreScrollPosition(view) {
            const container = document.getElementById('content');
            container.scrollTop = scrollPositions[view] || 0;
        }

        function sortItems(items, criteria) {
            const [key, direction] = criteria.split('-');
            const factor = direction === 'desc' ? -1 : 1;
            
            return [...items].sort((a, b) => {
                if (key === 'title' || key === 'name') {
                    return a[key].localeCompare(b[key]) * factor;
                }
                if (key === 'date') {
                    return (new Date(b.addedDate) - new Date(a.addedDate)) * factor;
                }
                return 0;
            });
        }

        /* * ==========================================
         * UI COMPONENTS (SYSTEM INTEGRATED)
         * ==========================================
         */
        function showAddArtistModal() {
            const name = prompt("Enter Artist Name:");
            if (!name) return;
            
            const newArtist = {
                name: name,
                parentId: null,
                color: '#a6cbe3',
                image: 'IMG_8755.jpeg',
                addedDate: new Date().toISOString()
            };
            
            saveToStore("artists", newArtist).then(() => {
                loadData().then(renderArtists);
            });
        }

        function saveToStore(storeName, data) {
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, "readwrite");
                const store = transaction.objectStore(storeName);
                store.add(data).onsuccess = resolve;
            });
        }

        /* * ==========================================
         * INITIAL CALLS
         * ==========================================
         */
        window.onload = () => {
            if (audioCtx.state === 'suspended') {
                document.body.addEventListener('click', () => {
                    audioCtx.resume();
                }, { once: true });
            }
        };

    </script>
</body>
