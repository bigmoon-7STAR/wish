        let artistMeta = {};
        let isEditing = false;
        let currentView = 'library';
        let currentArtist = null;
        let currentPlaylistId = null;
        let playingTracks = [];
        let currentTrackIdx = -1;
        let isShuffle = false;
        let repeatMode = 0; 
        
        let editingId = null;
        let editingPlId = null;
        let tempPlImg = null;
        let editingArtistName = null;
        let currentPlTags = [];
        let tempPlFav = false;
        
        let currentTrackArtistsMain = [];
        let currentTrackArtistsSub = [];
        let currentArtistRole = 'main'; // 'main' or 'sub'
        
        let editingArtistSetupName = null;
        let currentMembersEdit = [];
        
        let currentLyricData = []; // Array of {text, time, singers:[]}
        let lyricEditMainMembers = []; // Cached members of main artists for current song
        
        let sleepTimerId = null;
        let sleepTimerInterval = null;
        let sleepEndTime = 0;
        
        const audio = document.getElementById('audio-element');
        let audioObjectUrlMap = {}; // Cache to prevent blob revoke issues

        let sortStates = { artists: 'added', library: 'added', playlist: 'added', playlistDetail: 'year' };
        let searchQueries = { artists: '', artistsDetail: '', library: '', playlist: '', playlistDetail: '', bulkAdd: '' };
        let activeArtistFilter = null; 
        let currentSyncIndex = -1;

        let addItemType = ''; // 'artist' or 'playlist'

        // Theme
        function applyTheme(mode) {
            if (mode === 'system') {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
            } else if (mode === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('themeMode', mode);
            updatePlayerBlurBg();
        }

        function initTheme() {
            let mode = localStorage.getItem('themeMode') || 'system';
            document.getElementById('theme-select').value = mode;
            applyTheme(mode);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (document.getElementById('theme-select').value === 'system') applyTheme('system');
            });
        }
        initTheme();

        function loadHomeIcon() {
            let saved = localStorage.getItem('homeIcon');
            let link = document.getElementById('apple-touch-icon');
            if (saved && link) {
                link.href = saved;
            } else if (link) {
                link.href = "IMG_8755.jpeg";
            }
        }
        loadHomeIcon();

        function changeHomeIcon(e) {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => {
                    localStorage.setItem('homeIcon', ev.target.result);
                    loadHomeIcon();
                }
                r.readAsDataURL(f);
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
        }
        
        function startTimer() {
            if (sleepTimerId) {
                clearTimeout(sleepTimerId);
                clearInterval(sleepTimerInterval);
                sleepTimerId = null;
                sleepTimerInterval = null;
                document.getElementById('timer-display').innerText = "";
                document.getElementById('timer-btn').innerText = "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                return;
            }
            const min = parseInt(document.getElementById('timer-input').value);
            if (isNaN(min) || min <= 0) return;
            
            sleepEndTime = Date.now() + min * 60000;
            document.getElementById('timer-btn').innerText = "Stop";
            document.getElementById('timer-btn').style.background = "var(--del-color)";
            
            sleepTimerInterval = setInterval(() => {
                let remain = sleepEndTime - Date.now();
                if (remain <= 0) {
                    clearInterval(sleepTimerInterval);
                } else {
                    let m = Math.floor(remain / 60000);
                    let s = Math.floor((remain % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `Remaining: ${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);

            sleepTimerId = setTimeout(() => {
                audio.pause();
                document.getElementById('timer-display').innerText = "Timer finished.";
                document.getElementById('timer-btn').innerText = "Start";
                document.getElementById('timer-btn').style.background = "var(--icon-color)";
                sleepTimerId = null;
                clearInterval(sleepTimerInterval);
            }, min * 60000);
        }

        // IndexedDB Initialization
        const req = indexedDB.open("MusicStudioWishcore_V7", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            if (!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", { keyPath: "id", autoIncrement: true });
            if (!d.objectStoreNames.contains("artistMeta")) d.createObjectStore("artistMeta", { keyPath: "name" });
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            loadAll();
        };

        function migrateTrack(t) {
            let changed = false;
            if (!t.mainArtists) {
                t.mainArtists = t.artist ? t.artist.split(/[,、/]/).map(x => x.trim()).filter(x => x) : [];
                t.subArtists = [];
                changed = true;
            }
            if (!t.lyricData) {
                t.lyricData = [];
                if (t.lyrics && typeof t.lyrics === 'string') {
                    let lines = t.lyrics.split('\n');
                    t.lyricData = lines.map(line => ({ text: line, time: 0, singers: [] }));
                }
                changed = true;
            }
            return { track: t, changed: changed };
        }

        function loadAll() {
            const tx = db.transaction(["songs", "playlists", "artistMeta"], "readonly");
            let loadedTracks = [];
            let neededMigration = false;
            
            tx.objectStore("songs").getAll().onsuccess = (e) => {
                loadedTracks = e.target.result;
                loadedTracks.forEach(t => {
                    let res = migrateTrack(t);
                    if (res.changed) neededMigration = true;
                });
                tracks = loadedTracks;
                if (neededMigration) {
                    const txWrite = db.transaction("songs", "readwrite");
                    const store = txWrite.objectStore("songs");
                    tracks.forEach(t => store.put(t));
                }
                render();
            };
            tx.objectStore("playlists").getAll().onsuccess = (e) => {
                playlists = e.target.result;
                render();
            };
            tx.objectStore("artistMeta").getAll().onsuccess = (e) => {
                artistMeta = {};
                e.target.result.forEach(m => artistMeta[m.name] = m);
                render();
            };
        }

        function getArtistString(t) {
            let main = (t.mainArtists || []).join(', ');
            let sub = (t.subArtists || []).join(', ');
            if (main && sub) return `${main} / ${sub}`;
            if (main) return main;
            return sub || 'Unknown';
        }

        function trackHasArtist(t, artistName) {
            let main = t.mainArtists || [];
            let sub = t.subArtists || [];
            return main.includes(artistName) || sub.includes(artistName);
        }

        function handleSearchInput() {
            const val = document.getElementById('search-input').value;
            let key = currentView;
            if (currentView === 'playlist' && currentPlaylistId !== null) key = 'playlistDetail';
            if (currentView === 'artists' && currentArtist !== null) key = 'artistsDetail';
            searchQueries[key] = val;
            render();
        }

        function handleSortChange() {
            const val = document.getElementById('sort-type').value;
            let key = currentView;
            if (currentView === 'playlist' && currentPlaylistId !== null) key = 'playlistDetail';
            if (currentView === 'artists' && currentArtist !== null) key = 'artistsDetail';
            sortStates[key] = val;
            render();
        }

        function getAllArtists() {
            let allArts = new Set();
            Object.keys(artistMeta).forEach(k => allArts.add(k));
            tracks.forEach(t => {
                (t.mainArtists || []).forEach(a => { if (a.trim()) allArts.add(a.trim()); });
                (t.subArtists || []).forEach(a => { if (a.trim()) allArts.add(a.trim()); });
            });
            return [...allArts].sort((a, b) => a.localeCompare(b, 'ja'));
        }

        function switchViewContainer(viewId) {
            document.querySelectorAll('.scroll-container').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function render() {
            const title = document.getElementById('view-title');
            const rightBtn = document.getElementById('right-btn');
            const leftBtn = document.getElementById('left-btn');
            const searchInputEl = document.getElementById('search-input');
            const sortSelectEl = document.getElementById('sort-type');
            const tagSuggest = document.getElementById('playlist-tag-suggestions');
            const artistFilter = document.getElementById('artist-filter-container');
            const artistSetupBtn = document.getElementById('artist-setup-header-btn');
            const settingsBtn = document.getElementById('settings-header-btn');
            const sortCustomOpt = document.getElementById('sort-custom-opt');
            
            tagSuggest.style.display = 'none';
            artistFilter.style.display = 'none';
            
            if (artistSetupBtn) artistSetupBtn.style.display = currentArtist ? 'inline-flex' : 'none';
            if (settingsBtn) settingsBtn.style.display = (currentView === 'artists' && !currentArtist) ? 'inline-flex' : 'none';
            rightBtn.style.display = (currentView === 'artists' && !currentArtist && !isEditing) ? 'none' : 'flex';

            let viewKey = currentView;
            if (currentView === 'playlist' && currentPlaylistId !== null) viewKey = 'playlistDetail';
            if (currentView === 'artists' && currentArtist !== null) viewKey = 'artistsDetail';

            let currentSearch = searchQueries[viewKey] || '';
            if (searchInputEl && searchInputEl.value !== currentSearch) searchInputEl.value = currentSearch;
            
            let currentSort = sortStates[viewKey] || 'added';
            if (sortSelectEl) {
                sortSelectEl.value = currentSort;
                if (currentView === 'library' || (currentView === 'artists' && !currentArtist)) {
                    sortCustomOpt.style.display = 'none';
                    if (currentSort === 'custom') {
                        currentSort = 'added';
                        sortStates[viewKey] = 'added';
                        sortSelectEl.value = 'added';
                    }
                } else {
                    sortCustomOpt.style.display = 'block';
                }
            }

            const search = currentSearch.toLowerCase();
            let searchTerms = search.split(/[\s,、]+/).filter(x => x);

            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            const activeTabId = currentView === 'playlist' ? 'tab-play' : currentView === 'artists' ? 'tab-artist' : 'tab-lib';
            const tabEl = document.getElementById(activeTabId);
            if (tabEl) tabEl.classList.add('active');

            if (currentView === 'library') {
                switchViewContainer('scroll-lib');
                title.innerText = "Library";
                let list = tracks.filter(t => {
                    let text = (t.name + " " + getArtistString(t)).toLowerCase();
                    return searchTerms.every(term => text.includes(term));
                });
                renderCards(list, document.getElementById('main-display-lib'), currentSort);
            
            } else if (currentView === 'artists') {
                if (!currentArtist) {
                    switchViewContainer('scroll-art');
                    title.innerText = "Artists";
                    let artists = getAllArtists();
                    
                    artists = artists.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                    artists.sort((a, b) => a.localeCompare(b, 'ja'));
                    
                    // Grouping logic
                    let parentMap = {};
                    artists.forEach(a => {
                        if (artistMeta[a] && artistMeta[a].members) {
                            artistMeta[a].members.forEach(m => {
                                if (m.linked && artists.includes(m.linked)) {
                                    parentMap[m.linked] = a;
                                }
                            });
                        }
                    });

                    let topLevel = artists.filter(a => !parentMap[a]);
                    let renderList = [];
                    topLevel.forEach(a => {
                        renderList.push({ name: a, isChild: false });
                        let children = artists.filter(child => parentMap[child] === a);
                        children.forEach(c => renderList.push({ name: c, isChild: true }));
                    });

                    // Add any orphans that might have missed the net
                    artists.forEach(a => {
                        if (!renderList.find(r => r.name === a)) {
                            renderList.push({ name: a, isChild: false });
                        }
                    });

                    const display = document.getElementById('main-display-art');
                    display.innerHTML = renderList.map(item => {
                        let a = item.name;
                        const firstSong = tracks.find(t => trackHasArtist(t, a));
                        const iconSrc = (artistMeta[a] && artistMeta[a].icon) ? artistMeta[a].icon : (firstSong && firstSong.cover ? firstSong.cover : null);
                        const icon = iconSrc ? `<img src="${iconSrc}" class="artist-icon">` : `<div class="artist-icon"><i class="fa-solid fa-user" style="font-size:24px;"></i></div>`;
                        let childClass = item.isChild ? 'child-artist' : '';
                        
                        return `
                        <div class="swipe-container" id="swipe-art-${CSS.escape(a)}">
                            <div class="swipe-delete-btn" onclick="deleteCustomArtist('${a}')">Delete</div>
                            <div class="artist-list-item ${childClass}" onclick="isEditing ? selectArtistIcon('${a}') : openArtist('${a}')" ontouchstart="handleTouchStart(event, 'art-${a}')" ontouchmove="handleTouchMove(event, 'art-${a}')" ontouchend="handleTouchEnd(event, 'art-${a}')">
                                <div class="artist-icon-container" style="${item.isChild ? 'width:44px; height:44px;' : ''}">${icon}</div>
                                <div style="font-weight:800; font-size:16px; flex:1;">${a}</div>
                                <i class="fa-solid fa-chevron-right" style="font-size:12px; color:var(--icon-color);"></i>
                            </div>
                        </div>`;
                    }).join('');

                } else {
                    switchViewContainer('scroll-art-detail');
                    title.innerText = currentArtist;
                    let list = tracks.filter(t => trackHasArtist(t, currentArtist));
                    list = list.filter(t => searchTerms.every(term => t.name.toLowerCase().includes(term)));
                    renderCards(list, document.getElementById('main-display-art-detail'), currentSort);
                }

            } else if (currentView === 'playlist') {
                if (currentPlaylistId === null) {
                    switchViewContainer('scroll-pl');
                    title.innerText = "Playlists";
                    const allTags = [];
                    playlists.forEach(p => {
                        if (p.tag) p.tag.split(/[,、]/).forEach(tg => {
                            const tr = tg.trim();
                            if (tr && !allTags.includes(tr)) allTags.push(tr);
                        });
                    });
                    
                    if (search.length > 0) {
                        const matchedTags = allTags.filter(t => searchTerms.every(term => t.toLowerCase().includes(term)));
                        if (matchedTags.length > 0) {
                            tagSuggest.style.display = 'flex';
                            tagSuggest.innerHTML = matchedTags.map(t => `<div class="tag-chip" onclick="applyTagFilter('${t}')">#${t}</div>`).join('');
                        }
                    }
                    
                    let list = playlists.filter(p => searchTerms.every(term => p.name.toLowerCase().includes(term) || (p.tag && p.tag.toLowerCase().includes(term))));
                    
                    const display = document.getElementById('main-display-pl');
                    display.innerHTML = list.map(p => {
                        const firstSong = tracks.find(t => p.songIds.includes(t.id));
                        const tagsHtml = p.tag ? p.tag.split(/[,、]/).map(tg => `<div class="card-tag">${tg.trim()}</div>`).join(' ') : '';
                        return `
                        <div class="card ${isEditing ? 'editing' : ''}" onclick="isEditing ? openPlEdit(${p.id}) : openPlaylist(${p.id})">
                            <div class="del-badge" onclick="event.stopPropagation(); deletePlaylist(${p.id})"><i class="fa-solid fa-x"></i></div>
                            <img src="${p.cover || (firstSong ? firstSong.cover : '')}" class="card-img" alt="cover">
                            <div class="card-info">
                                <div class="card-title">${p.name}</div>
                                <div class="card-sub">${p.songIds.length} tracks</div>
                                <div style="margin-top:5px;">${tagsHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    switchViewContainer('scroll-pl-detail');
                    const pl = playlists.find(p => p.id === currentPlaylistId);
                    if (!pl) return;
                    title.innerText = pl.name;
                    let plSongs = pl.songIds.map(id => tracks.find(t => t.id === id)).filter(t => t);
                    
                    let artistsInPlRaw = [];
                    plSongs.forEach(s => {
                        if (s.mainArtists) artistsInPlRaw.push(...s.mainArtists);
                        if (s.subArtists) artistsInPlRaw.push(...s.subArtists);
                    });
                    const artistsInPl = [...new Set(artistsInPlRaw)];

                    if (artistsInPl.length > 0 && search.length > 0) {
                        const matchedArts = artistsInPl.filter(a => searchTerms.every(term => a.toLowerCase().includes(term)));
                        if (matchedArts.length > 0) {
                            artistFilter.style.display = 'flex';
                            artistFilter.innerHTML = matchedArts.map(a => {
                                const firstSong = tracks.find(t => trackHasArtist(t, a));
                                const iconSrc = (artistMeta[a] && artistMeta[a].icon) ? artistMeta[a].icon : (firstSong && firstSong.cover ? firstSong.cover : null);
                                const icon = iconSrc ? `<img src="${iconSrc}" style="${activeArtistFilter === a ? 'border-color:var(--icon-color); opacity:1;' : 'opacity:0.6;'}">` : `<div class="placeholder"><i class="fa-solid fa-user"></i></div>`;
                                return `<div class="bulk-artist-icon-chip" onclick="toggleArtistFilter('${a}')">${icon}<span>${a}</span></div>`;
                            }).join('');
                        }
                    }

                    let filtered = plSongs.filter(t => {
                        let text = (t.name + " " + getArtistString(t)).toLowerCase();
                        return searchTerms.every(term => text.includes(term));
                    });
                    if (activeArtistFilter) filtered = filtered.filter(t => trackHasArtist(t, activeArtistFilter));

                    if (currentSort === 'name_asc') filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
                    else if (currentSort === 'name_desc') filtered.sort((a, b) => b.name.localeCompare(a.name, 'ja'));
                    else if (currentSort === 'year') filtered.sort((a, b) => (b.year || '').toString().localeCompare((a.year || '').toString()));

                    const display = document.getElementById('main-display-pl-detail');
                    display.innerHTML = filtered.map((t, idx) => `
                        <div class="swipe-container" id="swipe-${t.id}">
                            <div class="swipe-delete-btn" onclick="removeTrackFromPlaylist(${t.id})">Remove</div>
                            <div class="list-item" onclick="playSong(${t.id},'pl')" ontouchstart="handleTouchStart(event, '${t.id}')" ontouchmove="handleTouchMove(event, '${t.id}')" ontouchend="handleTouchEnd(event, '${t.id}')">
                                <div style="position:relative; margin-right:16px;">
                                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:-5px; left:-5px; font-size:12px; z-index:5;"></i>' : ''}
                                    <img src="${t.cover || ''}" style="margin-right:0;" alt="cover">
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:800; font-size:14px;">${t.name}</div>
                                    <div style="font-size:11px; color:var(--icon-color); margin-top:3px; font-weight:700;">${getArtistString(t)}</div>
                                </div>
                                ${currentSort === 'custom' ? `<div class="reorder-btns" onclick="event.stopPropagation()"><i class="fa-solid fa-chevron-up" onclick="moveTrack(${idx}, -1)"></i><i class="fa-solid fa-chevron-down" onclick="moveTrack(${idx}, 1)"></i></div>` : ''}
                            </div>
                        </div>`).join('') + `<div style="padding:40px; text-align:center;"><button onclick="openBulkAddModal()" style="background:var(--card-bg); color:var(--icon-active); border:2px solid var(--accent-blue); padding:15px 30px; border-radius:30px; font-weight:900; font-size:12px;">+ Add Tracks</button></div>`;
                }
            }

            if (currentArtist || currentPlaylistId) {
                leftBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            } else {
                leftBtn.innerHTML = isEditing ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-sliders"></i>';
            }
            
            if (currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else if (currentView === 'artists' && isEditing && !currentArtist) {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            } else {
                rightBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            }
        }

        function renderCards(list, container, sort) {
            if (sort === 'name_asc') list.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            else if (sort === 'name_desc') list.sort((a, b) => b.name.localeCompare(a.name, 'ja'));
            else if (sort === 'year') list.sort((a, b) => (b.year || '').toString().localeCompare((a.year || '').toString()));
            
            container.innerHTML = list.map(t => `
                <div class="card ${isEditing ? 'editing' : ''}" onclick="isEditing ? openEdit(${t.id}) : playSong(${t.id},'lib')">
                    <div class="del-badge" onclick="event.stopPropagation(); deleteSong(${t.id})"><i class="fa-solid fa-trash-can"></i></div>
                    <img src="${t.cover || ''}" class="card-img" alt="cover">
                    ${t.favorite ? '<i class="fa-solid fa-star star-icon active" style="position:absolute; top:15px; right:15px; font-size:18px; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index:10;"></i>' : ''}
                    <div class="card-info">
                        <div class="card-title">${t.name}</div>
                        <div class="card-sub">${getArtistString(t)} ${t.year ? `<span class="card-year">${t.year}</span>` : ''}</div>
                    </div>
                </div>`).join('');
        }

        function moveTrack(idx, dir) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            if (!pl) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= pl.songIds.length) return;
            const temp = pl.songIds[idx];
            pl.songIds[idx] = pl.songIds[newIdx];
            pl.songIds[newIdx] = temp;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll;
        }

        function applyTagFilter(tag) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = tag;
            searchQueries[currentView] = tag;
            render();
        }

        function toggleArtistFilter(a) {
            activeArtistFilter = (activeArtistFilter === a) ? null : a;
            render();
        }

        function deleteCustomArtist(a) {
            if (confirm(`Delete artist '${a}'?`)) {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").delete(a).onsuccess = loadAll;
            }
        }

        function toggleFavoriteCurrentSong() {
            if (currentTrackIdx === -1) return;
            const t = playingTracks[currentTrackIdx];
            t.favorite = !t.favorite;
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => {
                updateFavBtn(t.favorite);
                loadAll();
            };
        }

        function updateFavBtn(isFav) {
            const btn = document.getElementById('f-fav-btn');
            if (btn) {
                const icon = btn.querySelector('i');
                if (isFav) {
                    icon.className = 'fa-solid fa-star star-icon active';
                } else {
                    icon.className = 'fa-regular fa-star star-icon';
                }
            }
        }

        // Full Player gestures
        const fPlayer = document.getElementById('full');
        let startY = 0, currentY = 0;
        
        fPlayer.addEventListener('touchstart', (e) => {
            if (e.target.closest('#f-lyrics-view')) { startY = 0; return; }
            startY = e.touches[0].clientY;
            fPlayer.style.transition = 'none';
        }, { passive: true });

        fPlayer.addEventListener('touchmove', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) {
                fPlayer.style.transform = `translateY(${diff}px)`;
            }
        }, { passive: true });

        fPlayer.addEventListener('touchend', (e) => {
            if (e.target.closest('#f-lyrics-view')) return;
            let diff = currentY - startY;
            fPlayer.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            if (diff > 120) closeFull();
            else fPlayer.style.transform = 'translateY(0)';
            startY = 0; currentY = 0;
        });

        // Lyrics View
        function toggleLyrics(e) {
            if (e) e.stopPropagation();
            const view = document.getElementById('f-lyrics-view');
            const isActive = view.classList.toggle('active');
            
            if (isActive) {
                document.getElementById('f-img').style.opacity = "0.08";
                document.getElementById('f-artwork-container').style.transform = "scale(1.05)";
                renderFullscreenLyrics();
            } else {
                document.getElementById('f-img').style.opacity = "1";
                document.getElementById('f-artwork-container').style.transform = "scale(1)";
                view.classList.remove('fullscreen-lyrics');
                view.innerHTML = '';
            }
        }

        function toggleFullscreenLyrics(e) {
            if (e) e.stopPropagation();
            const view = document.getElementById('f-lyrics-view');
            view.classList.toggle('fullscreen-lyrics');
            const btn = document.getElementById('fs-lyric-btn');
            if (view.classList.contains('fullscreen-lyrics')) {
                btn.innerHTML = '<i class="fa-solid fa-compress"></i>';
                document.getElementById('f-artwork-container').style.position = 'static';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-expand"></i>';
                document.getElementById('f-artwork-container').style.position = 'relative';
            }
            setTimeout(() => syncLyricsDisplay(audio.currentTime), 100);
        }

        function goToArtistFromPlayer() {
            if (currentTrackIdx === -1) return;
            closeFull();
            setTimeout(() => {
                switchTab('artists');
                let t = playingTracks[currentTrackIdx];
                let firstArt = (t.mainArtists && t.mainArtists.length > 0) ? t.mainArtists[0] : ((t.subArtists && t.subArtists.length > 0) ? t.subArtists[0] : null);
                if (firstArt) openArtist(firstArt);
            }, 500);
        }

        // Add Item Modal
        function openAddItem(type) {
            addItemType = type;
            document.getElementById('add-item-title').innerText = type === 'artist' ? "Add Artist" : "Add Playlist";
            document.getElementById('add-item-label').innerText = "Name";
            document.getElementById('add-item-input').value = "";
            document.getElementById('add-item-modal').style.display = 'flex';
        }

        function closeAddItem() {
            document.getElementById('add-item-modal').style.display = 'none';
        }

        function saveAddItem() {
            const name = document.getElementById('add-item-input').value.trim();
            if (!name) return;
            
            if (addItemType === 'artist') {
                db.transaction("artistMeta", "readwrite").objectStore("artistMeta").put({ 
                    name: name, icon: null, favorite: false, members: [], syncColor: '' 
                }).onsuccess = () => {
                    closeAddItem();
                    loadAll();
                };
            } else if (addItemType === 'playlist') {
                db.transaction("playlists", "readwrite").objectStore("playlists").add({ 
                    name: name, songIds: [], tag: "", cover: null, favorite: false 
                }).onsuccess = () => {
                    closeAddItem();
                    loadAll();
                };
            }
        }

        // Bulk Add Tracks
        function openBulkAddModal() {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            const div = document.createElement('div');
            div.id = "bulk-modal";
            div.className = "modal";
            div.style.display = "flex";
            
            div.innerHTML = `
                <div class="header"><div class="header-top">
                    <div class="header-side-container left"><button class="modal-close-btn" onclick="this.closest('.modal').remove()"><i class="fa-solid fa-xmark"></i></button></div>
                    <h2>Select Songs</h2>
                    <div class="header-side-container right"><button onclick="saveBulkAdd()" style="font-weight:900; color:var(--icon-color); background:none; border:none; font-size:16px;">Done</button></div>
                </div></div>
                <div class="search-container">
                    <div class="search-bar-row">
                        <input type="text" id="bulk-search-box" class="bulk-search-input" placeholder="Search track or artist..." oninput="filterBulk(this.value)">
                    </div>
                    <div id="bulk-artist-suggestions"></div>
                </div>
                <div class="modal-body" style="padding:0; padding-bottom:50px;" id="bulk-list">
                    ${tracks.map(t => `
                    <label class="check-item" data-search="${t.name.toLowerCase()} ${getArtistString(t).toLowerCase()}">
                        <input type="checkbox" value="${t.id}" ${pl.songIds.includes(t.id) ? 'checked' : ''}>
                        <img src="${t.cover || ''}" style="width:48px; height:48px; border-radius:12px; margin-right:15px;" alt="cover">
                        <div style="flex:1;">
                            <b style="font-size:14px;">${t.name}</b><br>
                            <span style="font-size:11px; color:var(--icon-color);">${getArtistString(t)}</span>
                        </div>
                    </label>`).join('')}
                </div>`;
            document.body.appendChild(div);
        }

        function filterBulk(val) {
            const v = val.toLowerCase();
            const items = document.querySelectorAll('#bulk-list .check-item');
            items.forEach(el => el.style.display = el.getAttribute('data-search').includes(v) ? 'flex' : 'none');
            const suggest = document.getElementById('bulk-artist-suggestions');
            const matchedArtists = getAllArtists().filter(a => a.toLowerCase().includes(v));
            
            if (v.length > 0 && matchedArtists.length > 0) {
                suggest.style.display = 'flex';
                suggest.innerHTML = matchedArtists.map(a => {
                    const firstSong = tracks.find(t => trackHasArtist(t, a));
                    const iconSrc = (artistMeta[a] && artistMeta[a].icon) ? artistMeta[a].icon : (firstSong && firstSong.cover ? firstSong.cover : null);
                    const icon = iconSrc ? `<img src="${iconSrc}">` : `<div class="placeholder"><i class="fa-solid fa-user" style="margin-top:10px;"></i></div>`;
                    return `<div class="bulk-artist-icon-chip" onclick="document.getElementById('bulk-search-box').value='${a}'; filterBulk('${a}')">${icon}<span>${a}</span></div>`;
                }).join('');
            } else {
                suggest.style.display = 'none';
            }
        }

        function switchTab(v) { 
            currentView = v;
            currentArtist = null;
            currentPlaylistId = null;
            isEditing = false;
            activeArtistFilter = null;
            render(); 
        }

        function openPlaylist(id) { 
            currentPlaylistId = id; 
            activeArtistFilter = null; 
            sortStates.playlistDetail = 'year'; 
            render(); 
        }

        function openArtist(n) { 
            currentArtist = n; 
            render(); 
        }

        function openFull() { 
            fPlayer.classList.add('active'); 
            fPlayer.style.transform = 'translateY(0)'; 
        }

        function closeFull() { 
            fPlayer.classList.remove('active'); 
            fPlayer.style.transform = 'translateY(100%)'; 
        }

        function handleHeaderLeft() { 
            if (currentArtist) currentArtist = null; 
            else if (currentPlaylistId) currentPlaylistId = null; 
            else isEditing = !isEditing; 
            render(); 
        }

        function handleHeaderRight() { 
            if (currentArtist) {
                const artTracks = tracks.filter(t => trackHasArtist(t, currentArtist));
                if (artTracks.length > 0) playSong(artTracks[0].id, 'art');
            } else if (currentPlaylistId) {
                openBulkAddModal();
            } else if (currentView === 'library') {
                document.getElementById('audio-upload').click(); 
            } else if (currentView === 'playlist') {
                openAddItem('playlist');
            } else if (currentView === 'artists') {
                openAddItem('artist');
            }
        }

        function togglePlay() { 
            audio.paused ? audio.play() : audio.pause(); 
        }

        function next() { 
            if (playingTracks.length === 0) return;
            if (repeatMode === 2) { 
                loadTrack(playingTracks[currentTrackIdx]); 
                return; 
            }
            if (currentTrackIdx === playingTracks.length - 1 && repeatMode === 0) { 
                audio.pause(); 
                audio.currentTime = 0; 
                return; 
            }
            currentTrackIdx = (currentTrackIdx + 1) % playingTracks.length;
            loadTrack(playingTracks[currentTrackIdx]);
        }

        function prev() { 
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else { 
                currentTrackIdx = (currentTrackIdx - 1 + playingTracks.length) % playingTracks.length; 
                loadTrack(playingTracks[currentTrackIdx]); 
            }
        }

        function playSong(id, mode) {
            let original = [];
            if (mode === 'pl') {
                const pl = playlists.find(p => p.id === currentPlaylistId);
                original = pl.songIds.map(sid => tracks.find(tx => tx.id === sid)).filter(x => x);
            } else if (mode === 'art') {
                original = tracks.filter(tx => trackHasArtist(tx, currentArtist));
            } else {
                original = [...tracks];
            }
            
            playingTracks = isShuffle ? [...original].sort(() => Math.random() - 0.5) : [...original];
            currentTrackIdx = playingTracks.findIndex(x => x.id === id);
            loadTrack(playingTracks[currentTrackIdx]);
        }
        
        function updatePlayerBlurBg() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                const t = playingTracks[currentTrackIdx];
                if (t && t.cover) {
                    document.documentElement.style.setProperty('--blur-bg', `url(${t.cover})`);
                } else {
                    document.documentElement.style.setProperty('--blur-bg', 'none');
                }
            }
        }
        
        function loadTrack(t) {
            if (!t) return;
            
            // Fix for the first song bug: Cache Object URLs
            if (!audioObjectUrlMap[t.id]) {
                audioObjectUrlMap[t.id] = URL.createObjectURL(t.data);
            }
            audio.src = audioObjectUrlMap[t.id];
            
            document.getElementById('m-img').src = t.cover || ''; 
            checkMarquee('m-title', t.name);
            document.getElementById('f-img').src = t.cover || ''; 
            checkMarquee('f-title', t.name); 
            document.getElementById('f-artist').innerText = getArtistString(t);
            document.getElementById('mini').style.display = 'flex';
            
            if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                renderFullscreenLyrics();
            }
            
            updateFavBtn(t.favorite);
            updatePlayerBlurBg();
            
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Playback prevented", error);
                });
            }
        }

        function checkMarquee(elId, text) {
            const el = document.getElementById(elId);
            if (text.length > 20) {
                el.innerHTML = `<div class="marquee-wrap"><div class="marquee-content">${text}&emsp;&emsp;&emsp;${text}</div></div>`;
            } else {
                el.innerText = text;
            }
        }

        function formatTime(s) { 
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s / 60), sec = Math.floor(s % 60); 
            return `${m}:${sec < 10 ? '0' : ''}${sec}`; 
        }

        function seekAudio(val) {
            audio.currentTime = val;
            if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                syncLyricsDisplay(val);
            }
        }

        audio.ontimeupdate = () => { 
            if (!isNaN(audio.duration)) { 
                const s = document.getElementById('seeker'); 
                s.max = audio.duration; 
                s.value = audio.currentTime; 
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime); 
                document.getElementById('dur-time').innerText = formatTime(audio.duration); 
                const percent = (audio.currentTime / audio.duration) * 100;
                s.style.background = `linear-gradient(to right, var(--accent-blue) 0%, var(--key-color) ${percent}%, var(--seeker-bg) ${percent}%, var(--seeker-bg) 100%)`;
                
                if (document.getElementById('f-lyrics-view').classList.contains('active')) {
                    syncLyricsDisplay(audio.currentTime);
                }
            } 
        };

        audio.onplay = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-pause'; 
            document.getElementById('f-pp').className = 'fa-solid fa-pause'; 
        };

        audio.onpause = () => { 
            document.getElementById('m-pp').className = 'fa-solid fa-play'; 
            document.getElementById('f-pp').className = 'fa-solid fa-play'; 
        };

        audio.onended = () => { next(); };

        // Editing Track
        function renderTrackArtists() {
            document.getElementById('track-active-artists-main').innerHTML = currentTrackArtistsMain.map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('main', '${a}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
            document.getElementById('track-active-artists-sub').innerHTML = currentTrackArtistsSub.map(a => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--sub-text); color:var(--sub-text);">${a} <i class="fa-solid fa-xmark" onclick="removeTrackArtist('sub', '${a}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function setArtistRole(role) {
            currentArtistRole = role;
            document.getElementById('role-main-btn').classList.toggle('active', role === 'main');
            document.getElementById('role-sub-btn').classList.toggle('active', role === 'sub');
        }

        function addTrackArtist() {
            const el = document.getElementById('edit-artist-input');
            const val = el.value.trim();
            if (val) {
                if (currentArtistRole === 'main' && !currentTrackArtistsMain.includes(val)) {
                    currentTrackArtistsMain.push(val);
                } else if (currentArtistRole === 'sub' && !currentTrackArtistsSub.includes(val)) {
                    currentTrackArtistsSub.push(val);
                }
                el.value = '';
                renderTrackArtists();
            }
        }

        function removeTrackArtist(role, a) {
            if (role === 'main') currentTrackArtistsMain = currentTrackArtistsMain.filter(x => x !== a);
            else currentTrackArtistsSub = currentTrackArtistsSub.filter(x => x !== a);
            renderTrackArtists();
        }

        function openEdit(id) { 
            editingId = id; 
            const t = tracks.find(x => x.id === id); 
            document.getElementById('edit-name').value = t.name; 
            currentTrackArtistsMain = [...(t.mainArtists || [])];
            currentTrackArtistsSub = [...(t.subArtists || [])];
            setArtistRole('main');
            document.getElementById('edit-artist-input').value = "";
            renderTrackArtists();
            document.getElementById('edit-year').value = t.year || ""; 
            updateArtistSuggest(""); 
            document.getElementById('edit-modal').style.display = 'flex'; 
        }

        function closeEdit() { 
            document.getElementById('edit-modal').style.display = 'none'; 
        }

        function saveEdit() { 
            const t = tracks.find(x => x.id === editingId); 
            t.name = document.getElementById('edit-name').value; 
            t.mainArtists = [...currentTrackArtistsMain];
            t.subArtists = [...currentTrackArtistsSub];
            t.artist = getArtistString(t); // Keep for legacy fields
            t.year = document.getElementById('edit-year').value; 
            db.transaction("songs", "readwrite").objectStore("songs").put(t).onsuccess = () => { 
                closeEdit(); 
                loadAll(); 
            }; 
        }

        function toggleShuffle() { 
            isShuffle = !isShuffle; 
            document.getElementById('btn-shuffle').style.opacity = isShuffle ? "1" : "0.4"; 
        }

        function toggleRepeat() { 
            repeatMode = (repeatMode + 1) % 3; 
            document.getElementById('btn-repeat').style.opacity = repeatMode > 0 ? "1" : "0.4"; 
            document.getElementById('repeat-badge').style.display = repeatMode === 2 ? "block" : "none"; 
        }

        function deleteSong(id) { 
            if (confirm("Delete this track?")) {
                db.transaction("songs", "readwrite").objectStore("songs").delete(id).onsuccess = loadAll; 
            }
        }

        function deletePlaylist(id) { 
            if (confirm("Delete this playlist?")) {
                db.transaction("playlists", "readwrite").objectStore("playlists").delete(id).onsuccess = loadAll; 
            }
        }

        function removeTrackFromPlaylist(sid) { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            pl.songIds = pl.songIds.filter(id => id !== sid); 
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = loadAll; 
        }

        function saveBulkAdd() { 
            const pl = playlists.find(p => p.id === currentPlaylistId); 
            const newIds = Array.from(document.querySelectorAll('#bulk-list input:checked')).map(i => parseInt(i.value)); 
            pl.songIds = newIds; 
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                loadAll(); 
                document.getElementById('bulk-modal').remove(); 
            }; 
        }
        
        // Editing Playlist
        function renderPlTags() {
            document.getElementById('pl-active-tags').innerHTML = currentPlTags.map(t => `<div class="card-tag" style="display:inline-flex; align-items:center; gap:6px;">${t} <i class="fa-solid fa-xmark" onclick="removePlTag('${t}')" style="cursor:pointer; font-size:12px; opacity:0.7;"></i></div>`).join('');
        }

        function addPlTag() {
            const el = document.getElementById('pl-edit-tag');
            const val = el.value.trim();
            if (val && !currentPlTags.includes(val)) { 
                currentPlTags.push(val); 
                el.value = ''; 
                renderPlTags(); 
            }
        }

        function removePlTag(t) {
            currentPlTags = currentPlTags.filter(x => x !== t);
            renderPlTags();
        }

        function togglePlFav() {
            tempPlFav = !tempPlFav;
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
        }

        function openPlEdit(id) { 
            editingPlId = id; 
            const pl = playlists.find(p => p.id === id); 
            document.getElementById('pl-edit-name').value = pl.name; 
            currentPlTags = pl.tag ? pl.tag.split(/[,、]/).map(t => t.trim()).filter(t => t) : [];
            tempPlFav = pl.favorite || false;
            
            const icon = document.getElementById('pl-fav-btn').querySelector('i');
            icon.className = tempPlFav ? 'fa-solid fa-star star-icon active' : 'fa-regular fa-star star-icon';
            
            document.getElementById('pl-edit-tag').value = '';
            renderPlTags();
            tempPlImg = pl.cover; 
            document.getElementById('pl-edit-img').src = tempPlImg || ""; 
            updateTagSuggest(""); 
            document.getElementById('pl-edit-modal').style.display = 'flex'; 
        }

        function closePlEdit() { 
            document.getElementById('pl-edit-modal').style.display = 'none'; 
        }

        function savePlEdit() { 
            const pl = playlists.find(p => p.id === editingPlId); 
            pl.name = document.getElementById('pl-edit-name').value; 
            pl.tag = currentPlTags.join(',');
            pl.cover = tempPlImg; 
            pl.favorite = tempPlFav;
            db.transaction("playlists", "readwrite").objectStore("playlists").put(pl).onsuccess = () => { 
                closePlEdit(); 
                loadAll(); 
            }; 
        }
        
        function previewPlImg(e) { 
            const f = e.target.files[0]; 
            if (f) { 
                const r = new FileReader(); 
                r.onload = (ev) => { 
                    tempPlImg = ev.target.result; 
                    document.getElementById('
